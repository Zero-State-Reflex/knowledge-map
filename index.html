<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of Human Knowledge — 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#04060f; overflow:hidden; width:100vw; height:100vh; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#e8e0d0; }
  #c { display:block; width:100%; height:100%; cursor:grab; }
  #c:active { cursor:grabbing; }
  #title-bar {
    position:fixed; top:0; left:0; width:100%;
    height:130px;
    background:rgba(0,0,0,0.80);
    z-index:99; pointer-events:none;
    backdrop-filter:blur(2px);
  }
  #title {
    position:fixed; top:28px; left:50%; transform:translateX(-50%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:42px; font-weight:700;
    letter-spacing:0.18em; color:rgba(232,216,154,0.82);
    text-transform:uppercase; z-index:100; pointer-events:none; white-space:nowrap;
    text-shadow: 0 0 60px rgba(232,216,154,0.18);
  }
  #title-sprite {
    position:fixed; top:0; left:0; pointer-events:none; z-index:101;
  }
  #subtitle {
    position:fixed; top:90px; left:50%; transform:translateX(-50%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; letter-spacing:0.28em;
    color:rgba(180,165,130,0.5); z-index:100; pointer-events:none; white-space:nowrap;
    text-transform:uppercase;
  }
  #node-info {
    max-width:560px; width:560px; padding:28px 32px 32px;
    opacity:0; transition:opacity 0.35s ease;
    background:rgba(4,6,15,0.92); border:1px solid rgba(200,180,120,0.22);
    border-radius:10px; backdrop-filter:blur(10px);
    position:fixed; z-index:120; pointer-events:auto;
  }
  #node-info.visible { opacity:1; }
  #node-info-img-wrap {
    width:100%; height:110px; overflow:hidden; border-radius:8px;
    margin-bottom:16px; display:none; background:rgba(255,255,255,0.03);
  }
  #node-info-img-wrap.visible { display:block; }
  #node-info-img {
    width:100%; height:110px; object-fit:cover; display:block;
    opacity:0; transition:opacity 0.4s ease;
  }
  #node-info-img.loaded { opacity:1; }
  #node-info-name { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:30px; font-weight:700; letter-spacing:0.12em; color:#e8d89a; margin-bottom:8px; }
  #node-info-domain { font-size:11px; letter-spacing:0.25em; text-transform:uppercase; margin-bottom:20px; }
  #node-info-desc { font-size:15px; line-height:1.75; color:rgba(215,205,185,0.88); letter-spacing:0.02em; margin-bottom:22px; }
  #node-info-related-label { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(160,150,130,0.6); margin-bottom:12px; }
  #node-info-related { display:flex; flex-wrap:wrap; gap:8px; }
  .related-chip {
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; padding:5px 13px;
    border-radius:4px; border:1px solid rgba(200,180,120,0.25);
    background:rgba(255,255,255,0.04); color:rgba(220,210,185,0.8);
    cursor:pointer; transition: background 0.15s, color 0.15s; letter-spacing:0.05em;
    pointer-events:auto;
  }
  .related-chip:hover { background:rgba(232,216,154,0.15); color:#e8d89a; }
  .moon-label {
    position:fixed; pointer-events:auto; cursor:pointer; z-index:130;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:10px; letter-spacing:0.12em;
    text-transform:uppercase; white-space:nowrap;
    transform:translateX(-50%);
    text-shadow: 0 0 12px currentColor;
    transition: opacity 0.2s;
    opacity:0;
  }
  .moon-label:hover { opacity:1 !important; text-shadow:0 0 20px currentColor; }
  #node-info-wiki {
    display:inline-block; margin-bottom:20px;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:0.08em;
    color:rgba(140,180,220,0.75); text-decoration:none;
    border-bottom:1px solid rgba(140,180,220,0.3);
    transition: color 0.15s, border-color 0.15s;
  }
  #node-info-wiki:hover { color:rgba(180,215,255,0.95); border-color:rgba(180,215,255,0.6); }
  #leader-svg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:115;
  }
  #leader-line { stroke:rgba(200,180,120,0.45); stroke-width:1.2; fill:none; stroke-dasharray:4 3; }
  #leader-dot  { fill:rgba(232,216,154,0.9); }
  #hover-label {
    position:fixed; pointer-events:none; z-index:150;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:0.1em;
    color:#e8d89a; background:rgba(4,6,15,0.85);
    padding:4px 10px; border-radius:3px; border:1px solid rgba(200,180,120,0.25);
    opacity:0; transition:opacity 0.1s; transform:translateX(-50%);
    white-space:nowrap;
  }
  #legend {
    position:fixed; bottom:24px; left:24px; z-index:100;
    display:flex; flex-direction:column; gap:7px; max-height:80vh; overflow:hidden;
    background:rgba(0,0,0,0.80); backdrop-filter:blur(2px);
    padding:16px 18px; border-radius:10px;
  }
  .legend-item {
    display:flex; align-items:center; gap:9px; font-size:13px;
    letter-spacing:0.08em; color:rgba(180,170,150,0.7); cursor:pointer;
    transition:color 0.2s;
  }
  .legend-item:hover { color:rgba(220,210,190,0.95); }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  #instructions {
    position:fixed; bottom:24px; right:24px; font-size:8px;
    color:rgba(130,120,100,0.4); letter-spacing:0.1em; line-height:1.9; text-align:right; z-index:100;
  }
  #settling { position:fixed; bottom:60px; right:24px; font-size:8px; color:rgba(140,180,140,0.5); letter-spacing:0.1em; z-index:100; transition:opacity 1s; }

  #audio-controls {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:12px; z-index:200;
    background:rgba(4,6,15,0.72); border:1px solid rgba(200,180,120,0.14);
    border-radius:20px; padding:7px 16px; backdrop-filter:blur(8px);
    pointer-events:auto;
  }
  #mute-btn {
    background:none; border:none; cursor:pointer; padding:0;
    color:rgba(200,185,140,0.65); font-size:16px; line-height:1;
    transition:color 0.2s; width:20px; text-align:center; flex-shrink:0;
  }
  #mute-btn:hover { color:rgba(232,216,154,0.95); }
  #vol-slider {
    -webkit-appearance:none; appearance:none;
    width:90px; height:2px; border-radius:2px; outline:none; cursor:pointer;
    background: linear-gradient(to right,
      rgba(232,216,154,0.7) 0%, rgba(232,216,154,0.7) var(--pct,60%),
      rgba(120,110,80,0.3) var(--pct,60%), rgba(120,110,80,0.3) 100%);
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
    background:rgba(232,216,154,0.85); cursor:pointer; border:none;
    box-shadow:0 0 6px rgba(232,216,154,0.4);
  }
  #vol-slider::-moz-range-thumb {
    width:11px; height:11px; border-radius:50%;
    background:rgba(232,216,154,0.85); cursor:pointer; border:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<svg id="leader-svg">
  <line id="leader-line" x1="0" y1="0" x2="0" y2="0"/>
  <circle id="leader-dot" r="3" cx="0" cy="0"/>
</svg>
<div id="title-bar"></div>
<div id="title">Map of Human Knowledge</div>
<canvas id="title-sprite"></canvas>
<div id="subtitle">drag · scroll · click to explore</div>
<div id="node-info">
  <div id="node-info-img-wrap"><img id="node-info-img" src="" alt=""></div>
  <div id="node-info-name"></div>
  <div id="node-info-domain"></div>
  <div id="node-info-desc"></div>
  <a id="node-info-wiki" href="#" target="_blank" rel="noopener">↗ Wikipedia</a>
  <div id="node-info-related-label">Related Disciplines</div>
  <div id="node-info-related"></div>
</div>
<div id="hover-label"></div>
<div id="legend"></div>
<div id="instructions">drag → spin<br>scroll → zoom<br>hover → attract<br>click → explore</div>
<div id="settling">● settling…</div>
<div id="audio-controls">
  <button id="mute-btn" title="Mute / Unmute">♪</button>
  <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.6" title="Volume">
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module" src="src/ui.js"></script>
</body>
</html>
