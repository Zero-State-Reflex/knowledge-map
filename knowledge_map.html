<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#04060f; overflow:hidden; width:100vw; height:100vh; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#e8e0d0; }

  /* ── Loading Screen ── */
  #loading-screen {
    position:fixed; inset:0; z-index:10000;
    background:#04060f;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    transition:opacity 0.8s ease;
  }
  #loading-screen.hidden { opacity:0; pointer-events:none; }

  .atom { position:relative; width:120px; height:120px; }

  /* Nucleus */
  .atom-nucleus {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:12px; height:12px; border-radius:50%;
    background:rgba(232,216,154,0.9);
    box-shadow:0 0 12px rgba(232,216,154,0.4), 0 0 30px rgba(232,216,154,0.15);
  }

  /* Orbit rings */
  .atom-orbit {
    position:absolute; top:50%; left:50%;
    border:1px solid rgba(200,180,120,0.12);
    border-radius:50%;
    animation:atom-spin linear infinite;
  }
  .atom-orbit:nth-child(2) { width:80px; height:80px; margin:-40px 0 0 -40px; animation-duration:2.4s; }
  .atom-orbit:nth-child(3) { width:100px; height:100px; margin:-50px 0 0 -50px; animation-duration:3.2s; transform:rotate(60deg); animation-name:atom-spin-2; }
  .atom-orbit:nth-child(4) { width:110px; height:110px; margin:-55px 0 0 -55px; animation-duration:4.0s; transform:rotate(-30deg); animation-name:atom-spin-3; }

  /* Electrons */
  .atom-electron {
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:rgba(200,180,120,0.8);
    box-shadow:0 0 6px rgba(200,180,120,0.5);
    top:-3px; left:50%; margin-left:-3px;
  }

  @keyframes atom-spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  @keyframes atom-spin-2 { from { transform:rotate(60deg); } to { transform:rotate(420deg); } }
  @keyframes atom-spin-3 { from { transform:rotate(-30deg); } to { transform:rotate(330deg); } }

  .loading-label {
    margin-top:28px;
    font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:rgba(200,180,120,0.45);
  }
  #zsr-logo {
    position:fixed; top:16px; left:18px; z-index:101;
    width:48px; height:auto; opacity:0.7;
    transition:opacity 0.3s;
    pointer-events:auto; cursor:pointer;
  }
  #zsr-logo:hover { opacity:1; }
  #c { display:block; width:100%; height:100%; cursor:grab; }
  #c:active { cursor:grabbing; }
  #title-bar {
    position:fixed; top:0; left:0; width:100%;
    height:130px;
    background:rgba(0,0,0,0.80);
    z-index:99; pointer-events:none;
    backdrop-filter:blur(2px);
  }
  #title {
    position:fixed; top:28px; left:50%; transform:translateX(-50%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:42px; font-weight:700;
    letter-spacing:0.04em; color:rgba(232,216,154,0.82);
    text-transform:uppercase; z-index:100; pointer-events:none; white-space:nowrap;
    text-shadow: 0 0 60px rgba(232,216,154,0.18);
  }
  #title-sprite {
    position:fixed; top:0; left:0; pointer-events:none; z-index:101;
  }
  #subtitle {
    position:fixed; top:90px; left:50%; transform:translateX(-50%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; letter-spacing:0.08em;
    color:rgba(180,165,130,0.5); z-index:100; pointer-events:none; white-space:nowrap;
    text-transform:uppercase;
  }
  #node-info {
    max-width:560px; width:560px; padding:28px 32px 32px;
    opacity:0; transition:opacity 0.35s ease;
    background:rgba(4,6,15,0.92); border:1px solid rgba(200,180,120,0.22);
    border-radius:10px; backdrop-filter:blur(10px);
    position:fixed; z-index:120; pointer-events:auto;
  }

    width:100%; height:110px; overflow:hidden; border-radius:8px;
    margin-bottom:16px; display:none; background:rgba(255,255,255,0.03);
  }
  #node-info-img-wrap.visible { display:block; }
  #node-info-img {
    width:100%; height:110px; object-fit:cover; display:block;
    opacity:0; transition:opacity 0.4s ease;
  }
  #node-info-img.loaded { opacity:1; }
  #node-info-name { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:30px; font-weight:700; letter-spacing:0.02em; color:#e8d89a; margin-bottom:8px; }

    background:rgba(255,255,255,0.04); color:rgba(220,210,185,0.8);
    cursor:pointer; transition: background 0.15s, color 0.15s; letter-spacing:0.05em;
    pointer-events:auto;

  .related-chip:hover { background:rgba(232,216,154,0.15); color:#e8d89a; }
  .moon-label {
    position:fixed; pointer-events:auto; cursor:pointer; z-index:130;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:10px; letter-spacing:0.03em;
    text-transform:uppercase; white-space:nowrap;
    transform:translateX(-50%);
    text-shadow: 0 0 12px currentColor;
    transition: opacity 0.2s;
    opacity:0;
  }

  #node-info-wiki {
    display:inline-block; margin-bottom:20px;

  #leader-svg {
    position:fixed; top:0; left:0; width:100%; height:100%;

  }

  #leader-dot  { fill:rgba(232,216,154,0.9); }
  #hover-label {

  #legend {

// ─── STAR FIELD ──────────────────────────────────────────────────────────────
(function buildStars() {
  const STAR_COUNT = 12000;
  const RADIUS     = 9000; // far shell, always behind everything

  const positions = new Float32Array(STAR_COUNT * 3);
  const colors    = new Float32Array(STAR_COUNT * 3);
  const sizes     = new Float32Array(STAR_COUNT);

  // Star color temperatures: blue-white, white, warm yellow, faint orange
  const starTints = [
    [0.72, 0.82, 1.00],  // blue-white
    [0.95, 0.97, 1.00],  // white
    [1.00, 0.98, 0.88],  // warm white
    [1.00, 0.92, 0.70],  // yellow
    [1.00, 0.85, 0.60],  // orange
  ];

  for (let i = 0; i < STAR_COUNT; i++) {
    // Uniform random on sphere surface
    const u     = Math.random();
    const v     = Math.random();
    const theta = 2 * Math.PI * u;
    const phi   = Math.acos(2 * v - 1);
    positions[i*3]   = RADIUS * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = RADIUS * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = RADIUS * Math.cos(phi);

    // Random tint, slightly dimmed
    const tint  = starTints[Math.floor(Math.random() * starTints.length)];
    const bright = 0.45 + Math.random() * 0.55;
    colors[i*3]   = tint[0] * bright;
    colors[i*3+1] = tint[1] * bright;
    colors[i*3+2] = tint[2] * bright;

    // Most stars tiny, a few larger, rare bright ones
    const r = Math.random();
    sizes[i] = r < 0.92
      ? 0.6 + Math.random() * 1.2
      : r < 0.98
        ? 1.8 + Math.random() * 2.0
        : 3.0 + Math.random() * 2.5;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes,  1));

  const mat = new THREE.PointsMaterial({
    vertexColors: true,
    sizeAttenuation: false,  // screen-space sizing so they stay crisp dots
    transparent: true,
    opacity: 0.88,
    depthWrite: false,
    size: 1.4,
  });

  scene.add(new THREE.Points(geo, mat));

  // Subtle twinkle — slowly modulate overall opacity with a soft sine
  let twinkleT = 0;
  const twinkleTick = () => {
    twinkleT += 0.004;
    mat.opacity = 0.72 + Math.sin(twinkleT) * 0.16;
  };
  // Register twinkle in animation loop via a global hook
  window._starTwinkle = twinkleTick;
})();

(function buildBlackHole() {
  // Position: off-center in the background star shell
  const BH_POS = new THREE.Vector3(3200, -800, -5500);

  // ── Event horizon — pure black sphere, cuts stars behind it ──────────────

    color: 0xaaccff,
    transparent: true,

    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,

      color: col,

      opacity: haloOpacity[i],
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,

    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.scale.setScalar(haloScales[i]);
    mesh.position.copy(BH_POS);
    scene.add(mesh);
  });

  // ── Accretion disk — flat torus, tilted, glowing orange→white→blue ────────
  // Build as layered rings: warm inner, bright mid, cool outer
  const diskLayers = [
    { inner: 270, outer: 310, color: 0xffffff, opacity: 0.18 }, // white-hot innermost
    { inner: 305, outer: 370, color: 0xffeedd, opacity: 0.24 }, // bright inner
    { inner: 365, outer: 440, color: 0xffaa44, opacity: 0.16 }, // warm orange

    { inner: 525, outer: 640, color: 0xcc5511, opacity: 0.08 }, // deep red outer
    { inner: 635, outer: 760, color: 0x993300, opacity: 0.05 }, // dark red
    { inner: 755, outer: 900, color: 0x661100, opacity: 0.025 }, // faint far edge
    { inner: 895, outer: 1050, color: 0x440800, opacity: 0.012 }, // very faint outer halo
  ];

  const diskTilt = new THREE.Euler(0.38, 0.22, 0.0); // slight tilt, not face-on

  diskLayers.forEach(layer => {
    const geo = new THREE.RingGeometry(layer.inner, layer.outer, 128, 2);
    const mat = new THREE.MeshBasicMaterial({
      color: layer.color,
      transparent: true,
      opacity: layer.opacity,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const ring = new THREE.Mesh(geo, mat);
    ring.position.copy(BH_POS);
    ring.rotation.copy(diskTilt);
    scene.add(ring);
  });

  // ── Disk slow rotation — store refs for animation ─────────────────────────
  const diskMeshes = [];
  diskLayers.forEach(layer => {
    // Already added above; re-create a parallel ref array via scene traversal
  });

  // ── Relativistic jets — faint beams above and below the disk ──────────────
  const jetLayers = [
    { length: 1200, radius: 18, color: 0x88aaff, opacity: 0.04 },
    { length: 800, radius: 35, color: 0x6688cc, opacity: 0.025 },
    { length: 500, radius: 55, color: 0x4466aa, opacity: 0.015 },
  ];
  const jetMeshes = [];
  jetLayers.forEach(jet => {
    const jetGeo = new THREE.CylinderGeometry(jet.radius * 0.3, jet.radius, jet.length, 12, 1, true);
    const jetMat = new THREE.MeshBasicMaterial({
      color: jet.color, transparent: true, opacity: jet.opacity,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    // Top jet
    const topJet = new THREE.Mesh(jetGeo, jetMat);
    topJet.position.copy(BH_POS).add(new THREE.Vector3(0, jet.length * 0.5 + 260, 0));
    topJet.rotation.copy(diskTilt);
    scene.add(topJet);
    // Bottom jet
    const botJet = new THREE.Mesh(jetGeo, jetMat.clone());
    botJet.position.copy(BH_POS).add(new THREE.Vector3(0, -jet.length * 0.5 - 260, 0));
    botJet.rotation.copy(diskTilt);
    botJet.rotation.z += Math.PI;
    scene.add(botJet);
    jetMeshes.push(topJet, botJet);
  });

  // Animate: subtle disk shimmer via opacity oscillation + jet flicker
  let bhT = 0;
  const bhTick = () => {
    bhT += 0.0008;
    // Photon sphere pulse
    photonMat.opacity = 0.04 + Math.sin(bhT * 1.3) * 0.02;
    // Jet flicker
    jetMeshes.forEach((m, i) => {
      m.material.opacity = m.material.opacity * (0.85 + Math.sin(bhT * 2.1 + i) * 0.15);
    });
  };
  window._bhTick = bhTick;
})();

// Simple seeded pseudo-random
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

// Smooth noise via bilinear lerp on random grid
function buildNoise(rng, gw, gh) {
  const grid = new Float32Array(gw * gh);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  return (u, v) => {
    const x = ((u % 1 + 1) % 1) * (gw - 1);
    const y = ((v % 1 + 1) % 1) * (gh - 1);
    const x0 = Math.floor(x) % gw, y0 = Math.floor(y) % gh;
    const x1 = (x0 + 1) % gw,      y1 = (y0 + 1) % gh;
    const fx = x - Math.floor(x),   fy = y - Math.floor(y);
    const s = t => t * t * (3 - 2 * t);
    return grid[y0*gw+x0]*(1-s(fx))*(1-s(fy)) + grid[y0*gw+x1]*s(fx)*(1-s(fy))
         + grid[y1*gw+x0]*(1-s(fx))*s(fy)     + grid[y1*gw+x1]*s(fx)*s(fy);
  };
}

function fbm(noise, u, v, oct, lac, gain) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < oct; i++) {
    val += noise(u * freq, v * freq) * amp;
    freq *= lac; amp *= gain;
  }
  return val;
}

const PLANET_PALETTES = {
  ice:           [[120,145,170],[80,120,155],[55,90,140],[150,175,200],[180,200,220],[40,65,110]],
  gas_blue:      [[8,25,70],[18,50,110],[45,85,140],[80,120,170],[30,40,90],[10,35,85]],
  rocky_orange:  [[60,28,8],[100,50,18],[140,75,30],[85,40,12],[45,20,5],[120,65,25]],
  jungle:        [[10,40,14],[22,65,28],[40,90,40],[15,52,20],[50,80,35],[8,30,10]],
  acid:          [[20,60,10],[45,100,18],[75,140,35],[30,80,15],[55,110,25],[90,155,45]],
  terracotta:    [[90,35,22],[130,55,35],[105,42,28],[70,28,15],[155,75,50],[50,20,10]],
  desert:        [[120,90,40],[150,120,60],[100,75,30],[85,60,25],[170,140,80],[65,45,18]],
  ancient:       [[75,55,35],[110,80,55],[90,65,42],[55,38,22],[130,100,70],[40,28,16]],
  violet_cloud:  [[40,8,60],[70,25,100],[95,40,130],[50,12,75],[120,55,160],[25,5,40]],
  metallic:      [[40,50,65],[70,82,95],[100,112,128],[30,38,52],[130,140,155],[22,28,40]],
  ocean:         [[5,18,55],[10,40,90],[25,65,120],[5,28,70],[45,90,145],[8,15,42]],
  dark_nebula:   [[30,5,42],[55,10,65],[80,22,95],[40,6,52],[110,40,130],[18,2,28]],
  amber_gas:     [[110,55,8],[150,85,25],[125,65,12],[90,42,5],[170,110,40],[70,32,4]],
  verdant:       [[15,55,25],[28,85,40],[48,110,55],[20,65,30],[60,130,65],[10,40,18]],
  plasma:        [[120,10,55],[160,30,80],[140,20,65],[100,5,42],[180,55,110],[80,4,35]],
};

function makePlanetTexture(domain, nodeId) {
  const type  = PLANET_TYPES[domain] || 'ocean';
  const pal   = PLANET_PALETTES[type];
  const S     = 512;
  const cv    = document.createElement('canvas');
  cv.width = S * 2; cv.height = S;
  const ctx   = cv.getContext('2d');
  const id    = ctx.createImageData(S * 2, S);
  const data  = id.data;

  // Seed from node name
  let seed = 0;
  for (let i = 0; i < nodeId.length; i++) seed = (seed * 31 + nodeId.charCodeAt(i)) & 0xfffffff;
  const rng  = seededRand(seed + 1);
  const rng2 = seededRand(seed + 99);
  const rng3 = seededRand(seed + 777);

  const n1 = buildNoise(rng,  32, 16);
  const n2 = buildNoise(rng2, 16, 32);
  const n3 = buildNoise(rng3, 64, 32);
  const rng4 = seededRand(seed + 2345);
  const n4 = buildNoise(rng4, 48, 24);

  // Type-specific rendering
  const isBanded = ['gas_blue','amber_gas','plasma','violet_cloud','dark_nebula'].includes(type);
  const isIcy    = type === 'ice';
  const isRocky  = ['rocky_orange','terracotta','ancient','desert','verdant'].includes(type);
  const numBands = 4 + Math.floor(rng() * 5);
  const stormU   = rng(); const stormV = 0.3 + rng() * 0.4;
  const stormR   = 0.04 + rng() * 0.06;
  const hasStorm = rng() > 0.35;

  for (let py = 0; py < S; py++) {
    for (let px = 0; px < S * 2; px++) {
      const u = px / (S * 2);
      const v = py / S;

      let t;
      if (isBanded) {
        const warp = fbm(n1, u, v, 6, 2.1, 0.5) * 0.4;
        const band = (Math.sin((v + warp) * Math.PI * numBands) + 1) * 0.5;
        const detail = fbm(n2, u * 2, v * 2, 5, 2.0, 0.45) * 0.25;
        const micro = fbm(n4, u * 6, v * 6, 4, 2.3, 0.4) * 0.08;
        t = Math.max(0, Math.min(1, band + detail + micro));
      } else if (isRocky) {
        const crater = fbm(n3, u * 3, v * 3, 7, 2.2, 0.5);
        const base   = fbm(n1, u, v, 6, 2.0, 0.5);
        const fine   = fbm(n4, u * 8, v * 8, 4, 2.4, 0.45) * 0.12;
        t = Math.pow(Math.max(0, base * 0.55 + crater * 0.35 + fine), 0.8);
      } else if (isIcy) {
        const crack = Math.abs(fbm(n1, u * 2, v * 2, 7, 2.3, 0.5) - 0.5) * 2;
        const base  = fbm(n2, u, v, 5, 2.0, 0.4);
        const vein  = Math.abs(fbm(n4, u * 5, v * 5, 4, 2.5, 0.45) - 0.5) * 0.3;
        t = Math.max(0, Math.min(1, base * 0.45 + (1 - crack * 0.55) + vein));
      } else {
        t = fbm(n1, u * 1.5, v * 1.5, 7, 2.1, 0.5);
        const detail = fbm(n4, u * 4, v * 4, 5, 2.2, 0.45) * 0.15;
        t = Math.max(0, Math.min(1, t * 0.75 + fbm(n2, u, v, 5, 2.0, 0.5) * 0.2 + detail));
      }

      // Storm spot
      if (hasStorm) {
        const du = Math.min(Math.abs(u - stormU), 1 - Math.abs(u - stormU));
        const dv = v - stormV;
        const sd = Math.sqrt(du*du + dv*dv) / stormR;
        if (sd < 1) t = Math.max(0, Math.min(1, t * 0.3 + (1 - sd) * 0.7));
      }

      // Pick color from palette
      const ci = t * (pal.length - 1);
      const ci0 = Math.floor(ci), ci1 = Math.min(ci0 + 1, pal.length - 1);
      const cf = ci - ci0;
      const c0 = pal[ci0], c1 = pal[ci1];
      const r = Math.round(c0[0] + (c1[0]-c0[0]) * cf);
      const g = Math.round(c0[1] + (c1[1]-c0[1]) * cf);
      const b = Math.round(c0[2] + (c1[2]-c0[2]) * cf);

      // Limb darkening: darken edges of sphere (approximated via equirectangular v→lat)
      const lat  = (v - 0.5) * Math.PI;
      const limb = Math.pow(Math.cos(lat), 0.5);
      // Also apply longitudinal limb darkening for equirectangular
      const lon = (u - 0.5) * Math.PI * 2;
      const lonLimb = 0.7 + 0.3 * Math.pow(Math.max(0, Math.cos(lon * 0.5)), 0.4);
      const totalLimb = limb * lonLimb;

      const i4 = (py * S * 2 + px) * 4;
      data[i4]   = Math.round(r * totalLimb);
      data[i4+1] = Math.round(g * totalLimb);
      data[i4+2] = Math.round(b * totalLimb);
      data[i4+3] = 255;
    }
  }
  ctx.putImageData(id, 0, 0);
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

// ─── NODE MESHES ────────────────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(1, 48, 32);
const atmGeo    = new THREE.SphereGeometry(1, 24, 16); // atmosphere shell
const nodeMeshes = [];

nodes.forEach(n => {
  const hex = DOMAINS[n.domain]?.color || '#aaaaaa';
  const domColor = new THREE.Color(hex);

  // Planet surface — tuned for visible texture detail
  const tex = makePlanetTexture(n.domain, n.id);
  const mat = new THREE.MeshPhongMaterial({
    map: tex,
    emissive: domColor,
    emissiveIntensity: 0.015,
    shininess: 18,
    specular: new THREE.Color(0x111111),
    transparent: false,
    opacity: 1.0,
  });
  const mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.scale.setScalar(n.size * 2.2);
  mesh.position.set(n.x, n.y, n.z);
  mesh.userData.node = n;
  // Slow unique rotation per planet
  mesh.userData.rotSpeed = 0.0015 + (n.id.charCodeAt(0) % 10) * 0.0003;
  scene.add(mesh);
  nodeMeshes.push(mesh);
  n.mesh = mesh;

  // Atmosphere glow shell — thin rim, BackSide so it only shows at edges
  const atmMat = new THREE.MeshBasicMaterial({
    color: domColor,
    transparent: true,
    opacity: 0.06,
    side: THREE.BackSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const atm = new THREE.Mesh(atmGeo, atmMat);
  atm.scale.setScalar(n.size * 2.2 * 1.12);
  atm.position.set(n.x, n.y, n.z);
  atm.userData.isAtm = true;
  atm.userData.node  = n;
  scene.add(atm);
  n.atm = atm;
  n.atmMat = atmMat;

  // Outer atmosphere haze — very faint, large glow halo
  const outerAtmMat = new THREE.MeshBasicMaterial({
    color: domColor,
    transparent: true,
    opacity: 0.02,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const outerAtm = new THREE.Mesh(atmGeo, outerAtmMat);
  outerAtm.scale.setScalar(n.size * 2.2 * 1.35);
  outerAtm.position.set(n.x, n.y, n.z);
  scene.add(outerAtm);
  n.outerAtm = outerAtm;

  // Planetary rings on larger nodes (size >= 18)
  if (n.size >= 18) {
    const ringInner = n.size * 2.2 * 1.35;
    const ringOuter = n.size * 2.2 * 2.0;
    const ringGeo = new THREE.RingGeometry(ringInner, ringOuter, 64, 1);
    const ringMat = new THREE.MeshBasicMaterial({
      color: domColor,
      transparent: true,
      opacity: 0.06,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(n.x, n.y, n.z);
    // Tilt rings uniquely per node
    const tiltSeed = n.id.charCodeAt(0) * 0.1;
    ring.rotation.x = Math.PI * 0.5 + Math.sin(tiltSeed) * 0.4;
    ring.rotation.y = Math.cos(tiltSeed * 1.3) * 0.3;
    scene.add(ring);
    n.ring = ring;
  }
});

// ─── EDGE LINES ─────────────────────────────────────────────────────────────
const edgePosArr = new Float32Array(links.length * 6);
const edgeGeo = new THREE.BufferGeometry();
const edgePosAttr = new THREE.BufferAttribute(edgePosArr, 3);
edgePosAttr.usage = THREE.DynamicDrawUsage;
edgeGeo.setAttribute('position', edgePosAttr);
const edgeMat = new THREE.LineBasicMaterial({
  color: 0xc8bea8, transparent: true, opacity: 0.28,
});
const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
scene.add(edgeLines);

// ─── TRAVELING PULSE SYSTEM ──────────────────────────────────────────────────
// A bright line segment slides along each connector edge — no floating orbs.

const PULSE_POOL      = 32;
const PULSE_SPEED_MIN = 0.003;
const PULSE_SPEED_MAX = 0.009;
const PULSE_TAIL      = 0.09;

const PULSE_COLORS = [
  new THREE.Color(0xffe8a0),
  new THREE.Color(0xaad4ff),
  new THREE.Color(0xffc0e0),
  new THREE.Color(0xc0ffd8),
  new THREE.Color(0xffd0a0),
  new THREE.Color(0xe0c0ff),
  new THREE.Color(0xa0eeff),
];

// Neighbor lookup for chain-traveling
const neighborMap = new Map();
nodes.forEach(n => neighborMap.set(n.id, []));
links.forEach(l => {
  neighborMap.get(l.source.id).push(l.target);
  neighborMap.get(l.target.id).push(l.source);
});

const activePulses = [];

// Each pulse gets its own 2-point LineSegments (head + tail point)
function spawnPulse(srcNode, tgtNode, col) {
  if (activePulses.length >= PULSE_POOL) return;

  const color = col
    ? col.clone()
    : PULSE_COLORS[Math.floor(Math.random() * PULSE_COLORS.length)].clone();
  const speed = PULSE_SPEED_MIN + Math.random() * (PULSE_SPEED_MAX - PULSE_SPEED_MIN);

  // Core bright segment
  const posArr = new Float32Array(6); // 2 points × 3
  const geo    = new THREE.BufferGeometry();
  const attr   = new THREE.BufferAttribute(posArr, 3);
  attr.usage   = THREE.DynamicDrawUsage;
  geo.setAttribute('position', attr);

  const mat = new THREE.LineBasicMaterial({
    color,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const line = new THREE.LineSegments(geo, mat);
  scene.add(line);

  // Softer wider halo segment (same geometry, different material)
  const haloMat = new THREE.LineBasicMaterial({
    color,
    transparent: true,
    opacity: 0.3,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const haloLine = new THREE.LineSegments(geo, haloMat); // shares geo
  scene.add(haloLine);

  activePulses.push({
    src: srcNode, tgt: tgtNode,
    t: 0, speed, color,
    geo, posArr, mat, haloMat, line, haloLine,
  });
}

function lerpEdge(src, tgt, t) {
  return {
    x: src.x + (tgt.x - src.x) * t,
    y: src.y + (tgt.y - src.y) * t,
    z: src.z + (tgt.z - src.z) * t,
  };
}

function updatePulses() {
  // Randomly spawn new pulses
  if (Math.random() < 0.012 && activePulses.length < PULSE_POOL) {
    const candidates = nodes.filter(n => neighborMap.get(n.id).length > 0);
    if (candidates.length) {
      const src  = candidates[Math.floor(Math.random() * candidates.length)];
      const nbrs = neighborMap.get(src.id);
      const tgt  = nbrs[Math.floor(Math.random() * nbrs.length)];
      spawnPulse(src, tgt, null);
    }
  }

  for (let i = activePulses.length - 1; i >= 0; i--) {
    const p = activePulses[i];
    p.t += p.speed;

    const head = Math.min(p.t, 1);
    const tail = Math.max(p.t - PULSE_TAIL, 0);

    // Fade in as tail leaves 0, fade out as head approaches 1
    const fadeIn  = Math.min(p.t / (PULSE_TAIL * 0.5), 1);
    const fadeOut = Math.min((1 - head) / 0.08 + 0.001, 1);
    const env     = Math.min(fadeIn, fadeOut);

    p.mat.opacity     = env * 0.92;
    p.haloMat.opacity = env * 0.32;

    // Write head and tail positions into the line segment
    const hp = lerpEdge(p.src, p.tgt, head);
    const tp = lerpEdge(p.src, p.tgt, tail);
    p.posArr[0] = tp.x; p.posArr[1] = tp.y; p.posArr[2] = tp.z;
    p.posArr[3] = hp.x; p.posArr[4] = hp.y; p.posArr[5] = hp.z;
    p.geo.attributes.position.needsUpdate = true;

    // Pulse finished
    if (p.t >= 1 + PULSE_TAIL) {
      scene.remove(p.line);
      scene.remove(p.haloLine);
      p.mat.dispose();
      p.haloMat.dispose();
      p.geo.dispose();
      activePulses.splice(i, 1);

      // 55% chance to chain-travel
      if (Math.random() < 0.55) {
        const nbrs = neighborMap.get(p.tgt.id).filter(n => n.id !== p.src.id);
        if (nbrs.length) {
          const next = nbrs[Math.floor(Math.random() * nbrs.length)];
          // Fresh random speed each hop — subtle variation per segment
          spawnPulse(p.tgt, next, p.color);
        }
      }
    }
  }
}

const focusEdgePosArr = new Float32Array(links.length * 6);
const focusEdgeGeo  = new THREE.BufferGeometry();
const focusEdgeAttr = new THREE.BufferAttribute(focusEdgePosArr, 3);
focusEdgeAttr.usage = THREE.DynamicDrawUsage;
focusEdgeGeo.setAttribute('position', focusEdgeAttr);

// Halo layer — additive, soft wide glow
const focusEdgeHaloMat = new THREE.LineBasicMaterial({
  color: 0xffe8a0, transparent: true, opacity: 0.0,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const focusEdgeHalo = new THREE.LineSegments(focusEdgeGeo, focusEdgeHaloMat);
scene.add(focusEdgeHalo);

// Core layer — bright sharp line on top
const focusEdgeCoreMat = new THREE.LineBasicMaterial({
  color: 0xfff0c0, transparent: true, opacity: 0.0,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const focusEdgeCore = new THREE.LineSegments(focusEdgeGeo, focusEdgeCoreMat);
scene.add(focusEdgeCore);

let focusEdgeLinks = []; // subset of links for focused node

function buildFocusEdges(n) {
  focusEdgeLinks = links.filter(l => l.source.id === n.id || l.target.id === n.id);
  // Resize buffer if needed
  const needed = focusEdgeLinks.length * 6;
  if (focusEdgePosArr.length < needed) {
    const newArr = new Float32Array(needed);
    focusEdgeGeo.setAttribute('position', new THREE.BufferAttribute(newArr, 3));
    focusEdgeGeo.attributes.position.usage = THREE.DynamicDrawUsage;
  }
  focusEdgeGeo.setDrawRange(0, focusEdgeLinks.length * 2);
  const domainColor = new THREE.Color(DOMAINS[n.domain]?.color || '#ffe8a0');
  focusEdgeHaloMat.color.copy(domainColor);
  focusEdgeCoreMat.color.copy(domainColor).lerp(new THREE.Color(0xffffff), 0.4);
  // Start transparent — tickDim fades them in
  focusEdgeHaloMat.opacity = 0;
  focusEdgeCoreMat.opacity = 0;
}

function clearFocusEdges() {
  focusEdgeLinks = [];
  focusEdgeHaloMat.opacity = 0.0;
  focusEdgeCoreMat.opacity = 0.0;
  focusEdgeGeo.setDrawRange(0, 0);
}
clearFocusEdges(); // hidden initially

// ─── MOON SYSTEM ─────────────────────────────────────────────────────────────
// When a node is focused its neighbors orbit it as glowing moons.
// Moons are separate meshes (not the original node meshes) so they don't
// disturb the force simulation.

const moonMeshes   = [];   // raycaster target list (cleared each focus)
let   moonData     = [];   // per-moon orbit state

const moonSphereGeo = new THREE.SphereGeometry(1, 32, 24);
const moonRingGeo   = new THREE.RingGeometry(1.55, 1.85, 48);
const moonHaloGeo   = new THREE.SphereGeometry(1, 20, 14);

function buildMoons(centerNode) {
  clearMoons();
  const neighbors = getNeighborNames(centerNode).slice(0, 10);
  const count     = neighbors.length;
  if (!count) return;

  const baseOrbitR = centerNode.size * 2.2 * 1.0 + 55; // orbit radius from planet surface

  neighbors.forEach((name, i) => {
    const n = nodeMap.get(name);
    if (!n) return;

    const col    = new THREE.Color(DOMAINS[n.domain]?.color || '#aaaaaa');
    const mSize  = Math.max(2, n.size * 2.2 * 0.19); // 50% smaller

    // Orbit parameters — stagger inclinations & radii for 3D spread
    const orbitR   = baseOrbitR + (i % 3) * 22;
    const incl     = (i / count) * Math.PI * 0.9 - Math.PI * 0.45;
    const phase    = (i / count) * Math.PI * 2;
    const speed    = 0.0004 + (i * 0.000031);
    const hasRing  = Math.random() < 0.35; // ~1 in 3 moons gets a ring

    // ── Core moon sphere ─────────────────────────────────────────────────────
    const mat = new THREE.MeshPhongMaterial({
      color:    col,
      emissive: col,
      emissiveIntensity: 0.55,
      shininess: 60,
      transparent: true,
      opacity: 0,
    });
    const mesh = new THREE.Mesh(moonSphereGeo, mat);
    mesh.scale.setScalar(mSize);
    mesh.userData.moonNode = n;
    scene.add(mesh);
    moonMeshes.push(mesh);

    // ── Glowing halo shell ───────────────────────────────────────────────────
    const haloMat = new THREE.MeshBasicMaterial({
      color: col,
      transparent: true,
      opacity: 0.18,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const halo = new THREE.Mesh(moonHaloGeo, haloMat);
    halo.scale.setScalar(mSize * 2.0);
    scene.add(halo);

    // ── Orbital ring — only on randomly selected moons ───────────────────────
    let ring = null, ringMat = null;
    if (hasRing) {
      ringMat = new THREE.MeshBasicMaterial({
        color: col,
        transparent: true,
        opacity: 0.55,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      ring = new THREE.Mesh(moonRingGeo, ringMat);
      ring.scale.setScalar(mSize);
      scene.add(ring);
    }

    // ── HTML label ───────────────────────────────────────────────────────────
    const label = document.createElement('div');
    label.className    = 'moon-label';
    label.textContent  = n.id;
    label.style.color  = DOMAINS[n.domain]?.color || '#e8d89a';
    label.dataset.moonIdx = moonData.length;
    label.addEventListener('click', e => {
      e.stopPropagation();
      focusNode(n);
    });
    document.body.appendChild(label);

    moonData.push({ n, mesh, halo, ring, mat, haloMat, ringMat, label,
                    orbitR, incl, phase, speed, mSize, angle: phase, hasRing,
                    moonAlpha: 0, fadeDelay: i * 80 + 600 }); // staggered fade-in
  });
}

function clearMoons() {
  moonData.forEach(m => {
    scene.remove(m.mesh);  m.mat.dispose();
    scene.remove(m.halo);  m.haloMat.dispose();
    if (m.ring) { scene.remove(m.ring); m.ringMat.dispose(); }
    m.label.remove();
  });
  moonData = [];
  moonMeshes.length = 0;
}

function updateMoons() {
  if (!moonData.length) return;
  const cx = focusedNode.x, cy = focusedNode.y, cz = focusedNode.z;
  const now = performance.now();

  moonData.forEach(m => {
    // Staggered fade-in per moon
    if (m._spawnTime === undefined) m._spawnTime = now;
    const elapsed = now - m._spawnTime;
    const targetAlpha = elapsed > m.fadeDelay ? 1.0 : 0.0;
    m.moonAlpha += (targetAlpha - m.moonAlpha) * 0.055;

    m.mat.opacity = m.moonAlpha;

    m.angle += m.speed;

    const cosI = Math.cos(m.incl), sinI = Math.sin(m.incl);
    const ox = Math.cos(m.angle) * m.orbitR;
    const oy = Math.sin(m.angle) * m.orbitR * sinI;
    const oz = Math.sin(m.angle) * m.orbitR * cosI;
    const wx = cx + ox, wy = cy + oy, wz = cz + oz;

    m.mesh.position.set(wx, wy, wz);
    m.mesh.rotation.y += 0.008;
    m.halo.position.set(wx, wy, wz);

    if (m.ring) {
      m.ring.position.set(wx, wy, wz);
      m.ring.rotation.x = Math.PI / 2 + m.incl * 0.6;
      m.ring.rotation.z = m.angle * 0.3;
      m.ringMat.opacity = m.moonAlpha * 0.55;
    }

    const t = now * 0.001;
    m.haloMat.opacity = m.moonAlpha * (0.12 + Math.sin(t * 1.1 + m.phase) * 0.07);

    const sp = toScreen(new THREE.Vector3(wx, wy, wz));
    const vis = sp.x > 0 && sp.x < window.innerWidth && sp.y > 0 && sp.y < window.innerHeight;
    m.label.style.left    = sp.x + 'px';
    m.label.style.top     = (sp.y + m.mSize + 8) + 'px';
    m.label.style.opacity = vis ? (m.moonAlpha * 0.9).toFixed(3) : '0';
  });
}

// ─── ORBITING SPACESHIP ──────────────────────────────────────────────────────
let shipGroup = null;
let shipData = null;

function buildShip() {
  clearShip();
  if (!focusedNode) return;

  shipGroup.add(panelL);
  const panelR = new THREE.Mesh(panelGeo, panelMat);
  panelR.position.x = 5.5;
  shipGroup.add(panelR);

  // ── Panel struts — thin cylinders connecting bus to panels ──
  const strutGeo = new THREE.CylinderGeometry(0.12, 0.12, 3.0, 4);
  const strutL = new THREE.Mesh(strutGeo, metalMat);
  strutL.rotation.z = Math.PI / 2;
  strutL.position.x = -2.5;
  shipGroup.add(strutL);
  const strutR = new THREE.Mesh(strutGeo, metalMat);
  strutR.rotation.z = Math.PI / 2;
  strutR.position.x = 2.5;
  shipGroup.add(strutR);

  // ── Antenna dish — small cone on top ──
  const dishGeo = new THREE.ConeGeometry(0.8, 1.5, 8, 1, true);
  const dishMat = new THREE.MeshPhongMaterial({
    color: 0xaaaaaa,
    side: THREE.DoubleSide,

  });
  const dish = new THREE.Mesh(dishGeo, dishMat);
  dish.position.y = 2;
  dish.rotation.x = Math.PI;
  shipGroup.add(dish);
  const antennaGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.8, 4);
  const antenna = new THREE.Mesh(antennaGeo, metalMat);
  antenna.position.y = 2.8;
  shipGroup.add(antenna);

  // ── Signal glow — faint pulsing light at antenna tip ──
  const engineGeo = new THREE.SphereGeometry(0.5, 8, 6);
  const engineMat = new THREE.MeshBasicMaterial({
    color: domColor,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const signalLight = new THREE.Mesh(engineGeo, engineMat);
  signalLight.position.y = 3.8;
  shipGroup.add(signalLight);

  // ── Signal halo ──
  const haloGeo = new THREE.SphereGeometry(1.5, 8, 6);
  const haloMat = new THREE.MeshBasicMaterial({
    color: domColor,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const signalHalo = new THREE.Mesh(haloGeo, haloMat);
  signalHalo.position.y = 3.8;
  shipGroup.add(signalHalo);

  // ── Invisible hitbox for raycasting (larger than visual) ──
  const hitGeo = new THREE.SphereGeometry(8, 8, 6);
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  shipMeshForRaycast = new THREE.Mesh(hitGeo, hitMat);
  shipMeshForRaycast.userData.isShip = true;
  shipGroup.add(shipMeshForRaycast);

  scene.add(shipGroup);

  // Orbit params — faster and more tilted than moons
  const orbitR = n.size * 2.2 * 1.0 + 45;
  shipData = {
    orbitR,
    angle: Math.random() * Math.PI * 2,
    speed: 0.004,
    incl: 0.7 + Math.random() * 0.5,
    alpha: 0,
    engineMat,
    haloMat,
    spawnTime: performance.now(),
  };

}

function clearShip() {
  if (shipGroup) {
    scene.remove(shipGroup);
    shipGroup.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
    shipGroup = null;
    shipData = null;
    shipMeshForRaycast = null;
  }
}


function updateShip() {
  if (!shipData || !shipGroup || !focusedNode) return;

  const cx = focusedNode.x, cy = focusedNode.y, cz = focusedNode.z;
  const now = performance.now();
  const elapsed = now - shipData.spawnTime;

  // Fade in
  shipData.alpha += ((elapsed > 800 ? 1.0 : 0.0) - shipData.alpha) * 0.04;

  shipData.angle += shipData.speed;

  const cosI = Math.cos(shipData.incl), sinI = Math.sin(shipData.incl);
  const ox = Math.cos(shipData.angle) * shipData.orbitR;
  const oy = Math.sin(shipData.angle) * shipData.orbitR * sinI;
  const oz = Math.sin(shipData.angle) * shipData.orbitR * cosI;
  const wx = cx + ox, wy = cy + oy, wz = cz + oz;

  shipGroup.position.set(wx, wy, wz);

  // Satellite slowly rotates — solar panels catch light from different angles
  shipGroup.rotation.y += 0.003;
  shipGroup.rotation.x = Math.sin(now * 0.0005) * 0.15;

  // Scale and opacity
  shipGroup.scale.setScalar(shipData.alpha * 1.0);

  // Signal light blinks
  shipData.engineMat.opacity = shipData.alpha * (0.3 + Math.max(0, Math.sin(now * 0.005)) * 0.7);
  shipData.haloMat.opacity = shipData.alpha * (0.08 + Math.max(0, Math.sin(now * 0.005)) * 0.15);
}

// ─── FORCE SIMULATION ───────────────────────────────────────────────────────
let alpha = 1.0;
const ALPHA_DECAY   = 0.016;
const ALPHA_MIN     = 0.004; // keep gently alive forever
const VEL_DECAY     = 0.58;
const REP_STR       = 7500;
const LINK_TARGET   = 88;
const LINK_STR      = 0.28;
const CLUSTER_STR   = 0.022;

// Hover forces queued each frame
const hoverForces = new Map();

let settled = false;
const settlingEl = document.getElementById('settling');

function simTick() {
  const a = Math.max(alpha, ALPHA_MIN);

  // Repulsion (O(n²))
  for (let i = 0; i < nodes.length; i++) {
    const p = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const q = nodes[j];
      const dx = p.x - q.x, dy = p.y - q.y, dz = p.z - q.z;
      const d2 = dx*dx + dy*dy + dz*dz + 1;
      const f = REP_STR * a / d2;
      p.vx += dx*f; p.vy += dy*f; p.vz += dz*f;
      q.vx -= dx*f; q.vy -= dy*f; q.vz -= dz*f;
    }
  }

  // Link attraction
  for (const l of links) {
    const s = l.source, t = l.target;
    const dx = t.x-s.x, dy = t.y-s.y, dz = t.z-s.z;
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
    const f = (d - LINK_TARGET) * LINK_STR * a / d;
    s.vx += dx*f; s.vy += dy*f; s.vz += dz*f;
    t.vx -= dx*f; t.vy -= dy*f; t.vz -= dz*f;
  }

  // Domain clustering
  for (const n of nodes) {
    const c = DOMAIN_CENTERS[n.domain];
    if (!c) continue;
    n.vx += (c[0] - n.x) * CLUSTER_STR * a;
    n.vy += (c[1] - n.y) * CLUSTER_STR * a;
    n.vz += (c[2] - n.z) * CLUSTER_STR * a;
  }

  // Hover attraction forces
  for (const [id, f] of hoverForces) {
    const n = nodeMap.get(id);
    if (n) { n.vx += f.x; n.vy += f.y; n.vz += f.z; }
  }
  hoverForces.clear();

  // Focused node — smooth float from rest position.
  // No abrupt phase switches: just a gentle sinusoidal drift that starts
  // immediately and eases in over ~90 frames so the node doesn't snap.
  if (focusedNode && focusedNode._restX !== undefined) {
    const n = focusedNode;
    const t   = performance.now() * 0.001;
    const amp = n.size * 1.4;

    // Ease-in blend: 0→1 over first ~1.5s so the float starts invisibly slow
    if (n._floatStart === undefined) n._floatStart = t;
    const elapsed = t - n._floatStart;
    const blend   = Math.min(elapsed / 1.5, 1);
    const ease    = blend * blend * (3 - 2 * blend); // smoothstep

    const floatX = n._restX + Math.sin(t * 0.7)  * amp * ease;
    const floatY = n._restY + Math.sin(t * 0.53) * amp * ease * 0.8;
    const floatZ = n._restZ + Math.sin(t * 0.41) * amp * ease * 0.6;

    n.x += (floatX - n.x) * 0.06;
    n.y += (floatY - n.y) * 0.06;
    n.z += (floatZ - n.z) * 0.06;
    n.vx = 0; n.vy = 0; n.vz = 0;
  }

  // Integrate — coasting nodes use gentler decay so they drift rather than snap
  const now = performance.now();
  const COAST_MS  = 1400; // how long a node coasts after leaving hover zone
  const COAST_DECAY = 0.97; // much gentler than VEL_DECAY=0.58
  for (const n of nodes) {
    let decay = VEL_DECAY;
    if (n._hoverReleaseTime) {
      const age = now - n._hoverReleaseTime;
      if (age < COAST_MS) {
        // Blend from coast decay → normal decay over the coast window
        const t = age / COAST_MS;
        decay = COAST_DECAY + (VEL_DECAY - COAST_DECAY) * (t * t);
      } else {
        delete n._hoverReleaseTime;
      }
    }
    n.vx *= decay; n.vy *= decay; n.vz *= decay;
    n.x += n.vx; n.y += n.vy; n.z += n.vz;
  }

  if (alpha > ALPHA_MIN) {
    alpha -= ALPHA_DECAY * (alpha - ALPHA_MIN);
    if (alpha <= ALPHA_MIN + 0.001 && !settled) {
      settled = true;
      settlingEl.style.opacity = '0';
      setTimeout(() => settlingEl.remove(), 1200);
    }
  }
}

function updateScene() {
  for (const n of nodes) {
    n.mesh.position.set(n.x, n.y, n.z);
    n.mesh.rotation.y += n.mesh.userData.rotSpeed;
    if (n.atm) n.atm.position.set(n.x, n.y, n.z);
    if (n.outerAtm) n.outerAtm.position.set(n.x, n.y, n.z);
    if (n.ring) {
      n.ring.position.set(n.x, n.y, n.z);
      n.ring.rotation.z += 0.0003; // slow ring rotation
    }
  }
  updateMoons();
  updateShip();
  let idx = 0;
  for (const l of links) {
    edgePosArr[idx++] = l.source.x; edgePosArr[idx++] = l.source.y; edgePosArr[idx++] = l.source.z;
    edgePosArr[idx++] = l.target.x; edgePosArr[idx++] = l.target.y; edgePosArr[idx++] = l.target.z;
  }
  edgeGeo.attributes.position.needsUpdate = true;

  // Update focused glow edges
  if (focusEdgeLinks.length > 0) {
    const pos = focusEdgeGeo.attributes.position;
    const arr = pos.array;
    let fi = 0;
    for (const l of focusEdgeLinks) {
      arr[fi++] = l.source.x; arr[fi++] = l.source.y; arr[fi++] = l.source.z;
      arr[fi++] = l.target.x; arr[fi++] = l.target.y; arr[fi++] = l.target.z;
    }
    pos.needsUpdate = true;
  }
}

// ─── CAMERA / ORBIT ─────────────────────────────────────────────────────────
let camTheta = 0.5, camPhi = 1.25, camRadius = 1600;
const lookTarget = new THREE.Vector3();
let isDragging = false, prevX = 0, prevY = 0, mouseDownX = 0, mouseDownY = 0;
let autoRotate = true;
let lastInteraction = 0;
const RESUME_DELAY = 2800; // ms before rotation resumes after drag

function setCamFromSpherical() {
  camera.position.set(
    camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    camRadius * Math.cos(camPhi),
    camRadius * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(lookTarget);
}
setCamFromSpherical();

// Camera animation — general purpose (used for unfocus)
let camAnim = null;
const _v3a = new THREE.Vector3(), _v3b = new THREE.Vector3();

function animateCamTo(endPos, endLook, frames) {
  camAnim = {
    startPos: camera.position.clone(),
    endPos: endPos.clone(),
    startLook: lookTarget.clone(),
    endLook: endLook.clone(),
    t: 0, frames
  };
  focusCamAnim = null; // cancel focus anim if active
}

// Two-phase focus camera: zoom in → decelerate → pull back 25% → hold
let focusCamAnim = null;

function startFocusCamAnim(nodePos) {
  camAnim = null;
  const dir      = camera.position.clone().sub(nodePos).normalize();
  const closePos = nodePos.clone().add(dir.clone().multiplyScalar(180));  // close stop
  const holdPos  = nodePos.clone().add(dir.clone().multiplyScalar(230));  // hold = 25% back
  focusCamAnim = {
    startPos:  camera.position.clone(),
    startLook: lookTarget.clone(),
    nodePos:   nodePos.clone(),
    closePos, holdPos,
    phase: 'zoomIn',  // zoomIn → pullBack → done
    t: 0,
    zoomFrames: 75,   // frames to zoom in
    pullFrames:  55,  // frames to pull back
  };
}

canvas.addEventListener('pointerdown', e => {
  // Don't orbit if clicking on the info panel
  if (e.target !== canvas) return;
  isDragging = true;
  lastInteraction = performance.now();
  prevX = mouseDownX = e.clientX;
  prevY = mouseDownY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
  if (camAnim) camAnim = null;
});
canvas.addEventListener('pointerup', e => {
  isDragging = false;
  canvas.releasePointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (isDragging) {
    const dx = e.clientX - prevX, dy = e.clientY - prevY;
    camTheta -= dx * 0.006;
    camPhi = Math.max(0.08, Math.min(Math.PI - 0.08, camPhi - dy * 0.006));
    prevX = e.clientX; prevY = e.clientY;
    setCamFromSpherical();
  }
  doHover(e);
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camRadius *= 1 + e.deltaY * 0.0018;
  camRadius = Math.max(180, Math.min(5000, camRadius));
  setCamFromSpherical();
}, { passive: false });

// ─── HOVER ──────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 10 };
const mouse2d = new THREE.Vector2();
let hoveredNode = null;
const hoverLabelEl = document.getElementById('hover-label');
const _closest = new THREE.Vector3();

function toScreen(worldPos) {
  const v = worldPos.clone().project(camera);
  return {
    x: (v.x + 1) / 2 * window.innerWidth,
    y: -(v.y - 1) / 2 * window.innerHeight
  };
}

function doHover(e) {
  mouse2d.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const ray = raycaster.ray;

  // Check spaceship hover for pointer cursor
  let shipHovered = false;
  if (shipMeshForRaycast && focusedNode) {
    const shipHits = raycaster.intersectObject(shipMeshForRaycast, true);
    if (shipHits.length > 0) {
      shipHovered = true;
      canvas.style.cursor = 'pointer';
      hoverLabelEl.textContent = 'Explore on Wikipedia →';
      const sp = toScreen(shipGroup.position);
      hoverLabelEl.style.left = sp.x + 'px';
      hoverLabelEl.style.top = (sp.y - 24) + 'px';
      hoverLabelEl.style.opacity = '1';
    }
  }
  if (!shipHovered && canvas.style.cursor === 'pointer') {
    canvas.style.cursor = 'grab';
  }

  // Raycast for exact hits
  const hits = raycaster.intersectObjects(nodeMeshes);
  const newHover = hits.length ? hits[0].object.userData.node : null;

  if (hoveredNode !== newHover) {
    if (hoveredNode && hoveredNode !== focusedNode) {
      hoveredNode.mesh.material.emissiveIntensity = 0.015;
    }
    hoveredNode = newHover;
    if (hoveredNode) {
      hoveredNode.mesh.material.emissiveIntensity = 0.1;
      const sp = toScreen(new THREE.Vector3(hoveredNode.x, hoveredNode.y, hoveredNode.z));
      hoverLabelEl.style.left  = sp.x + 'px';
      hoverLabelEl.style.top   = (sp.y - 34) + 'px';
      hoverLabelEl.textContent = hoveredNode.id;
      hoverLabelEl.style.opacity = '1';
    } else {
      hoverLabelEl.style.opacity = '0';
    }
  } else if (hoveredNode) {
    // Keep label position updated
    const sp = toScreen(new THREE.Vector3(hoveredNode.x, hoveredNode.y, hoveredNode.z));
    hoverLabelEl.style.left = sp.x + 'px';
    hoverLabelEl.style.top  = (sp.y - 34) + 'px';
  }

  // Hover attraction: attract nearby nodes toward mouse ray (skip focused node)
  // Track which nodes are currently attracted so we can stamp a release time on departure
  const attractedThisFrame = new Set();
  for (const n of nodes) {
    if (focusedNode && n.id === focusedNode.id) continue;
    const nPos = _v3a.set(n.x, n.y, n.z);
    ray.closestPointToPoint(nPos, _closest);
    const dist = nPos.distanceTo(_closest);
    const maxR = 130;
    if (dist < maxR) {
      const strength = Math.pow(1 - dist / maxR, 2) * 2.2;
      const dir = _v3b.copy(_closest).sub(nPos);
      const len = dir.length();
      if (len > 0.01) {
        dir.divideScalar(len);
        hoverForces.set(n.id, { x: dir.x * strength, y: dir.y * strength, z: dir.z * strength });
        attractedThisFrame.add(n.id);
        n._wasAttracted = true;
        delete n._hoverReleaseTime; // actively attracted — no coast
      }
    }
  }
  // Stamp release time on nodes that just left the attraction zone
  for (const n of nodes) {
    if (n._wasAttracted && !attractedThisFrame.has(n.id)) {
      n._hoverReleaseTime = performance.now();
      delete n._wasAttracted;
    }
  }
}

function getNeighborNames(n) {
  const seen = new Set();
  links.forEach(l => {
    if (l.source.id === n.id && nodeMap.has(l.target.id)) seen.add(l.target.id);
    if (l.target.id === n.id && nodeMap.has(l.source.id)) seen.add(l.source.id);
  });
  return Array.from(seen);
}

function positionPanel(screenX, screenY) {
  const panel = nodeInfoEl;
  const W = window.innerWidth, H = window.innerHeight;
  const pw = 576, ph = panel.offsetHeight || 320;
  const margin = 28;

  // Pin to the corner OPPOSITE the node so it's always out of the way
  const goRight = screenX < W / 2;
  const goDown  = screenY < H / 2;

  // Corner anchoring — panel hugs the screen edge, not the node
  const panelX = goRight ? margin : W - pw - margin;
  const panelY = goDown  ? margin + 60 : H - ph - margin;

  // Hard clamp — never let any edge escape the viewport
  const clampedX = Math.max(margin, Math.min(W - pw - margin, panelX));
  const clampedY = Math.max(margin, Math.min(H - ph - margin, panelY));

  panel.style.left = clampedX + 'px';
  panel.style.top  = clampedY + 'px';

  const anchorX = goRight ? clampedX + pw : clampedX;
  const anchorY = Math.max(clampedY + 20, Math.min(clampedY + ph - 20, screenY));

  leaderLine.setAttribute('x1', screenX);
  leaderLine.setAttribute('y1', screenY);
  leaderLine.setAttribute('x2', anchorX);
  leaderLine.setAttribute('y2', anchorY);
  leaderDot.setAttribute('cx', screenX);
  leaderDot.setAttribute('cy', screenY);
}

// Wikipedia image cache to avoid re-fetching
const wikiImageCache = new Map();

async function fetchWikiImage(title) {
  if (wikiImageCache.has(title)) return wikiImageCache.get(title);
  const cleanTitle = title.replace(/\s*\((?:Med|Interdis\.)\)\s*$/, '').trim();
  const slug = encodeURIComponent(cleanTitle.replace(/ /g, '_'));
  const api = 'https://en.wikipedia.org/w/api.php';
  try {
    // Step 1: Try pageimages (lead image)
    const r1 = await fetch(`${api}?action=query&titles=${slug}&prop=pageimages&piprop=thumbnail&pithumbsize=500&format=json&origin=*`);
    const d1 = await r1.json();
    const p1 = Object.values(d1?.query?.pages || {})[0];
    if (p1?.thumbnail?.source) {
      wikiImageCache.set(title, p1.thumbnail.source);
      return p1.thumbnail.source;
    }
    // Step 2: Fall back to first article image (skip SVGs and icons)
    const r2 = await fetch(`${api}?action=query&titles=${slug}&prop=images&imlimit=15&format=json&origin=*`);
    const d2 = await r2.json();
    const p2 = Object.values(d2?.query?.pages || {})[0];
    const imgs = (p2?.images || [])
      .map(im => im.title)
      .filter(t => /\.(jpg|jpeg|png|gif)$/i.test(t))
      .filter(t => !/icon|logo|symbol|flag|edit|lock|question|disambig|commons|stub|wiki/i.test(t));
    if (imgs.length === 0) { wikiImageCache.set(title, ''); return ''; }
    // Step 3: Get thumbnail URL for the best candidate
    const fileSlug = encodeURIComponent(imgs[0]);
    const r3 = await fetch(`${api}?action=query&titles=${fileSlug}&prop=imageinfo&iiprop=url&iiurlwidth=500&format=json&origin=*`);
    const d3 = await r3.json();
    const p3 = Object.values(d3?.query?.pages || {})[0];
    const thumb = p3?.imageinfo?.[0]?.thumburl || '';
    wikiImageCache.set(title, thumb);
    return thumb;
  } catch(e) { wikiImageCache.set(title, ''); return ''; }
}

function makePlaceholderSVG(color, label) {
  // Generate a subtle abstract placeholder with domain color
  // Seeded pattern from label so each node gets a unique one
  let seed = 0;
  for (let i = 0; i < label.length; i++) seed = (seed * 31 + label.charCodeAt(i)) & 0xfffffff;
  const r = (n) => { seed = (seed * 16807) % 2147483647; return ((seed - 1) / 2147483646) * n; };

  // Parse hex color to RGB
  const hex = color.replace('#', '');
  const cr = parseInt(hex.slice(0,2), 16);
  const cg = parseInt(hex.slice(2,4), 16);
  const cb = parseInt(hex.slice(4,6), 16);

  // Build abstract shapes — circles, arcs, lines
  let shapes = '';
  // Background gradient
  shapes += `<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="rgb(${Math.round(cr*0.15)},${Math.round(cg*0.15)},${Math.round(cb*0.15)})"/>
    <stop offset="100%" stop-color="rgb(${Math.round(cr*0.08)},${Math.round(cg*0.08)},${Math.round(cb*0.08)})"/>
  </linearGradient></defs>`;
  shapes += `<rect width="560" height="110" fill="url(#bg)"/>`;

  // Grid of subtle dots
  for (let x = 20; x < 560; x += 30 + r(20)) {
    for (let y = 15; y < 110; y += 25 + r(15)) {
      const opacity = 0.03 + r(0.06);
      shapes += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${1 + r(1.5)}" fill="rgba(${cr},${cg},${cb},${opacity.toFixed(3)})"/>`;
    }
  }

  // A few larger accent circles
  for (let i = 0; i < 4; i++) {
    const cx = 60 + r(440), cy = 15 + r(80), radius = 15 + r(40);
    shapes += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${radius.toFixed(1)}" fill="none" stroke="rgba(${cr},${cg},${cb},${(0.06 + r(0.08)).toFixed(3)})" stroke-width="${0.5 + r(1)}"/>`;
  }

  // Connecting lines
  for (let i = 0; i < 3; i++) {
    const x1 = r(560), y1 = r(110), x2 = r(560), y2 = r(110);
    shapes += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(${cr},${cg},${cb},${(0.04 + r(0.06)).toFixed(3)})" stroke-width="0.5"/>`;
  }

  // Central glow
  shapes += `<ellipse cx="280" cy="55" rx="${80 + r(60)}" ry="${30 + r(20)}" fill="rgba(${cr},${cg},${cb},0.04)"/>`;

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="560" height="110" viewBox="0 0 560 110">${shapes}</svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}

function showInfo(n, screenX, screenY) {
  nodeInfoName.textContent = n.id;
  nodeInfoDom.textContent  = n.domain;
  nodeInfoDom.style.color  = DOMAINS[n.domain]?.color || '#aaa';
  nodeInfoDesc.textContent = NODE_DESCRIPTIONS[n.id] || '';

  // Wikipedia image
  const imgWrap = document.getElementById('node-info-img-wrap');
  const imgEl   = document.getElementById('node-info-img');
  imgWrap.classList.remove('visible');
  imgEl.classList.remove('loaded');
  imgEl.src = '';

  const domainColor = DOMAINS[n.domain]?.color || '#c8b89a';
  fetchWikiImage(n.id).then(url => {
    if (focusedNode !== n) return;
    if (url) {
      imgEl.src = url;
      imgEl.alt = n.id;
      imgWrap.classList.add('visible');
      imgEl.onload = () => imgEl.classList.add('loaded');
      imgEl.onerror = () => {
        imgEl.src = makePlaceholderSVG(domainColor, n.id);
        imgWrap.classList.add('visible');
        imgEl.onload = () => imgEl.classList.add('loaded');
      };
    } else {
      imgEl.src = makePlaceholderSVG(domainColor, n.id);
      imgEl.alt = n.id;
      imgWrap.classList.add('visible');
      imgEl.onload = () => imgEl.classList.add('loaded');
    }
  });

  // Wikipedia link — encode spaces as underscores, standard WP convention
  const wikiSlug = encodeURIComponent(n.id.replace(/ /g, '_'));
  nodeInfoWiki.href = `https://en.wikipedia.org/wiki/${wikiSlug}`;
  nodeInfoWiki.textContent = `↗ Wikipedia: ${n.id}`;

  // Related chips
  nodeInfoRelated.innerHTML = '';
  const neighbors = getNeighborNames(n).slice(0, 12);
  neighbors.forEach(name => {
    const chip = document.createElement('span');
    chip.className = 'related-chip';
    chip.textContent = name;
    const col = DOMAINS[nodeMap.get(name)?.domain]?.color || '#aaa';
    chip.style.borderColor = col + '55';

  });

  nodeInfoEl.classList.add('visible');
  leaderLine.style.display = 'block';
  leaderDot.style.display  = 'block';

  // Position after adding content (need next frame for height)
  requestAnimationFrame(() => positionPanel(screenX, screenY));

function dimToNeighbors(n) {
  const nb = new Set([n.id]);
  links.forEach(l => {
    if (l.source.id === n.id) nb.add(l.target.id);
    if (l.target.id === n.id) nb.add(l.source.id);
  });
  nodes.forEach(m => {
    const inNb = nb.has(m.id);
    m._targetOpacity    = inNb ? 1.0 : 0.05;
    m._targetAtmOpacity = inNb ? (m.id === n.id ? 0.12 : 0.05) : 0.005;
    m.mesh.material.transparent = true;
  });
  edgeMat.opacity = 0.06;
}
function resetDim() {
  nodes.forEach(n => {
    n._targetOpacity    = 1.0;
    n._targetAtmOpacity = 0.06;
  });
  edgeMat.opacity = 0.28;
}
// Call this every frame to lerp toward targets
function tickDim() {
  nodes.forEach(n => {
    if (n._targetOpacity === undefined) return;
    const cur = n.mesh.material.opacity;
    const tgt = n._targetOpacity;
    if (Math.abs(cur - tgt) > 0.002) {
      const next = cur + (tgt - cur) * 0.08;
      n.mesh.material.opacity = next;
      if (tgt >= 1.0 && next > 0.98) {
        n.mesh.material.opacity = 1.0;
        n.mesh.material.transparent = false;
      }
    }
    if (n.atmMat && n._targetAtmOpacity !== undefined) {
      n.atmMat.opacity += (n._targetAtmOpacity - n.atmMat.opacity) * 0.08;
    }
  });
  // Fade focus edges in/out smoothly
  if (focusEdgeLinks.length > 0) {
    focusEdgeHaloMat.opacity += (0.55 - focusEdgeHaloMat.opacity) * 0.06;
    focusEdgeCoreMat.opacity += (0.92 - focusEdgeCoreMat.opacity) * 0.06;
  } else {
    focusEdgeHaloMat.opacity *= 0.88;
    focusEdgeCoreMat.opacity *= 0.88;
  }
}

function getNodeScreenPos(n) {
  const pos = new THREE.Vector3(n.x, n.y, n.z);
  const toCamera = camera.position.clone().sub(pos).normalize();
  const frontPos = pos.clone().add(toCamera.multiplyScalar(n.size * 2.2 * 1.1));
  const v = frontPos.project(camera);
  return {
    x: (v.x + 1) / 2 * window.innerWidth,
    y: -(v.y - 1) / 2 * window.innerHeight
  };
}

function focusNode(n) {
  if (focusedNode) {
    delete focusedNode._restX;
    delete focusedNode._restY;
    delete focusedNode._restZ;
    delete focusedNode._floatStart;
    clearFocusLabel();
    clearFocusEdges();
    clearMoons();
    clearShip();
    resetDim();
  }
  focusCamAnim = null;
  focusedNode  = n;
  n._restX = n.x; n._restY = n.y; n._restZ = n.z;
  n._floatStart = undefined;
  dimToNeighbors(n);
  buildFocusEdges(n);
  buildMoons(n);
  buildShip();
  playChime(n.domain);
  applyFocusLabel(n);
  startFocusCamAnim(new THREE.Vector3(n.x, n.y, n.z));
  setTimeout(() => {
    if (focusedNode === n) {
      const sp = getNodeScreenPos(n);
      showInfo(n, sp.x, sp.y);
    }
  }, 700);
}

canvas.addEventListener('click', e => {
  const dx = e.clientX - mouseDownX, dy = e.clientY - mouseDownY;
  if (Math.sqrt(dx*dx + dy*dy) > 6) return;

  mouse2d.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);

  // Check spaceship first
  if (shipMeshForRaycast && focusedNode) {
    const shipHits = raycaster.intersectObject(shipMeshForRaycast, true);
    if (shipHits.length > 0) {
      const slug = encodeURIComponent(focusedNode.id.replace(/\s*\((?:Med|Interdis\.)\)\s*$/, '').trim().replace(/ /g, '_'));
      window.open(`https://en.wikipedia.org/wiki/${slug}#See_also`, '_blank');
      return;
    }
  }

  // Check moons
  if (moonMeshes.length) {
    const moonHits = raycaster.intersectObjects(moonMeshes);
    if (moonHits.length > 0) {
      const moonNode = moonHits[0].object.userData.moonNode;
      if (moonNode) { focusNode(moonNode); return; }
    }
  }

  const hits = raycaster.intersectObjects(nodeMeshes);

  if (hits.length > 0) {
    const n = hits[0].object.userData.node;
    if (focusedNode === n) {
      delete focusedNode._restX; delete focusedNode._restY; delete focusedNode._restZ;
      delete focusedNode._floatStart;
      focusCamAnim = null;
      clearFocusLabel(); clearFocusEdges(); clearMoons(); clearShip();
      focusedNode = null;
      resetDim();
      hideInfo();
      const endPos = new THREE.Vector3(
        camRadius * Math.sin(camPhi) * Math.sin(camTheta),
        camRadius * Math.cos(camPhi),
        camRadius * Math.sin(camPhi) * Math.cos(camTheta)
      );
      animateCamTo(endPos, new THREE.Vector3(0,0,0), 70);
    } else {
      focusNode(n);
    }
  } else if (focusedNode) {
    delete focusedNode._restX; delete focusedNode._restY; delete focusedNode._restZ;
    delete focusedNode._floatStart;
    focusCamAnim = null;
    clearFocusLabel(); clearFocusEdges(); clearMoons();
    focusedNode = null;
    resetDim();
    hideInfo();
    const endPos = new THREE.Vector3(
      camRadius * Math.sin(camPhi) * Math.sin(camTheta),
      camRadius * Math.cos(camPhi),
      camRadius * Math.sin(camPhi) * Math.cos(camTheta)
    );
    animateCamTo(endPos, new THREE.Vector3(0,0,0), 70);
  }
});

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;
let audioStarted = false;

// Domain → chime root frequency (pentatonic-ish spread)
const DOMAIN_FREQS = {
  "Formal Sciences":           65.41,   // C2
  "Physical Sciences":         73.42,   // D2
  "Earth & Space":             82.41,   // E2
  "Life Sciences":             87.31,   // F2
  "Chemistry":                 98.00,   // G2
  "Medicine & Health":         110.00,  // A2
  "Social Sciences":           123.47,  // B2
  "Humanities":                130.81,  // C3
  "Arts & Design":             146.83,  // D3
  "Engineering & Tech":        55.00,   // A1
  "Interdisciplinary":         61.74,   // B1
  "Esoteric & Occult":         46.25,   // F#1
  "Contemplative Traditions":  51.91,   // Ab1
  "Indigenous & Traditional":  58.27,   // Bb1
  "Consciousness & Fringe":    38.89,   // Eb1
};

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── Reverb convolver (synthetic IR) ──────────────────────────────────────
  const revLen  = audioCtx.sampleRate * 4.5;
  const revBuf  = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = revBuf.getChannelData(c);
    for (let i = 0; i < revLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revLen, 2.2);
    }
  }
  const reverb = audioCtx.createConvolver();
  reverb.buffer = revBuf;

  // Master volume — slider and mute both control this
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('vol-slider').value);
  masterGain.connect(audioCtx.destination);
  audioCtx._masterGain = masterGain;

  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.55;
  reverb.connect(reverbGain);
  reverbGain.connect(masterGain);

  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.18;
  dryGain.connect(masterGain);

  // ── Ambient pad layer ─────────────────────────────────────────────────────
  // Slow-evolving drone: stacked detuned sine oscillators
  const padNotes = [65.41, 130.81, 196.00, 261.63, 329.63]; // C2 pentatonic

  padNotes.forEach((freq, idx) => {
    const count = 3;
    for (let v = 0; v < count; v++) {
      const osc = audioCtx.createOscillator();
      osc.type = v === 0 ? 'sine' : 'triangle';
      osc.frequency.value = freq * (1 + (v - 1) * 0.003); // slight detune

      // Slow LFO tremolo per voice
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.03 + idx * 0.007 + v * 0.013;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.004;
      lfo.connect(lfoGain);

      const voiceGain = audioCtx.createGain();
      voiceGain.gain.value = 0.012 / count;
      lfoGain.connect(voiceGain.gain);

      osc.connect(voiceGain);
      voiceGain.connect(reverb);
      voiceGain.connect(dryGain);

      osc.start();
      lfo.start();
    }
  });

  // ── Slow melodic breath: random pentatonic notes fading in/out ────────────
  const pentatonic = [130.81, 146.83, 164.81, 196.00, 220.00,
                      261.63, 293.66, 329.63, 392.00, 440.00];

  function breathNote() {
    if (!audioCtx) return;
    const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
    const dur  = 5 + Math.random() * 8;
    const wait = 3 + Math.random() * 9;

    const osc  = audioCtx.createOscillator();
    osc.type   = 'sine';
    osc.frequency.value = freq;

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.022, audioCtx.currentTime + dur * 0.3);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);

    osc.connect(g);
    g.connect(reverb);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);

    setTimeout(breathNote, (wait + dur * 0.6) * 1000);
  }
  breathNote();
  setTimeout(breathNote, 2000);
  setTimeout(breathNote, 5500);

  // Store refs for chime
  audioCtx._reverb  = reverb;
  audioCtx._revGain = reverbGain;
}

function playChime(domain) {
  if (!audioCtx) return;
  const root = DOMAIN_FREQS[domain] || 65.41;
  const now  = audioCtx.currentTime;

  // Soft tone: pure harmonic series, sine waves only, slow swell
  // Ratios 1× 2× 3× give a warm organ/pad quality — no inharmonic bell clang
  const partials = [1, 2, 3, 4];
  const amps     = [1.0, 0.28, 0.10, 0.04];
  const attackT  = 0.35;   // slow soft attack
  const holdT    = 1.0;
  const decayT   = 4.5;

  partials.forEach((ratio, i) => {
    const osc = audioCtx.createOscillator();
    osc.type  = 'sine';
    osc.frequency.value = root * ratio;

    // Slight vibrato on fundamental for warmth
    if (i === 0) {
      const vib = audioCtx.createOscillator();
      vib.frequency.value = 4.5;
      const vibGain = audioCtx.createGain();
      vibGain.gain.value = root * 0.003;
      vib.connect(vibGain);
      vibGain.connect(osc.frequency);
      vib.start(now);
      vib.stop(now + attackT + holdT + decayT);
    }

    const g  = audioCtx.createGain();
    const pk = 0.055 * amps[i];
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(pk, now + attackT);          // slow swell in
    g.gain.linearRampToValueAtTime(pk * 0.85, now + attackT + holdT); // gentle hold
    g.gain.linearRampToValueAtTime(0.0001, now + attackT + holdT + decayT); // long fade

    osc.connect(g);
    g.connect(audioCtx._reverb);
    g.connect(audioCtx._masterGain);
    osc.start(now);
    osc.stop(now + attackT + holdT + decayT + 0.2);
  });
}

let _loadingDismissed = false;
function animate() {
  requestAnimationFrame(animate);

  // Dismiss loading screen after first render
  if (!_loadingDismissed) {
    _loadingDismissed = true;
    const ls = document.getElementById('loading-screen');
    if (ls) { ls.classList.add('hidden'); setTimeout(() => ls.remove(), 900); }
  }

  if (window._starTwinkle) window._starTwinkle();
  if (window._bhTick) window._bhTick();
  simTick();
  tickDim();        // FIX 1: was never called — instant opacity snaps are now lerped
  updateScene();
  updatePulses();

  // FIX 2: suppress auto-rotation entirely while a node is focused
  const canAutoRotate = !focusedNode && !focusCamAnim;

  // General camera animation (unfocus)
  if (camAnim) {
    camAnim.t++;
    const t    = Math.min(camAnim.t / camAnim.frames, 1);
    const ease = t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
    camera.position.lerpVectors(camAnim.startPos, camAnim.endPos, ease);
    lookTarget.lerpVectors(camAnim.startLook, camAnim.endLook, ease);
    camera.lookAt(lookTarget);
    if (camAnim.t >= camAnim.frames) {
      camAnim = null;
      // FIX 3: sync spherical coords from final camera position after unfocus
      const p = camera.position;
      camRadius = p.length();
      camPhi    = Math.acos(Math.max(-1, Math.min(1, p.y / camRadius)));
      camTheta  = Math.atan2(p.x, p.z);
    }
  }

  // Two-phase focus camera: zoom in → pull back 25%
  if (focusCamAnim) {
    const fc = focusCamAnim;
    fc.t++;

    // FIX 5: keep nodePos locked to where the float will settle, not where
    // the node was at click time. Update it from focusedNode each frame.
    if (focusedNode) {
      fc.nodePos.set(focusedNode.x, focusedNode.y, focusedNode.z);
      // Recompute close/hold along the same direction
      const dir = fc.startPos.clone().sub(fc.nodePos).normalize();
      fc.closePos.copy(fc.nodePos).addScaledVector(dir, 180);
      fc.holdPos .copy(fc.nodePos).addScaledVector(dir, 230);
    }

    if (fc.phase === 'zoomIn') {
      const raw  = Math.min(fc.t / fc.zoomFrames, 1);
      const ease = 1 - Math.pow(1 - raw, 3); // cubic ease-out
      camera.position.lerpVectors(fc.startPos, fc.closePos, ease);
      // FIX 4: lerp lookTarget smoothly rather than hard lookAt each frame
      lookTarget.lerp(fc.nodePos, 0.08);
      camera.lookAt(lookTarget);
      if (fc.t >= fc.zoomFrames) {
        fc.phase     = 'pullBack';
        fc.t         = 0;
        fc.pullStart = camera.position.clone();
      }

    } else if (fc.phase === 'pullBack') {
      const raw  = Math.min(fc.t / fc.pullFrames, 1);
      const ease = 0.5 - 0.5 * Math.cos(raw * Math.PI); // sine ease-in-out
      camera.position.lerpVectors(fc.pullStart, fc.holdPos, ease);
      lookTarget.lerp(fc.nodePos, 0.06);
      camera.lookAt(lookTarget);
      if (fc.t >= fc.pullFrames) {
        fc.phase = 'hold';
        // FIX 3: sync spherical coords so orbit system knows where we ended up
        const p = camera.position;
        camRadius = p.length();
        camPhi    = Math.acos(Math.max(-1, Math.min(1, p.y / camRadius)));
        camTheta  = Math.atan2(p.x, p.z);
        // FIX 5: now that camera is settled, lock node rest to its actual position
        if (focusedNode) {
          focusedNode._restX = focusedNode.x;
          focusedNode._restY = focusedNode.y;
          focusedNode._restZ = focusedNode.z;
          focusedNode._floatStart = undefined; // restart float ease from here
        }
      }

    } else {
      // Hold — gently track the floating node without jitter (FIX 4)
      if (focusedNode) {
        lookTarget.lerp(new THREE.Vector3(focusedNode.x, focusedNode.y, focusedNode.z), 0.03);
        camera.lookAt(lookTarget);
      }
    }
  }

  // Auto-rotation — suppressed while focused (FIX 2)
  if (canAutoRotate) {
    const idle = !isDragging && (performance.now() - lastInteraction > RESUME_DELAY);
    const rotBlend = idle ? Math.min(1, (performance.now() - lastInteraction - RESUME_DELAY) / 1200) : 0;
    if (rotBlend > 0) {
      camTheta += 0.00045 * rotBlend;
      camPhi = Math.max(0.08, Math.min(Math.PI - 0.08,
        camPhi + Math.sin(performance.now() * 0.00008) * 0.00012 * rotBlend
      ));
      setCamFromSpherical();
    }
  }

  renderer.render(scene, camera);
  updateFocusLabelPos();
  // Keep leader dot locked on node surface
  if (focusedNode && nodeInfoEl.classList.contains('visible')) {
    const sp = getNodeScreenPos(focusedNode);
    leaderDot.setAttribute('cx', sp.x);
    leaderDot.setAttribute('cy', sp.y);
    leaderLine.setAttribute('x1', sp.x);
    leaderLine.setAttribute('y1', sp.y);
  }
}

});

// ─── AUDIO CONTROLS ──────────────────────────────────────────────────────────
const volSlider = document.getElementById('vol-slider');
const muteBtn   = document.getElementById('mute-btn');
let isMuted     = false;
let lastVolume  = parseFloat(volSlider.value);

// Update slider fill track CSS variable
function updateSliderTrack(val) {
  volSlider.style.setProperty('--pct', (val * 100).toFixed(1) + '%');
}
updateSliderTrack(lastVolume);

volSlider.addEventListener('input', () => {
  lastVolume = parseFloat(volSlider.value);
  updateSliderTrack(lastVolume);
  if (audioCtx?._masterGain) {
    audioCtx._masterGain.gain.setTargetAtTime(isMuted ? 0 : lastVolume, audioCtx.currentTime, 0.05);
  }
  if (lastVolume > 0 && isMuted) {
    isMuted = false;
    muteBtn.textContent = '♪';
    muteBtn.style.opacity = '1';
  }
});

muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  if (audioCtx?._masterGain) {
    audioCtx._masterGain.gain.setTargetAtTime(isMuted ? 0 : lastVolume, audioCtx.currentTime, 0.08);
  }
  muteBtn.textContent = isMuted ? '♩' : '♪';
  muteBtn.style.opacity = isMuted ? '0.35' : '1';
});
</script>

<script>
// ─── TITLE SPRITE ─────────────────────────────────────────────────────────────
// A tiny comet crawls along the baseline of the title text, left to right,
// then disappears and restarts after a random pause. Subtle — you have to
// be watching to catch it.

(function() {
  const canvas  = document.getElementById('title-sprite');
  const ctx     = canvas.getContext('2d');
  const titleEl = document.getElementById('title');

  // Size canvas to full viewport
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Sprite state
  let spriteT      = 0;      // 0..1 along the title width
  let spriteActive = false;
  let spriteSpeed  = 0;
  let nextLaunch   = 0;
  const TAIL_LEN   = 0.055;  // tail length as fraction of title width

  function scheduleNext() {
    // Random pause 4–14 seconds between passes
    nextLaunch = performance.now() + 4000 + Math.random() * 10000;
    spriteActive = false;
  }
  scheduleNext();
  // First pass sooner so it's noticed
  nextLaunch = performance.now() + 1800;

  function tick(now) {
    requestAnimationFrame(tick);

    // Get title bounds each frame (handles font load / resize)
    const rect = titleEl.getBoundingClientRect();
    const x0   = rect.left;
    const x1   = rect.right;
    const y    = rect.top + rect.height * 0.82; // baseline-ish
    const W    = x1 - x0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!spriteActive) {
      if (now >= nextLaunch) {
        spriteActive = true;
        spriteT      = 0;
        // Slightly varying speed each pass — 6–11 seconds to cross
        spriteSpeed  = 1 / ((6 + Math.random() * 5) * 60);
      }
      return;
    }

    spriteT += spriteSpeed;
    if (spriteT > 1 + TAIL_LEN) { scheduleNext(); return; }

    const headX = x0 + spriteT * W;
    const tailX = x0 + Math.max(0, spriteT - TAIL_LEN) * W;

    // Fade in at start, fade out at end
    const fadeIn  = Math.min(spriteT / (TAIL_LEN * 0.6), 1);
    const fadeOut = Math.min((1 - spriteT) / 0.08 + 0.001, 1);
    const alpha   = Math.min(fadeIn, fadeOut) * 0.72;

    // ── Tail gradient ────────────────────────────────────────────────────────
    const grad = ctx.createLinearGradient(tailX, y, headX, y);
    grad.addColorStop(0,   `rgba(232,216,154,0)`);
    grad.addColorStop(0.6, `rgba(232,216,154,${(alpha * 0.3).toFixed(3)})`);
    grad.addColorStop(1,   `rgba(255,245,200,${alpha.toFixed(3)})`);

    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 1.5;
    ctx.shadowColor = 'rgba(255,240,180,0.9)';
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.moveTo(tailX, y);
    ctx.lineTo(headX, y);
    ctx.stroke();

    // ── Head glow dot ────────────────────────────────────────────────────────
    if (spriteT <= 1) {
      const radial = ctx.createRadialGradient(headX, y, 0, headX, y, 5);
      radial.addColorStop(0,   `rgba(255,255,220,${alpha.toFixed(3)})`);
      radial.addColorStop(0.4, `rgba(232,216,154,${(alpha * 0.5).toFixed(3)})`);
      radial.addColorStop(1,   'rgba(232,216,154,0)');
      ctx.fillStyle  = radial;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(headX, y, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
