function buildFocusEdges(n) {
  focusEdgeLinks = links.filter(l => l.source.id === n.id || l.target.id === n.id);
  // Resize buffer if needed
  const needed = focusEdgeLinks.length * 6;
  if (focusEdgePosArr.length < needed) {
    const newArr = new Float32Array(needed);
    focusEdgeGeo.setAttribute('position', new THREE.BufferAttribute(newArr, 3));
    focusEdgeGeo.attributes.position.usage = THREE.DynamicDrawUsage;
  }
  focusEdgeGeo.setDrawRange(0, focusEdgeLinks.length * 2);
  const domainColor = new THREE.Color(DOMAINS[n.domain]?.color || '#ffe8a0');
  focusEdgeHaloMat.color.copy(domainColor);
  focusEdgeCoreMat.color.copy(domainColor).lerp(new THREE.Color(0xffffff), 0.4);
  // Start transparent — tickDim fades them in
  focusEdgeHaloMat.opacity = 0;
  focusEdgeCoreMat.opacity = 0;
}

function clearFocusEdges() {
  focusEdgeLinks = [];
  focusEdgeHaloMat.opacity = 0.0;
  focusEdgeCoreMat.opacity = 0.0;
  focusEdgeGeo.setDrawRange(0, 0);
}
clearFocusEdges(); // hidden initially

// ─── MOON SYSTEM ─────────────────────────────────────────────────────────────
// When a node is focused its neighbors orbit it as glowing moons.
// Moons are separate meshes (not the original node meshes) so they don't
// disturb the force simulation.

const moonMeshes   = [];   // raycaster target list (cleared each focus)
let   moonData     = [];   // per-moon orbit state

const moonSphereGeo = new THREE.SphereGeometry(1, Q.moonSegs[0], Q.moonSegs[1]);
const moonRingGeo   = new THREE.RingGeometry(1.55, 1.85, 48);

function buildMoons(centerNode) {
  clearMoons();
  const neighbors = getNeighborNames(centerNode).slice(0, Q.maxMoons);
  const count     = neighbors.length;
  if (!count) return;

  const baseOrbitR = centerNode.size * 2.2 * 5 * 1.6; // K27: pushed out — always outside planet surface

  neighbors.forEach((name, i) => {
    const n = nodeMap.get(name);
    if (!n) return;

    const col    = new THREE.Color(DOMAINS[n.domain]?.color || '#aaaaaa');
    const white  = new THREE.Color(0xffffff);
    const mSize  = Math.max(2, n.size * 2.2 * 0.19); // 50% smaller

    // Orbit parameters — stagger inclinations & radii for 3D spread
    const orbitR   = baseOrbitR;
    const incl     = (i / count) * Math.PI * 0.9 - Math.PI * 0.45;
    const phase    = (i / count) * Math.PI * 2;
    const speed    = 0.0004 + (i * 0.000031);
    const hasRing  = false; // K27: rings removed from focus moons

    // ── Core moon sphere — starts flat color, texture loaded deferred ────────
    const mat = new THREE.MeshPhongMaterial({
      color:    white,
      emissive: white,
      emissiveIntensity: 0.04,
      shininess: 30,
      specular: new THREE.Color(0x111111),
      transparent: true,
      opacity: 0,
    });
    const mesh = new THREE.Mesh(moonSphereGeo, mat);
    mesh.scale.setScalar(mSize);
    mesh.userData.moonNode = n;
    mesh.userData.rotSpeed = 0.002 + (n.id.charCodeAt(0) % 7) * 0.0005;
    scene.add(mesh);
    moonMeshes.push(mesh);

    // Deferred texture: generate after a stagger delay to spread CPU load
    setTimeout(() => {
      const tex = makeMoonTexture(n.domain, n.id);
      mat.map = tex;
      mat.needsUpdate = true;
    }, i * 120 + 300);

    // ── Gaussian glow sprite ────────────────────────────────────────────────
    const haloMat = new THREE.SpriteMaterial({
      map: glowTexture,
      color: white,
      transparent: true,
      opacity: 0.25,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const halo = new THREE.Sprite(haloMat);
    const moonGlowScale = mSize * 4.0;
    halo.scale.set(moonGlowScale, moonGlowScale, 1);
    scene.add(halo);

    // ── Orbital ring — only on randomly selected moons ───────────────────────
    let ring = null, ringMat = null;
    if (hasRing) {
      ringMat = new THREE.MeshBasicMaterial({
        color: col,
        transparent: true,
        opacity: 0.55,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      ring = new THREE.Mesh(moonRingGeo, ringMat);
      ring.scale.setScalar(mSize);
      scene.add(ring);
    }

    // ── HTML label ───────────────────────────────────────────────────────────
    const label = document.createElement('div');
    label.className    = 'moon-label';
    label.textContent  = n.id;
    label.style.color  = DOMAINS[n.domain]?.color || '#e8d89a';
    label.dataset.moonIdx = moonData.length;
    label.addEventListener('click', e => {
      e.stopPropagation();
      focusNode(n);
    });
    document.body.appendChild(label);

    moonData.push({ n, mesh, halo, ring, mat, haloMat, ringMat, label,
                    orbitR, incl, phase, speed, mSize, angle: phase, hasRing,
                    moonAlpha: 0, fadeDelay: i * 80 + 600 }); // staggered fade-in
  });
}

function clearMoons() {
  moonData.forEach(m => {
    scene.remove(m.mesh);  m.mat.dispose();
    scene.remove(m.halo);  m.haloMat.dispose();
    if (m.ring) { scene.remove(m.ring); m.ringMat.dispose(); }
    m.label.remove();
  });
  moonData = [];
  moonMeshes.length = 0;
}

function updateMoons() {
  if (!moonData.length) return;
  const cx = focusedNode.x, cy = focusedNode.y, cz = focusedNode.z;
  const now = performance.now();

  moonData.forEach(m => {
    // Staggered fade-in per moon
    if (m._spawnTime === undefined) m._spawnTime = now;
    const elapsed = now - m._spawnTime;
    const targetAlpha = elapsed > m.fadeDelay ? 1.0 : 0.0;
    m.moonAlpha += (targetAlpha - m.moonAlpha) * 0.055;

    m.mat.opacity = m.moonAlpha;

    m.angle += m.speed;

    const cosI = Math.cos(m.incl), sinI = Math.sin(m.incl);
    const ox = Math.cos(m.angle) * m.orbitR;
    const oy = Math.sin(m.angle) * m.orbitR * sinI;
    const oz = Math.sin(m.angle) * m.orbitR * cosI;
    const wx = cx + ox, wy = cy + oy, wz = cz + oz;

    m.mesh.position.set(wx, wy, wz);
    m.mesh.rotation.y += m.mesh.userData.rotSpeed || 0.008;
    m.halo.position.set(wx, wy, wz);

    if (m.ring) {
      m.ring.position.set(wx, wy, wz);
      m.ring.rotation.x = Math.PI / 2 + m.incl * 0.6;
      m.ring.rotation.z = m.angle * 0.3;
      m.ringMat.opacity = m.moonAlpha * 0.55;
    }

    const t = now * 0.001;
    m.haloMat.opacity = m.moonAlpha * (0.12 + Math.sin(t * 1.1 + m.phase) * 0.07);

    const sp = toScreen(new THREE.Vector3(wx, wy, wz));
    const vis = sp.x > 0 && sp.x < window.innerWidth && sp.y > 0 && sp.y < window.innerHeight;
    m.label.style.left    = sp.x + 'px';
    m.label.style.top     = (sp.y + m.mSize + 8) + 'px';
    m.label.style.opacity = vis ? (m.moonAlpha * 0.9).toFixed(3) : '0';
  });
}

// ─── KNOWLEDGE RIPPLE — cascading discovery wave ─────────────────────────────
const rippleWaves = [];     // active expanding ring meshes
const rippleFlashes = [];   // nodes scheduled to flash
const rippleRingGeo = new THREE.RingGeometry(0.95, 1.0, 64);

function startKnowledgeRipple(originNode) {
  // BFS outward from origin — schedule each layer to flash with increasing delay
  const visited = new Set([originNode.id]);
  const queue = [{ node: originNode, depth: 0 }];
  const maxDepth = 4;

  while (queue.length > 0) {
    const { node: current, depth } = queue.shift();
    if (depth > maxDepth) continue;

    // Schedule this node to flash
    const delay = depth * 280; // ms between each wave
    const domColor = DOMAINS[current.domain]?.color || '#c8b89a';
    rippleFlashes.push({
      node: current,
      color: new THREE.Color(domColor),
      startTime: performance.now() + delay,
      duration: 600,
      intensity: Math.max(0.15, 1.0 - depth * 0.2),
      started: false,
    });

    // Spawn expanding ring at this node (except at depth 0 — origin gets a bigger one)
    if (depth === 0) {
      spawnRippleRing(current, domColor, 1.0);
    } else {
      setTimeout(() => spawnRippleRing(current, domColor, 0.6 - depth * 0.1), delay);
    }

    // Queue neighbors
    const nbrs = neighborMap.get(current.id) || [];
    for (const nbr of nbrs) {
      if (!visited.has(nbr.id) && depth + 1 <= maxDepth) {
        visited.add(nbr.id);
        queue.push({ node: nbr, depth: depth + 1 });
      }
    }
  }
}

function spawnRippleRing(node, colorHex, brightness) {
  const color = new THREE.Color(colorHex);
  const mat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: brightness * 0.5,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const ring = new THREE.Mesh(rippleRingGeo, mat);
  ring.position.set(node.x, node.y, node.z);
  // Face the camera
  ring.lookAt(camera.position);
  ring.scale.setScalar(node.size * 2.2);
  scene.add(ring);

  rippleWaves.push({
    mesh: ring,
    mat,
    startTime: performance.now(),
    duration: 1200,
    maxScale: node.size * 2.2 * 6,
    startScale: node.size * 2.2,
    node,
  });
}

function updateKnowledgeRipple() {
  const now = performance.now();

  // Update expanding rings
  for (let i = rippleWaves.length - 1; i >= 0; i--) {
    const w = rippleWaves[i];
    const t = (now - w.startTime) / w.duration;
    if (t >= 1) {
      scene.remove(w.mesh);
      w.mat.dispose();
      rippleWaves.splice(i, 1);
      continue;
    }
    const ease = 1 - Math.pow(1 - t, 2); // ease-out
    const scale = w.startScale + (w.maxScale - w.startScale) * ease;
    w.mesh.scale.setScalar(scale);
    w.mesh.position.set(w.node.x, w.node.y, w.node.z);
    w.mesh.lookAt(camera.position);
    w.mat.opacity = (1 - t) * 0.4;
  }

  // Update node flashes — brief emissive boost
  for (let i = rippleFlashes.length - 1; i >= 0; i--) {
    const f = rippleFlashes[i];
    if (now < f.startTime) continue;
    const t = (now - f.startTime) / f.duration;
    if (t >= 1) {
      // Reset emissive
      f.node.mesh.material.emissiveIntensity = 0.015;
      if (f.node.atmMat) f.node.atmMat.opacity = 0.06;
      rippleFlashes.splice(i, 1);
      continue;
    }
    if (!f.started) {
      f.started = true;
      // Brief bright flash on the node's atmosphere
    }
    // Sine pulse: quick rise, slow fade
    const pulse = Math.sin(t * Math.PI) * f.intensity;
    f.node.mesh.material.emissiveIntensity = 0.015 + pulse * 0.15;
    if (f.node.atmMat) {
      f.node.atmMat.opacity = 0.06 + pulse * 0.2;
    }
  }
}

// ─── ORBITING SPACESHIP ──────────────────────────────────────────────────────
let shipGroup = null;
let shipData = null;
let shipMeshForRaycast = null; // the hitbox mesh for raycasting

function buildShip() {
  clearShip();
  if (!focusedNode) return;

  const n = focusedNode;

  const metalMat = new THREE.MeshPhongMaterial({

    emissive: new THREE.Color(0x222228),
    emissiveIntensity: 0.1,
    shininess: 80,

  const panelR = new THREE.Mesh(panelGeo, panelMat);
  panelR.position.x = 5.5;
  shipGroup.add(panelR);

  // ── Panel struts — thin cylinders connecting bus to panels ──

  strutL.rotation.z = Math.PI / 2;
  strutL.position.x = -2.5;
  shipGroup.add(strutL);
  const strutR = new THREE.Mesh(strutGeo, metalMat);
  strutR.rotation.z = Math.PI / 2;
  strutR.position.x = 2.5;

  // ── Antenna dish — small cone on top ──
  const dishGeo = new THREE.ConeGeometry(0.8, 1.5, 8, 1, true);
  const dishMat = new THREE.MeshPhongMaterial({
    color: 0xaaaaaa,

  const dish = new THREE.Mesh(dishGeo, dishMat);
  dish.position.y = 2;
  dish.rotation.x = Math.PI;
  shipGroup.add(dish);
  const antennaGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.8, 4);
  const antenna = new THREE.Mesh(antennaGeo, metalMat);
  antenna.position.y = 2.8;
  shipGroup.add(antenna);

  // ── Signal glow — faint pulsing light at antenna tip ──
  const engineGeo = new THREE.SphereGeometry(0.5, 8, 6);
  const engineMat = new THREE.MeshBasicMaterial({
    color: domColor,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const signalLight = new THREE.Mesh(engineGeo, engineMat);
  signalLight.position.y = 3.8;
  shipGroup.add(signalLight);

  // ── Signal halo ──
  const haloGeo = new THREE.SphereGeometry(1.5, 8, 6);

    color: domColor,
    transparent: true,

  const signalHalo = new THREE.Mesh(haloGeo, haloMat);
  signalHalo.position.y = 3.8;
  shipGroup.add(signalHalo);

  // ── Invisible hitbox for raycasting (larger than visual) ──
  const hitGeo = new THREE.SphereGeometry(8, 8, 6);

    orbitR,
    angle: Math.random() * Math.PI * 2,
    speed: 0.004,
    incl: 0.7 + Math.random() * 0.5,
    alpha: 0,
    engineMat,
    haloMat,

function clearShip() {
  if (shipGroup) {
    scene.remove(shipGroup);
    shipGroup.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
    shipGroup = null;
    shipData = null;
    shipMeshForRaycast = null;
  }
}


function updateShip() {
  if (!shipData || !shipGroup || !focusedNode) return;

  const cx = focusedNode.x, cy = focusedNode.y, cz = focusedNode.z;
  const now = performance.now();
  const elapsed = now - shipData.spawnTime;

  // Fade in
  shipData.alpha += ((elapsed > 800 ? 1.0 : 0.0) - shipData.alpha) * 0.04;

  shipData.angle += shipData.speed;

  const cosI = Math.cos(shipData.incl), sinI = Math.sin(shipData.incl);
  const ox = Math.cos(shipData.angle) * shipData.orbitR;
  const oy = Math.sin(shipData.angle) * shipData.orbitR * sinI;
  const oz = Math.sin(shipData.angle) * shipData.orbitR * cosI;
  const wx = cx + ox, wy = cy + oy, wz = cz + oz;

  shipGroup.position.set(wx, wy, wz);

  // Satellite slowly rotates — solar panels catch light from different angles
  shipGroup.rotation.y += 0.003;
  shipGroup.rotation.x = Math.sin(now * 0.0005) * 0.15;

  // Scale and opacity
  shipGroup.scale.setScalar(shipData.alpha * 1.0);

  // Signal light blinks
  shipData.engineMat.opacity = shipData.alpha * (0.3 + Math.max(0, Math.sin(now * 0.005)) * 0.7);
  shipData.haloMat.opacity = shipData.alpha * (0.08 + Math.max(0, Math.sin(now * 0.005)) * 0.15);
}

// ─── LEGEND ─────────────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
Object.entries(DOMAINS).forEach(([name, d]) => {

// ─── FORCE SIMULATION ───────────────────────────────────────────────────────
let alpha = 1.0;
const ALPHA_DECAY   = 0.016;
const ALPHA_MIN     = 0.004; // keep gently alive forever
const VEL_DECAY     = 0.58;
const REP_STR       = 50000;  // much stronger repulsion for spread
const LINK_TARGET   = 400;    // links want 400 units apart (was 88)
const LINK_STR      = 0.15;   // weaker pull so they don't collapse
const CLUSTER_STR   = 0.012;  // gentler clustering

// Hover forces queued each frame
const hoverForces = new Map();

let settled = false;
const settlingEl = document.getElementById('settling');

function simTick() {
  const a = Math.max(alpha, ALPHA_MIN);

  // Repulsion (O(n²))
  for (let i = 0; i < nodes.length; i++) {
    const p = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const q = nodes[j];
      const dx = p.x - q.x, dy = p.y - q.y, dz = p.z - q.z;
      const d2 = dx*dx + dy*dy + dz*dz + 1;
      const f = REP_STR * a / d2;
      p.vx += dx*f; p.vy += dy*f; p.vz += dz*f;
      q.vx -= dx*f; q.vy -= dy*f; q.vz -= dz*f;
    }
  }

  // Link attraction
  for (const l of links) {
    const s = l.source, t = l.target;
    const dx = t.x-s.x, dy = t.y-s.y, dz = t.z-s.z;
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
    const f = (d - LINK_TARGET) * LINK_STR * a / d;
    s.vx += dx*f; s.vy += dy*f; s.vz += dz*f;
    t.vx -= dx*f; t.vy -= dy*f; t.vz -= dz*f;
  }

  // Domain clustering
  for (const n of nodes) {
    const c = DOMAIN_CENTERS[n.domain];
    if (!c) continue;
    n.vx += (c[0] - n.x) * CLUSTER_STR * a;
    n.vy += (c[1] - n.y) * CLUSTER_STR * a;
    n.vz += (c[2] - n.z) * CLUSTER_STR * a;
  }

  // Hover attraction forces
  for (const [id, f] of hoverForces) {
    const n = nodeMap.get(id);
    if (n) { n.vx += f.x; n.vy += f.y; n.vz += f.z; }
  }
  hoverForces.clear();

  // Focused node — smooth float from rest position.
  // No abrupt phase switches: just a gentle sinusoidal drift that starts
  // immediately and eases in over ~90 frames so the node doesn't snap.
  if (focusedNode && focusedNode._restX !== undefined) {
    const n = focusedNode;
    const t   = performance.now() * 0.001;
    const amp = n.size * 1.4;

    // Ease-in blend: 0→1 over first ~1.5s so the float starts invisibly slow
    if (n._floatStart === undefined) n._floatStart = t;
    const elapsed = t - n._floatStart;
    const blend   = Math.min(elapsed / 1.5, 1);
    const ease    = blend * blend * (3 - 2 * blend); // smoothstep

    const floatX = n._restX + Math.sin(t * 0.7)  * amp * ease;
    const floatY = n._restY + Math.sin(t * 0.53) * amp * ease * 0.8;
    const floatZ = n._restZ + Math.sin(t * 0.41) * amp * ease * 0.6;

    n.x += (floatX - n.x) * 0.06;
    n.y += (floatY - n.y) * 0.06;
    n.z += (floatZ - n.z) * 0.06;
    n.vx = 0; n.vy = 0; n.vz = 0;
  }

  // Integrate — coasting nodes use gentler decay so they drift rather than snap
  const now = performance.now();
  const COAST_MS  = 1400; // how long a node coasts after leaving hover zone
  const COAST_DECAY = 0.97; // much gentler than VEL_DECAY=0.58
  for (const n of nodes) {
    let decay = VEL_DECAY;
    if (n._hoverReleaseTime) {
      const age = now - n._hoverReleaseTime;
      if (age < COAST_MS) {
        // Blend from coast decay → normal decay over the coast window
        const t = age / COAST_MS;
        decay = COAST_DECAY + (VEL_DECAY - COAST_DECAY) * (t * t);
      } else {
        delete n._hoverReleaseTime;
      }
    }
    if (n._isOrbiting) { n.vx = 0; n.vy = 0; n.vz = 0; } else { n.vx *= decay; n.vy *= decay; n.vz *= decay; }
    n.x += n.vx; n.y += n.vy; n.z += n.vz;
  }

  if (alpha > ALPHA_MIN) {
    alpha -= ALPHA_DECAY * (alpha - ALPHA_MIN);
    if (alpha <= ALPHA_MIN + 0.001 && !settled) {
      settled = true;
      settlingEl.style.opacity = '0';
      setTimeout(() => settlingEl.remove(), 1200);
    }
  }
}

function updateScene() {
  for (const n of nodes) {
    n.mesh.position.set(n.x, n.y, n.z);
    n.mesh.rotation.y += n.mesh.userData.rotSpeed;
    // sprite glow removed — was billboard tracking head
    if (n._fresnelAtm) n._fresnelAtm.position.set(n.x, n.y, n.z);
    if (n._vrLabel) n._vrLabel.position.set(n.x, n.y + n.size * 16, n.z);
    if (n.outerAtm) n.outerAtm.position.set(n.x, n.y, n.z);
    if (n.ring) {
      n.ring.position.set(n.x, n.y, n.z);
      n.ring.rotation.z += 0.0003; // slow ring rotation
    }
  }
  updateMoons();
  updateShip();
  let idx = 0;
  for (const l of links) {
    edgePosArr[idx++] = l.source.x; edgePosArr[idx++] = l.source.y; edgePosArr[idx++] = l.source.z;
    edgePosArr[idx++] = l.target.x; edgePosArr[idx++] = l.target.y; edgePosArr[idx++] = l.target.z;
  }
  edgeGeo.attributes.position.needsUpdate = true;

  // Update focused glow edges
  if (focusEdgeLinks.length > 0) {
    const pos = focusEdgeGeo.attributes.position;
    const arr = pos.array;
    let fi = 0;
    for (const l of focusEdgeLinks) {
      arr[fi++] = l.source.x; arr[fi++] = l.source.y; arr[fi++] = l.source.z;
      arr[fi++] = l.target.x; arr[fi++] = l.target.y; arr[fi++] = l.target.z;
    }
    pos.needsUpdate = true;
  }
}

// ─── CAMERA / ORBIT ─────────────────────────────────────────────────────────
const CAM_HOME_RADIUS = 1600;
let camTheta = 0.5, camPhi = 1.25, camRadius = 5000; // start zoomed out
const lookTarget = new THREE.Vector3();
let isDragging = false, prevX = 0, prevY = 0, mouseDownX = 0, mouseDownY = 0;
let autoRotate = true;
let lastInteraction = 0;
const RESUME_DELAY = 2800; // ms before rotation resumes after drag

function setCamFromSpherical() {
  camera.position.set(
    camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    camRadius * Math.cos(camPhi),
    camRadius * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(lookTarget);
}
setCamFromSpherical();

// Camera animation — general purpose (used for unfocus)
let camAnim = null;
const _v3a = new THREE.Vector3(), _v3b = new THREE.Vector3();

function animateCamTo(endPos, endLook, frames) {
  camAnim = {
    startPos: camera.position.clone(),
    endPos: endPos.clone(),
    startLook: lookTarget.clone(),
    endLook: endLook.clone(),
    t: 0, frames
  };
  focusCamAnim = null; // cancel focus anim if active
}

// Two-phase focus camera: zoom in → decelerate → pull back 25% → hold
let focusCamAnim = null;

function startFocusCamAnim(nodePos) {
  camAnim = null;
  const dir      = camera.position.clone().sub(nodePos).normalize();
  const closePos = nodePos.clone().add(dir.clone().multiplyScalar(180));  // close stop
  const holdPos  = nodePos.clone().add(dir.clone().multiplyScalar(230));  // hold = 25% back
  focusCamAnim = {
    startPos:  camera.position.clone(),
    startLook: lookTarget.clone(),
    nodePos:   nodePos.clone(),
    closePos, holdPos,
    phase: 'zoomIn',  // zoomIn → pullBack → done
    t: 0,
    zoomFrames: 75,   // frames to zoom in
    pullFrames:  55,  // frames to pull back
  };
}

canvas.addEventListener('pointerdown', e => {
  // Don't orbit if clicking on the info panel
  if (e.target !== canvas) return;
  isDragging = true;
  lastInteraction = performance.now();
  prevX = mouseDownX = e.clientX;
  prevY = mouseDownY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
  if (camAnim) camAnim = null;
});
canvas.addEventListener('pointerup', e => {
  isDragging = false;
  canvas.releasePointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (isDragging) {
    const dx = e.clientX - prevX, dy = e.clientY - prevY;
    camTheta -= dx * 0.006;
    camPhi = Math.max(0.08, Math.min(Math.PI - 0.08, camPhi - dy * 0.006));
    prevX = e.clientX; prevY = e.clientY;
    setCamFromSpherical();
  }
  doHover(e);
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camRadius *= 1 + e.deltaY * 0.0018;
  camRadius = Math.max(180, Math.min(5000, camRadius));
  setCamFromSpherical();
}, { passive: false });

// ─── HOVER ──────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 10 };
const mouse2d = new THREE.Vector2();
let hoveredNode = null;
const hoverLabelEl = document.getElementById('hover-label');
const _closest = new THREE.Vector3();

function toScreen(worldPos) {
  const v = worldPos.clone().project(camera);
  return {
    x: (v.x + 1) / 2 * window.innerWidth,
    y: -(v.y - 1) / 2 * window.innerHeight
  };
}

function doHover(e) {
  mouse2d.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const ray = raycaster.ray;

  // Check spaceship hover for pointer cursor
  let shipHovered = false;
  if (shipMeshForRaycast && focusedNode) {
    const shipHits = raycaster.intersectObject(shipMeshForRaycast, true);
    if (shipHits.length > 0) {
      shipHovered = true;
      canvas.style.cursor = 'pointer';
      hoverLabelEl.textContent = 'Explore on Wikipedia →';
      const sp = toScreen(shipGroup.position);
      hoverLabelEl.style.left = sp.x + 'px';
      hoverLabelEl.style.top = (sp.y - 24) + 'px';
      hoverLabelEl.style.opacity = '1';
    }
  }
  if (!shipHovered && canvas.style.cursor === 'pointer') {
    canvas.style.cursor = 'grab';
  }

  // Raycast for exact hits
  const hits = raycaster.intersectObjects(nodeMeshes);
  const newHover = hits.length ? hits[0].object.userData.node : null;

  if (hoveredNode !== newHover) {
    if (hoveredNode && hoveredNode !== focusedNode) {
      hoveredNode.mesh.material.emissiveIntensity = 0.015;
    }
    hoveredNode = newHover;
    if (hoveredNode) {
      hoveredNode.mesh.material.emissiveIntensity = 0.1;
      const sp = toScreen(new THREE.Vector3(hoveredNode.x, hoveredNode.y, hoveredNode.z));
      hoverLabelEl.style.left  = sp.x + 'px';
      hoverLabelEl.style.top   = (sp.y - 34) + 'px';
      hoverLabelEl.textContent = hoveredNode.id;
      hoverLabelEl.style.opacity = '1';
    } else {
      hoverLabelEl.style.opacity = '0';
    }
  } else if (hoveredNode) {
    // Keep label position updated
    const sp = toScreen(new THREE.Vector3(hoveredNode.x, hoveredNode.y, hoveredNode.z));
    hoverLabelEl.style.left = sp.x + 'px';
    hoverLabelEl.style.top  = (sp.y - 34) + 'px';
  }

  // Hover attraction: attract nearby nodes toward mouse ray (skip focused node)
  // Track which nodes are currently attracted so we can stamp a release time on departure
  const attractedThisFrame = new Set();
  for (const n of nodes) {
    if (focusedNode && n.id === focusedNode.id) continue;
    const nPos = _v3a.set(n.x, n.y, n.z);
    ray.closestPointToPoint(nPos, _closest);
    const dist = nPos.distanceTo(_closest);
    const maxR = 130;
    if (dist < maxR) {
      const strength = Math.pow(1 - dist / maxR, 2) * 2.2;
      const dir = _v3b.copy(_closest).sub(nPos);
      const len = dir.length();
      if (len > 0.01) {
        dir.divideScalar(len);
        hoverForces.set(n.id, { x: dir.x * strength, y: dir.y * strength, z: dir.z * strength });
        attractedThisFrame.add(n.id);
        n._wasAttracted = true;
        delete n._hoverReleaseTime; // actively attracted — no coast
      }
    }
  }
  // Stamp release time on nodes that just left the attraction zone
  for (const n of nodes) {
    if (n._wasAttracted && !attractedThisFrame.has(n.id)) {
      n._hoverReleaseTime = performance.now();
      delete n._wasAttracted;
    }
  }
}

// Called every frame to keep label locked in front of the focused node
function updateFocusLabelPos() {
  if (!focusedNode) return;
  const pos = new THREE.Vector3(focusedNode.x, focusedNode.y, focusedNode.z);
  const r = focusedNode.size * 2.2; // sphere radius in world units
  // Offset toward camera so it floats just in front of the sphere surface

function getNeighborNames(n) {

  links.forEach(l => {

    if (l.target.id === n.id && nodeMap.has(l.source.id)) seen.add(l.source.id);

function positionPanel(screenX, screenY) {
  const panel = nodeInfoEl;
  const W = window.innerWidth, H = window.innerHeight;

  // On mobile, CSS pins the panel to the bottom — skip JS positioning
  if (W <= 768) {
    panel.style.left = '';
    panel.style.top = '';
    return;
  }

  const pw = Math.min(560, W - 40);
  const margin = 20;
  const topY = margin + 100; // just below the title bar

  // Pin to left or right side depending on where the node is
  const goRight = screenX < W / 2;
  const panelX = goRight ? margin : W - pw - margin;
  const clampedX = Math.max(margin, Math.min(W - pw - margin, panelX));

  // Always snap to top — card expands downward
  panel.style.left = clampedX + 'px';
  panel.style.top  = topY + 'px';

  // Max height: fill downward from top, leave room for gallery
  const galleryH = galleryEl.classList.contains('visible') ? (galleryEl.offsetHeight + 8) : 0;
  panel.style.maxHeight = (H - topY - galleryH - margin - 10) + 'px';
  panel.style.overflowY = 'auto';

  const ph = panel.offsetHeight || 320;
  const anchorX = goRight ? clampedX + pw : clampedX;
  const anchorY = Math.min(topY + ph - 20, screenY);

  leaderLine.setAttribute('x1', screenX);
  leaderLine.setAttribute('y1', screenY);
  leaderLine.setAttribute('x2', anchorX);
  leaderLine.setAttribute('y2', Math.max(topY + 20, anchorY));
  leaderDot.setAttribute('cx', screenX);
  leaderDot.setAttribute('cy', screenY);
}

// Wikipedia image cache to avoid re-fetching
const wikiImageCache = new Map();

async function fetchWikiImage(title) {
  if (wikiImageCache.has(title)) return wikiImageCache.get(title);
  const cleanTitle = title.replace(/\s*\((?:Med|Interdis\.)\)\s*$/, '').trim();
  const slug = encodeURIComponent(cleanTitle.replace(/ /g, '_'));
  const api = 'https://en.wikipedia.org/w/api.php';
  try {
    // Step 1: Try pageimages (lead image)
    const r1 = await fetch(`${api}?action=query&titles=${slug}&prop=pageimages&piprop=thumbnail&pithumbsize=500&format=json&origin=*`);
    const d1 = await r1.json();
    const p1 = Object.values(d1?.query?.pages || {})[0];
    if (p1?.thumbnail?.source) {
      wikiImageCache.set(title, p1.thumbnail.source);
      return p1.thumbnail.source;
    }
    // Step 2: Fall back to first article image (skip SVGs and icons)
    const r2 = await fetch(`${api}?action=query&titles=${slug}&prop=images&imlimit=15&format=json&origin=*`);
    const d2 = await r2.json();
    const p2 = Object.values(d2?.query?.pages || {})[0];
    const imgs = (p2?.images || [])
      .map(im => im.title)
      .filter(t => /\.(jpg|jpeg|png|gif)$/i.test(t))
      .filter(t => !/icon|logo|symbol|flag|edit|lock|question|disambig|commons|stub|wiki/i.test(t));
    if (imgs.length === 0) { wikiImageCache.set(title, ''); return ''; }
    // Step 3: Get thumbnail URL for the best candidate
    const fileSlug = encodeURIComponent(imgs[0]);
    const r3 = await fetch(`${api}?action=query&titles=${fileSlug}&prop=imageinfo&iiprop=url&iiurlwidth=500&format=json&origin=*`);
    const d3 = await r3.json();
    const p3 = Object.values(d3?.query?.pages || {})[0];
    const thumb = p3?.imageinfo?.[0]?.thumburl || '';
    wikiImageCache.set(title, thumb);
    return thumb;
  } catch(e) { wikiImageCache.set(title, ''); return ''; }
}

function makePlaceholderSVG(color, label) {
  // Generate a subtle abstract placeholder with domain color
  // Seeded pattern from label so each node gets a unique one
  let seed = 0;
  for (let i = 0; i < label.length; i++) seed = (seed * 31 + label.charCodeAt(i)) & 0xfffffff;
  const r = (n) => { seed = (seed * 16807) % 2147483647; return ((seed - 1) / 2147483646) * n; };

  // Parse hex color to RGB
  const hex = color.replace('#', '');
  const cr = parseInt(hex.slice(0,2), 16);
  const cg = parseInt(hex.slice(2,4), 16);
  const cb = parseInt(hex.slice(4,6), 16);

  // Build abstract shapes — circles, arcs, lines
  let shapes = '';
  // Background gradient
  shapes += `<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="rgb(${Math.round(cr*0.15)},${Math.round(cg*0.15)},${Math.round(cb*0.15)})"/>
    <stop offset="100%" stop-color="rgb(${Math.round(cr*0.08)},${Math.round(cg*0.08)},${Math.round(cb*0.08)})"/>
  </linearGradient></defs>`;
  shapes += `<rect width="560" height="110" fill="url(#bg)"/>`;

  // Grid of subtle dots
  for (let x = 20; x < 560; x += 30 + r(20)) {
    for (let y = 15; y < 110; y += 25 + r(15)) {
      const opacity = 0.03 + r(0.06);
      shapes += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${1 + r(1.5)}" fill="rgba(${cr},${cg},${cb},${opacity.toFixed(3)})"/>`;
    }
  }

  // A few larger accent circles
  for (let i = 0; i < 4; i++) {
    const cx = 60 + r(440), cy = 15 + r(80), radius = 15 + r(40);
    shapes += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${radius.toFixed(1)}" fill="none" stroke="rgba(${cr},${cg},${cb},${(0.06 + r(0.08)).toFixed(3)})" stroke-width="${0.5 + r(1)}"/>`;
  }

  // Connecting lines
  for (let i = 0; i < 3; i++) {
    const x1 = r(560), y1 = r(110), x2 = r(560), y2 = r(110);
    shapes += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(${cr},${cg},${cb},${(0.04 + r(0.06)).toFixed(3)})" stroke-width="0.5"/>`;
  }

  // Central glow
  shapes += `<ellipse cx="280" cy="55" rx="${80 + r(60)}" ry="${30 + r(20)}" fill="rgba(${cr},${cg},${cb},0.04)"/>`;

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="560" height="110" viewBox="0 0 560 110">${shapes}</svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}

// ─── FACTOID SYSTEM ──────────────────────────────────────────────────────────
const factoidCache = new Map();
let factoidTyper = null; // active typewriter interval

async function fetchFactoid(title) {
  if (factoidCache.has(title)) return factoidCache.get(title);
  const cleanTitle = title.replace(/\s*\((?:Med|Interdis\.)\)\s*$/, '').trim();
  const slug = encodeURIComponent(cleanTitle.replace(/ /g, '_'));
  try {
    const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${slug}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
    const d = await r.json();
    const pages = Object.values(d?.query?.pages || {});
    const extract = pages[0]?.extract || '';
    // Get the first 2-3 sentences as the factoid
    const sentences = extract.split(/(?<=[.!?])\s+/).filter(s => s.length > 20);
    const factoid = sentences.slice(0, 2).join(' ').trim();
    factoidCache.set(title, factoid);
    return factoid;
  } catch(e) { factoidCache.set(title, ''); return ''; }
}

function typewriterEffect(el, text, speed) {
  // Clear any existing typer
  if (factoidTyper) clearInterval(factoidTyper);
  el.innerHTML = '<span class="cursor"></span>';
  let i = 0;
  factoidTyper = setInterval(() => {
    if (i >= text.length) {
      clearInterval(factoidTyper);
      factoidTyper = null;
      // Remove cursor after a brief pause
      setTimeout(() => {
        const cursor = el.querySelector('.cursor');
        if (cursor) cursor.remove();
      }, 1500);
      return;
    }
    const cursor = el.querySelector('.cursor');
    if (cursor) cursor.insertAdjacentText('beforebegin', text[i]);
    i++;
    // Reposition card every 10 chars as text grows
    if (i % 10 === 0 && focusedNode) {
      const sp = getNodeScreenPos(focusedNode);
      positionPanel(sp.x, sp.y);
    }
  }, speed);
}

// ─── TOPIC GALLERY — 3 related images below the info card ───────────────────
const galleryEl = document.getElementById('topic-gallery');
const galleryImageCache = new Map();
let _galleryRepoInterval = null;

async function fetchGalleryImages(title) {
  if (galleryImageCache.has(title)) return galleryImageCache.get(title);
  const cleanTitle = title.replace(/\s*\((?:Med|Interdis\.)\)\s*$/, '').trim();
  const api = 'https://commons.wikimedia.org/w/api.php';

  try {
    // Search Wikimedia Commons for the topic — finds historical, CC-licensed imagery
    const q = encodeURIComponent(cleanTitle);
    const r = await fetch(`${api}?action=query&generator=search&gsrsearch=${q}&gsrnamespace=6&gsrlimit=20&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`);
    const d = await r.json();
    const pages = Object.values(d?.query?.pages || {});

    // Filter for actual images, skip SVGs and tiny files
    const candidates = pages
      .filter(p => p?.imageinfo?.[0]?.thumburl)
      .filter(p => /\.(jpg|jpeg|png)$/i.test(p.title || ''))
      .map(p => p.imageinfo[0].thumburl);

    if (candidates.length < 3) {
      // Fallback: try Wikipedia article images
      const slug = encodeURIComponent(cleanTitle.replace(/ /g, '_'));
      const wApi = 'https://en.wikipedia.org/w/api.php';
      const r2 = await fetch(`${wApi}?action=query&titles=${slug}&prop=images&imlimit=20&format=json&origin=*`);
      const d2 = await r2.json();
      const wPages = Object.values(d2?.query?.pages || {});
      const allImgs = (wPages[0]?.images || [])
        .map(im => im.title)
        .filter(t => /\.(jpg|jpeg|png)$/i.test(t))
        .filter(t => !/icon|logo|symbol|flag|edit|lock|question|disambig|commons|stub|wiki/i.test(t));

      if (allImgs.length >= 3) {
        const step = Math.floor(allImgs.length / 4);
        const picks = [allImgs[0], allImgs[Math.min(step, allImgs.length-1)], allImgs[Math.min(step*2, allImgs.length-1)]];
        const fileSlugs = picks.map(f => encodeURIComponent(f)).join('|');
        const r3 = await fetch(`${wApi}?action=query&titles=${fileSlugs}&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`);
        const d3 = await r3.json();
        const fallbackThumbs = Object.values(d3?.query?.pages || {})
          .map(p => p?.imageinfo?.[0]?.thumburl).filter(Boolean);
        galleryImageCache.set(title, fallbackThumbs.slice(0,3));
        return fallbackThumbs.slice(0,3);
      }
      galleryImageCache.set(title, []);
      return [];
    }

    // Pick 3 spread across results for variety
    const step = Math.max(1, Math.floor(candidates.length / 4));
    const picks = [candidates[0], candidates[Math.min(step, candidates.length-1)], candidates[Math.min(step*2, candidates.length-1)]];
    galleryImageCache.set(title, picks);
    return picks;
  } catch(e) { galleryImageCache.set(title, []); return []; }
}

function showInfo(n, screenX, screenY) {

function dimToNeighbors(n) {
  const nb = new Set([n.id]);
  links.forEach(l => {
    if (l.source.id === n.id) nb.add(l.target.id);
    if (l.target.id === n.id) nb.add(l.source.id);
  });
  nodes.forEach(m => {
    const inNb = nb.has(m.id);
    m._targetOpacity    = inNb ? 1.0 : 0.05;
    m._targetAtmOpacity = inNb ? (m.id === n.id ? 0.12 : 0.05) : 0.005;
    m.mesh.material.transparent = true;
  });
  edgeMat.opacity = 0.06;
}
function resetDim() {
  nodes.forEach(n => {
    n._targetOpacity    = 1.0;
    n._targetAtmOpacity = 0.06;
  });
  edgeMat.opacity = 0.28;
}
// Call this every frame to lerp toward targets
function tickDim() {
  nodes.forEach(n => {
    if (n._targetOpacity === undefined) return;
    const cur = n.mesh.material.opacity;
    const tgt = n._targetOpacity;
    if (Math.abs(cur - tgt) > 0.002) {
      const next = cur + (tgt - cur) * 0.08;
      n.mesh.material.opacity = next;
      if (tgt >= 1.0 && next > 0.98) {
        n.mesh.material.opacity = 1.0;
        n.mesh.material.transparent = false;
      }
    }
    if (n.atmMat && n._targetAtmOpacity !== undefined) {
      n.atmMat.opacity += (n._targetAtmOpacity - n.atmMat.opacity) * 0.08;
    }
  });
  // Fade focus edges in/out smoothly
  if (focusEdgeLinks.length > 0) {
    focusEdgeHaloMat.opacity += (0.55 - focusEdgeHaloMat.opacity) * 0.06;
    focusEdgeCoreMat.opacity += (0.92 - focusEdgeCoreMat.opacity) * 0.06;
  } else {
    focusEdgeHaloMat.opacity *= 0.88;
    focusEdgeCoreMat.opacity *= 0.88;
  }
}

function getNodeScreenPos(n) {
  const pos = new THREE.Vector3(n.x, n.y, n.z);
  const toCamera = camera.position.clone().sub(pos).normalize();
  const frontPos = pos.clone().add(toCamera.multiplyScalar(n.size * 2.2 * 1.1));
  const v = frontPos.project(camera);
  return {
    x: (v.x + 1) / 2 * window.innerWidth,
    y: -(v.y - 1) / 2 * window.innerHeight
  };
}

// ─── BLACK HOLE PARTICLE VORTEX ─────────────────────────────────────────────
const BH_PARTICLE_COUNT = 200;
let bhParticles = null; // { geo, mat, points, velocities[], lifetimes[] }

function startBHParticles() {
  stopBHParticles();

  const positions = new Float32Array(BH_PARTICLE_COUNT * 3);
  const colors = new Float32Array(BH_PARTICLE_COUNT * 3);
  const sizes = new Float32Array(BH_PARTICLE_COUNT);
  const velocities = [];
  const lifetimes = [];

  for (let i = 0; i < BH_PARTICLE_COUNT; i++) {
    // Spawn in a wide ring around the BH
    const angle = Math.random() * Math.PI * 2;
    const r = 400 + Math.random() * 600;
    const y = (Math.random() - 0.5) * 200;
    positions[i*3]   = BH_POS.x + Math.cos(angle) * r;
    positions[i*3+1] = BH_POS.y + y;
    positions[i*3+2] = BH_POS.z + Math.sin(angle) * r;

    // Orbital velocity — tangent to circle + slight inward pull
    const speed = 3 + Math.random() * 3;
    velocities.push({
      vx: -Math.sin(angle) * speed,
      vy: (Math.random() - 0.5) * 0.2,
      vz: Math.cos(angle) * speed,
    });

    lifetimes.push(Math.random()); // stagger starting phase
    colors[i*3] = 1.0; colors[i*3+1] = 0.7; colors[i*3+2] = 0.3; // warm orange
    sizes[i] = 8 + Math.random() * 6;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    size: 8,
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  bhParticles = { geo, mat, points, velocities, lifetimes, positions, colors, sizes };
}

function updateBHParticles() {
  if (!bhParticles) return;
  const p = bhParticles;
  const pos = p.positions;
  const col = p.colors;
  const sz = p.sizes;

  for (let i = 0; i < BH_PARTICLE_COUNT; i++) {
    const ix = i*3, iy = i*3+1, iz = i*3+2;
    const v = p.velocities[i];

    // Vector from particle to BH center
    const dx = BH_POS.x - pos[ix];
    const dy = BH_POS.y - pos[iy];
    const dz = BH_POS.z - pos[iz];
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 1;

    // Gravitational pull — gentle inward so particles spiral slowly
    const pull = 400 / (dist * dist) * 30;
    const nx = dx/dist, ny = dy/dist, nz = dz/dist;
    // Strong tangential force for tight swirling — increases as particles get closer
    const tx = -nz, tz = nx;
    const tangentStrength = 600 / (dist + 30);

    v.vx += nx * pull + tx * tangentStrength * 0.08;
    v.vy += ny * pull * 0.3 - v.vy * 0.02; // flatten toward disk plane
    v.vz += nz * pull + tz * tangentStrength * 0.08;

    // Light damping — lets them build up orbital speed
    v.vx *= 0.992; v.vy *= 0.992; v.vz *= 0.992;

    pos[ix] += v.vx;
    pos[iy] += v.vy;
    pos[iz] += v.vz;

    // Color: cooler far away (orange), hotter close (white-blue)
    const heat = Math.min(1, 300 / dist);
    col[ix]   = 1.0;
    col[iy]   = 0.5 + heat * 0.5;
    col[iz]   = 0.2 + heat * 0.8;

    // Size: large when far, compress as they spiral in
    const farness = Math.min(1, dist / 800);
    sz[i] = 2.0 + farness * 12;

    // Respawn if too close to center (swallowed) or too far away (escaped)
    if (dist < 100 || dist > 1500) {
      const angle = Math.random() * Math.PI * 2;
      const r = 400 + Math.random() * 600;
      pos[ix]   = BH_POS.x + Math.cos(angle) * r;
      pos[iy]   = BH_POS.y + (Math.random() - 0.5) * 200;
      pos[iz]   = BH_POS.z + Math.sin(angle) * r;
      const spd = 3 + Math.random() * 3;
      v.vx = -Math.sin(angle) * spd;
      v.vy = (Math.random() - 0.5) * 0.3;
      v.vz = Math.cos(angle) * spd;
    }
  }

  p.geo.attributes.position.needsUpdate = true;
  p.geo.attributes.color.needsUpdate = true;
  p.geo.attributes.size.needsUpdate = true;
}

function stopBHParticles() {
  if (bhParticles) {
    scene.remove(bhParticles.points);
    bhParticles.geo.dispose();
    bhParticles.mat.dispose();
    bhParticles = null;
  }
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;
let audioStarted = false;

// K25-9: Ring Mod — 220Hz × 150Hz AM, sidebands at 70Hz+370Hz, metallic shimmer, 60ms
function playChipHoverClick() {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var dest = audioCtx._masterGain || audioCtx.destination;

  // Carrier at 440Hz (A4) — bright, clearly audible
  var carrier = audioCtx.createOscillator();
  carrier.type = 'sine';
  carrier.frequency.setValueAtTime(440, t);

  // Ring modulator — 300Hz, sidebands at 140Hz + 740Hz (dark + bright)
  var ringMod = audioCtx.createOscillator();
  ringMod.type = 'sine';
  ringMod.frequency.setValueAtTime(300, t);

  var ringGain = audioCtx.createGain();
  ringGain.gain.setValueAtTime(1, t);

  // Envelope
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.065, t + 0.003);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);

  ringMod.connect(ringGain.gain);
  carrier.connect(ringGain);
  ringGain.connect(g); g.connect(dest);

  carrier.start(t); carrier.stop(t + 0.06);
  ringMod.start(t); ringMod.stop(t + 0.06);
}

// Domain → chime root frequency (pentatonic-ish spread)
const DOMAIN_FREQS = {
  "Formal Sciences":           65.41,   // C2
  "Physical Sciences":         73.42,   // D2
  "Earth & Space":             82.41,   // E2
  "Life Sciences":             87.31,   // F2
  "Chemistry":                 98.00,   // G2
  "Medicine & Health":         110.00,  // A2
  "Social Sciences":           123.47,  // B2
  "Humanities":                130.81,  // C3
  "Arts & Design":             146.83,  // D3
  "Engineering & Tech":        55.00,   // A1
  "Interdisciplinary":         61.74,   // B1
  "Esoteric & Occult":         46.25,   // F#1
  "Contemplative Traditions":  51.91,   // Ab1
  "Indigenous & Traditional":  58.27,   // Bb1
  "Consciousness & Fringe":    38.89,   // Eb1
};

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── Reverb convolver (synthetic IR) ──────────────────────────────────────
  const revLen  = audioCtx.sampleRate * 4.5;
  const revBuf  = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = revBuf.getChannelData(c);
    for (let i = 0; i < revLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revLen, 2.2);
    }
  }
  const reverb = audioCtx.createConvolver();
  reverb.buffer = revBuf;

  // Master volume — slider and mute both control this
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('vol-slider').value);
  masterGain.connect(audioCtx.destination);
  audioCtx._masterGain = masterGain;

  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 1.4;
  reverb.connect(reverbGain);
  reverbGain.connect(masterGain);

  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.6;
  dryGain.connect(masterGain);

  // ── Ambient pad layer ─────────────────────────────────────────────────────
  // Fewer voices to reduce CPU load (3 notes × 2 voices = 6 osc + 6 LFO)
  const padNotes = [65.41, 130.81, 196.00]; // C2 triad — warm and simple

  padNotes.forEach((freq, idx) => {
    const count = 2;
    for (let v = 0; v < count; v++) {
      const osc = audioCtx.createOscillator();
      osc.type = v === 0 ? 'sine' : 'triangle';
      osc.frequency.value = freq * (1 + (v - 0.5) * 0.004); // slight detune

      // Slow LFO tremolo per voice
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.03 + idx * 0.01 + v * 0.015;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.005;
      lfo.connect(lfoGain);

      const voiceGain = audioCtx.createGain();
      voiceGain.gain.value = 0.05 / count;
      lfoGain.connect(voiceGain.gain);

      osc.connect(voiceGain);
      voiceGain.connect(reverb);
      voiceGain.connect(dryGain);

      osc.start();
      lfo.start();
    }
  });

  // ── Slow melodic breath: random pentatonic notes fading in/out ────────────
  const pentatonic = [130.81, 146.83, 164.81, 196.00, 220.00,
                      261.63, 293.66, 329.63, 392.00, 440.00];

  function breathNote() {
    if (!audioCtx) return;
    const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
    const dur  = 5 + Math.random() * 8;
    const wait = 3 + Math.random() * 9;

    const osc  = audioCtx.createOscillator();
    osc.type   = 'sine';
    osc.frequency.value = freq;

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + dur * 0.3);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);

    osc.connect(g);
    g.connect(reverb);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);

    setTimeout(breathNote, (wait + dur * 0.6) * 1000);
  }
  breathNote();
  // Only 1 breath chain instead of 3 — reduces oscillator count

  // Store refs for chime
  audioCtx._reverb  = reverb;
  audioCtx._revGain = reverbGain;
}

function playChime(domain) {
  if (!audioCtx) return;
  const root = DOMAIN_FREQS[domain] || 65.41;
  const now  = audioCtx.currentTime;

  // Soft tone: pure harmonic series, sine waves only, slow swell
  // Ratios 1× 2× 3× give a warm organ/pad quality — no inharmonic bell clang
  const partials = [1, 2, 3, 4];
  const amps     = [1.0, 0.28, 0.10, 0.04];
  const attackT  = 0.35;   // slow soft attack
  const holdT    = 1.0;
  const decayT   = 4.5;

  partials.forEach((ratio, i) => {
    const osc = audioCtx.createOscillator();
    osc.type  = 'sine';
    osc.frequency.value = root * ratio;

    // Slight vibrato on fundamental for warmth
    if (i === 0) {
      const vib = audioCtx.createOscillator();
      vib.frequency.value = 4.5;
      const vibGain = audioCtx.createGain();
      vibGain.gain.value = root * 0.003;
      vib.connect(vibGain);
      vibGain.connect(osc.frequency);
      vib.start(now);
      vib.stop(now + attackT + holdT + decayT);
    }

    const g  = audioCtx.createGain();
    const pk = 0.15 * amps[i];
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(pk, now + attackT);          // slow swell in
    g.gain.linearRampToValueAtTime(pk * 0.85, now + attackT + holdT); // gentle hold
    g.gain.linearRampToValueAtTime(0.0001, now + attackT + holdT + decayT); // long fade

    osc.connect(g);
    g.connect(audioCtx._reverb);
    g.connect(audioCtx._masterGain);
    osc.start(now);
    osc.stop(now + attackT + holdT + decayT + 0.2);
  });
}

// ─── SHOOTING STARS ──────────────────────────────────────────────────────────
const shootingStars = [];

function spawnShootingStar() {
  // Random start position on the far star shell
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  const r = 7000 + Math.random() * 1500;
  const sx = r * Math.sin(phi) * Math.cos(theta);
  const sy = r * Math.sin(phi) * Math.sin(theta);
  const sz = r * Math.cos(phi);

  // Random direction with some downward bias
  const dx = (Math.random() - 0.5) * 2;
  const dy = -0.3 - Math.random() * 0.7;
  const dz = (Math.random() - 0.5) * 2;
  const len = Math.sqrt(dx*dx + dy*dy + dz*dz);

  const speed = 18 + Math.random() * 25;
  const tailLen = 120 + Math.random() * 200;

  // Trail geometry — line from head to tail
  const posArr = new Float32Array(6);
  const geo = new THREE.BufferGeometry();
  const attr = new THREE.BufferAttribute(posArr, 3);
  attr.usage = THREE.DynamicDrawUsage;
  geo.setAttribute('position', attr);

  // Warm white-gold color
  const brightness = 0.5 + Math.random() * 0.5;
  const color = new THREE.Color(
    brightness,
    brightness * (0.9 + Math.random() * 0.1),
    brightness * (0.7 + Math.random() * 0.2)
  );

  const mat = new THREE.LineBasicMaterial({
    color, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  shootingStars.push({
    x: sx, y: sy, z: sz,
    dx: dx/len, dy: dy/len, dz: dz/len,
    speed, tailLen,
    posArr, geo, mat, line,
    life: 0,
    maxLife: 60 + Math.random() * 80,
  });
}

function updateShootingStars() {
  // Randomly spawn
  if (Math.random() < 0.008 && shootingStars.length < Q.shootingMax) {
    spawnShootingStar();
  }

  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.life++;
    s.x += s.dx * s.speed;
    s.y += s.dy * s.speed;
    s.z += s.dz * s.speed;

    const tx = s.x - s.dx * s.tailLen;
    const ty = s.y - s.dy * s.tailLen;
    const tz = s.z - s.dz * s.tailLen;

    s.posArr[0] = tx; s.posArr[1] = ty; s.posArr[2] = tz;
    s.posArr[3] = s.x; s.posArr[4] = s.y; s.posArr[5] = s.z;
    s.geo.attributes.position.needsUpdate = true;

    // Fade in then out
    const fadeIn = Math.min(s.life / 8, 1);
    const fadeOut = Math.max(0, 1 - (s.life - s.maxLife + 15) / 15);
    s.mat.opacity = fadeIn * fadeOut * 0.6;

    if (s.life > s.maxLife) {
      scene.remove(s.line);
      s.mat.dispose();
      s.geo.dispose();
      shootingStars.splice(i, 1);
    }
  }
}

// ─── EXPLORATION TRAIL ──────────────────────────────────────────────────────
const trailHistory = []; // { x, y, z, time, color }
const trailSegments = []; // active THREE.Line objects
const TRAIL_FADE_MS = 20000; // trails last 20 seconds

function addTrailPoint(node) {
  const domColor = DOMAINS[node.domain]?.color || '#c8b89a';
  trailHistory.push({
    x: node.x, y: node.y, z: node.z,
    time: performance.now(),
    color: new THREE.Color(domColor),
    nodeId: node.id,
  });

  // If we have at least 2 points, create a line segment from prev to current
  if (trailHistory.length >= 2) {
    const prev = trailHistory[trailHistory.length - 2];
    const curr = trailHistory[trailHistory.length - 1];

    const posArr = new Float32Array([
      prev.x, prev.y, prev.z,
      curr.x, curr.y, curr.z,
    ]);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));

    // Gradient from prev color to current color — use current
    const mat = new THREE.LineBasicMaterial({
      color: curr.color,
      transparent: true,
      opacity: 0.5,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);

    trailSegments.push({
      line, mat, geo,
      startTime: performance.now(),
    });
  }
}

function updateExplorationTrail() {
  const now = performance.now();
  for (let i = trailSegments.length - 1; i >= 0; i--) {
    const seg = trailSegments[i];
    const age = now - seg.startTime;
    if (age > TRAIL_FADE_MS) {
      scene.remove(seg.line);
      seg.mat.dispose();
      seg.geo.dispose();
      trailSegments.splice(i, 1);
      continue;
    }
    // Fade out over time
    const t = age / TRAIL_FADE_MS;
    seg.mat.opacity = (1 - t * t) * 0.45; // quadratic fade
  }
  // Clean old history
  while (trailHistory.length > 0 && now - trailHistory[0].time > TRAIL_FADE_MS) {
    trailHistory.shift();
  }
}

// ─── 2. CONNECTION PATHS ────────────────────────────────────────────────────
const visitedNodes = []; // track exploration order
const pathBtn = document.getElementById('path-btn');
let pathLines = []; // active path line meshes

// Hook into focusNode to track visits (we'll add the call in showInfo)
const _origAddTrailPoint = addTrailPoint;

function trackVisit(node) {
  if (visitedNodes.length === 0 || visitedNodes[visitedNodes.length-1].id !== node.id) {
    visitedNodes.push(node);
  }
  if (visitedNodes.length >= 2) pathBtn.classList.add('visible');
}

function findShortestPath(startNode, endNode) {
  // BFS through the graph
  const queue = [[startNode]];
  const visited = new Set([startNode.id]);
  while (queue.length > 0) {
    const path = queue.shift();
    const current = path[path.length - 1];
    if (current.id === endNode.id) return path;
    const nbrs = neighborMap.get(current.id) || [];
    for (const nbr of nbrs) {
      if (!visited.has(nbr.id)) {
        visited.add(nbr.id);
        queue.push([...path, nbr]);
      }
    }
  }
  return null;
}

function showConnectionPath() {
  clearConnectionPath();
  if (visitedNodes.length < 2) return;
  const startN = visitedNodes[0];
  const endN = visitedNodes[visitedNodes.length - 1];
  const path = findShortestPath(startN, endN);
  if (!path || path.length < 2) return;

  // Draw glowing lines along the path
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i+1];
    const posArr = new Float32Array([a.x, a.y, a.z, b.x, b.y, b.z]);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const col = new THREE.Color(DOMAINS[b.domain]?.color || '#c8b89a');
    const mat = new THREE.LineBasicMaterial({
      color: col, transparent: true, opacity: 0.7,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    pathLines.push({ line, mat, geo, birth: performance.now(), delay: i * 150 });
  }

  // Flash each node along the path
  path.forEach((n, i) => {
    setTimeout(() => {
      if (n.mesh) {
        n.mesh.material.emissiveIntensity = 0.3;
        setTimeout(() => { n.mesh.material.emissiveIntensity = 0.06; }, 800);
      }
    }, i * 150);
  });

  // Auto-clear after 8 seconds
  setTimeout(clearConnectionPath, 8000);
}

function clearConnectionPath() {
  pathLines.forEach(p => { scene.remove(p.line); p.mat.dispose(); p.geo.dispose(); });
  pathLines = [];
}

pathBtn.addEventListener('click', showConnectionPath);

// ─── 3. PLANET HEARTBEAT ────────────────────────────────────────────────────
// Each planet subtly pulses its glow sprite based on connection count
function updateHeartbeats() {
  const t = performance.now() * 0.001;
  for (const n of nodes) {
    if (!n.atm || !n.atmMat) continue;
    const connections = (neighborMap.get(n.id) || []).length;
    // More connections = faster pulse, bigger range
    const rate = 0.8 + connections * 0.15;
    const amplitude = 0.03 + connections * 0.008;
    const base = 0.18;
    n.atmMat.opacity = base + Math.sin(t * rate + n.id.charCodeAt(0)) * amplitude;
  }
}

// ─── 4. DOMAIN CONSTELLATION EASTER EGG ─────────────────────────────────────
const domainVisits = {}; // domain -> Set of visited node IDs
const constellationTriggered = new Set(); // domains already triggered
const constellationLines = [];
const toastEl = document.getElementById('constellation-toast');

function checkDomainConstellation(node) {
  const domain = node.domain;
  if (constellationTriggered.has(domain)) return;
  if (!domainVisits[domain]) domainVisits[domain] = new Set();
  domainVisits[domain].add(node.id);

  // Count total nodes in this domain
  const domainTotal = nodes.filter(n => n.domain === domain).length;
  if (domainVisits[domain].size >= domainTotal) {
    triggerConstellation(domain);
  }
}

function triggerConstellation(domain) {
  constellationTriggered.add(domain);
  const domColor = new THREE.Color(DOMAINS[domain]?.color || '#c8b89a');
  const domNodes = nodes.filter(n => n.domain === domain);

  // Connect all nodes in the domain with bright lines
  for (let i = 0; i < domNodes.length; i++) {
    for (let j = i + 1; j < domNodes.length; j++) {
      const a = domNodes[i], b = domNodes[j];
      // Only connect nearby pairs to form a constellation shape
      const dx = a.x-b.x, dy = a.y-b.y, dz = a.z-b.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist > 300) continue;

      const posArr = new Float32Array([a.x, a.y, a.z, b.x, b.y, b.z]);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      const mat = new THREE.LineBasicMaterial({
        color: domColor, transparent: true, opacity: 0,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      constellationLines.push({ line, mat, geo, birth: performance.now(), domain });
    }
  }

  // Flash all domain nodes
  domNodes.forEach(n => {
    if (n.mesh) n.mesh.material.emissiveIntensity = 0.4;
    setTimeout(() => { if (n.mesh) n.mesh.material.emissiveIntensity = 0.06; }, 2000);
  });

  // Play a special chime
  playChime(domain);
  setTimeout(() => playChime(domain), 300);

  // Show toast
  toastEl.textContent = `✦ ${domain} Complete ✦`;
  toastEl.classList.add('visible');
  setTimeout(() => toastEl.classList.remove('visible'), 4000);
}

function updateConstellations() {
  const now = performance.now();
  for (let i = constellationLines.length - 1; i >= 0; i--) {
    const c = constellationLines[i];
    const age = (now - c.birth) / 1000;
    if (age < 1) {
      c.mat.opacity = age * 0.5; // fade in
    } else if (age < 10) {
      c.mat.opacity = 0.5 - (age - 1) * 0.05; // slow fade
    } else {
      scene.remove(c.line); c.mat.dispose(); c.geo.dispose();
      constellationLines.splice(i, 1);
    }
  }
}

  // 217 planets — 162 were hitting 512x256@6oct = 127M noise evals (way too slow)

  var sorted = nodes.slice().sort(function(a,b){ return b.size - a.size; });
  let i = 0;
  const BATCH = 6;
  function next() {
    const end = Math.min(i + BATCH, sorted.length);
    while (i < end) {
      const n = sorted[i];
      // Tier by rank — bigger planets get higher res
      if (i < 15) {
        Q.texSize = 192; Q.texOctaves = 5; Q.noiseGrid = [16, 8];  // 384x192
      } else if (i < 60) {
        Q.texSize = 128; Q.texOctaves = 4; Q.noiseGrid = [12, 6];  // 256x128
      } else {
        Q.texSize = 96; Q.texOctaves = 3; Q.noiseGrid = [8, 4];    // 192x96
      }
      i++;
      const tex = makePlanetTexture(n.domain, n.id);
      n.mesh.material.map = tex;
      n.mesh.material.needsUpdate = true;
    }
    const pct = Math.round((i / sorted.length) * 100);
    const label = document.querySelector('.loading-label');
    if (label) label.textContent = `Generating planets ${pct}%`;
    if (i >= sorted.length) {
      _allTexturesReady = true;
      callback();
    } else {
      setTimeout(next, 0);
    }
  }
  setTimeout(next, 0);
}

(function() {
  var sorted = nodes.slice().sort(function(a,b){ return b.size - a.size; });

  var moonGeo = new THREE.SphereGeometry(1, 8, 8);

    var col = new THREE.Color(hex);
    // Each planet gets 1-3 moons based on its size
    var numMoons = n.size >= 18 ? 3 : n.size >= 12 ? 2 : 1;
    var seed = 0;
    for (var c = 0; c < n.id.length; c++) seed = (seed * 31 + n.id.charCodeAt(c)) & 0xfffffff;

    for (var j = 0; j < numMoons; j++) {
      seed = (seed * 16807) & 0x7fffffff;
      var moonR = n.size * PLANET_SCALE * 0.15 + (seed % 100) * 0.01 * n.size * PLANET_SCALE * 0.1;
      var orbitR = n.size * PLANET_SCALE * (1.8 + j * 0.8 + (seed % 50) * 0.01);
      var orbitSpeed = 0.3 + j * 0.15 + (seed % 30) * 0.01;
      var orbitTilt = ((seed % 100) / 100 - 0.5) * 0.6;
      var orbitPhase = (seed % 628) * 0.01;

      // Moon mesh — small, slightly lighter than planet color
      var moonCol = col.clone();
      moonCol.offsetHSL(0, -0.2, 0.15 + j * 0.05);
      var moonMat = new THREE.MeshBasicMaterial({ color: moonCol });
      var moon = new THREE.Mesh(moonGeo, moonMat);
      moon.scale.setScalar(moonR);
      scene.add(moon);

      _moons.push({
        mesh: moon,
        planet: n,
        orbitR: orbitR,
        speed: orbitSpeed,
        tilt: orbitTilt,
        phase: orbitPhase,
      });

      seed = (seed * 48271) & 0x7fffffff;
    }
  }

  window._updateMiniMoons = function() {
    var t = performance.now() * 0.001;
    for (var i = 0; i < _moons.length; i++) {
      var m = _moons[i];
      var angle = t * m.speed + m.phase;
      m.mesh.position.set(
        m.planet.x + Math.cos(angle) * m.orbitR,
        m.planet.y + Math.sin(angle) * Math.sin(m.tilt) * m.orbitR * 0.4,
        m.planet.z + Math.sin(angle) * m.orbitR
      );
    }
  };
})();

    });

    starStreaks.push({
      line: sLine, mat: sMat, geo: sGeo,

      nextFire: performance.now() + (8000 + Math.random() * 7000) + si * 3000,
      origin: new THREE.Vector3(), dir: new THREE.Vector3(), speed: 0
    });
  }
  window._updateStarStreaks = function() {
    var now = performance.now();
    for (var i = 0; i < starStreaks.length; i++) {
      var s = starStreaks[i];

        // Fire a new streak
        s.active = true;
        s.startTime = now;
        s.origin.set((Math.random() - 0.5) * 12000, (Math.random() - 0.5) * 6000, (Math.random() - 0.5) * 12000);

      }
      if (s.active) {
        var elapsed = (now - s.startTime) * 0.001;
        var dur = 1.5;
        if (elapsed > dur) {
          s.active = false;
          s.mat.opacity = 0;
          s.nextFire = now + 8000 + Math.random() * 7000;

          arr[p * 3 + 1] = s.origin.y + s.dir.y * s.speed * tailT;
          arr[p * 3 + 2] = s.origin.z + s.dir.z * s.speed * tailT;

})();

<script>
// ─── TITLE SPRITE ─────────────────────────────────────────────────────────────
// A tiny comet crawls along the baseline of the title text, left to right,
// then disappears and restarts after a random pause. Subtle — you have to
// be watching to catch it.

(function() {
  const canvas  = document.getElementById('title-sprite');
  const ctx     = canvas.getContext('2d');

    canvas.height = window.innerHeight;

  let nextLaunch   = 0;

    // Random pause 4–14 seconds between passes

    const headX = x0 + spriteT * W;
    const tailX = x0 + Math.max(0, spriteT - TAIL_LEN) * W;

    // Fade in at start, fade out at end
    const fadeIn  = Math.min(spriteT / (TAIL_LEN * 0.6), 1);
    const fadeOut = Math.min((1 - spriteT) / 0.08 + 0.001, 1);

    const grad = ctx.createLinearGradient(tailX, y, headX, y);
    grad.addColorStop(0,   `rgba(232,216,154,0)`);
    grad.addColorStop(0.6, `rgba(232,216,154,${(alpha * 0.3).toFixed(3)})`);
    grad.addColorStop(1,   `rgba(255,245,200,${alpha.toFixed(3)})`);

    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 1.5;
    ctx.shadowColor = 'rgba(255,240,180,0.9)';
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.moveTo(tailX, y);
    ctx.lineTo(headX, y);
    ctx.stroke();

    // ── Head glow dot ────────────────────────────────────────────────────────
    if (spriteT <= 1) {
      const radial = ctx.createRadialGradient(headX, y, 0, headX, y, 5);
      radial.addColorStop(0,   `rgba(255,255,220,${alpha.toFixed(3)})`);
      radial.addColorStop(0.4, `rgba(232,216,154,${(alpha * 0.5).toFixed(3)})`);
      radial.addColorStop(1,   'rgba(232,216,154,0)');
      ctx.fillStyle  = radial;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(headX, y, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
