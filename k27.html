<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Map of Human Knowledge — 3D (Quest)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#04060f; overflow:hidden; width:100vw; height:100vh; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#e8e0d0; }

  /* ── Loading Screen ── */
  #loading-screen {
    position:fixed; inset:0; z-index:10000;
    background:#04060f;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    transition:opacity 0.8s ease;
  }
  #loading-screen.hidden { opacity:0; pointer-events:none; }

  .atom { position:relative; width:120px; height:120px; }

  /* Nucleus */
  .atom-nucleus {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:12px; height:12px; border-radius:50%;
    background:rgba(232,216,154,0.9);
    box-shadow:0 0 12px rgba(232,216,154,0.4), 0 0 30px rgba(232,216,154,0.15);
  }

  /* Orbit rings */
  .atom-orbit {
    position:absolute; top:50%; left:50%;
    border:1px solid rgba(200,180,120,0.12);
    border-radius:50%;
    animation:atom-spin linear infinite;
  }
  .atom-orbit:nth-child(2) { width:80px; height:80px; margin:-40px 0 0 -40px; animation-duration:2.4s; }
  .atom-orbit:nth-child(3) { width:100px; height:100px; margin:-50px 0 0 -50px; animation-duration:3.2s; transform:rotate(60deg); animation-name:atom-spin-2; }
  .atom-orbit:nth-child(4) { width:110px; height:110px; margin:-55px 0 0 -55px; animation-duration:4.0s; transform:rotate(-30deg); animation-name:atom-spin-3; }

  /* Electrons */
  .atom-electron {
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:rgba(200,180,120,0.8);
    box-shadow:0 0 6px rgba(200,180,120,0.5);
    top:-3px; left:50%; margin-left:-3px;
  }

  @keyframes atom-spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  @keyframes atom-spin-2 { from { transform:rotate(60deg); } to { transform:rotate(420deg); } }
  @keyframes atom-spin-3 { from { transform:rotate(-30deg); } to { transform:rotate(330deg); } }

  .loading-label {
    margin-top:28px;
    font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:rgba(200,180,120,0.45);
  }
  #welcome-overlay {
    position:fixed; inset:0; z-index:9999;
    display:flex; align-items:center; justify-content:center;
    background:transparent; pointer-events:none;
    opacity:0; transition:opacity 1.2s ease;
  }
  #welcome-overlay.visible { opacity:1; }
  #welcome-text {
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:clamp(22px, 3.5vw, 48px); font-weight:300;
    letter-spacing:0.08em; text-transform:uppercase;
    color:rgba(232,216,154,0.9);
    text-shadow:0 0 30px rgba(232,216,154,0.3), 0 0 60px rgba(232,216,154,0.1);
    text-align:center; padding:0 20px;
  }
  #zsr-brand {
    position:fixed; top:16px; left:18px; z-index:101;
    display:flex; align-items:center; gap:10px;
    opacity:0.7; transition:opacity 0.3s;
    pointer-events:auto; cursor:pointer;
    text-decoration:none;
  }
  #zsr-brand:hover { opacity:1; }
  #zsr-logo { width:48px; height:auto; }
  #zsr-brand-text {
    font-size:10px; letter-spacing:0.08em;
    color:rgba(200,180,120,0.6); white-space:nowrap;
  }
  #c { display:block; width:100%; height:100%; cursor:grab; }
  #c:active { cursor:grabbing; }
  #title-bar {
    position:fixed; top:0; left:0; width:100%;
    height:130px;
    background:rgba(0,0,0,0.80);
    z-index:99; pointer-events:none;
    backdrop-filter:blur(2px);
  }
  #title {
    position:fixed; top:28px; left:50%; transform:translateX(-50%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:42px; font-weight:700;
    letter-spacing:0.04em; color:rgba(232,216,154,0.82);
    text-transform:uppercase; z-index:100; pointer-events:none; white-space:nowrap;
    text-shadow: 0 0 60px rgba(232,216,154,0.18);
  }
  #title-sprite {
    position:fixed; top:0; left:0; pointer-events:none; z-index:101;
  }
  #subtitle {
    position:fixed; top:90px; left:50%; transform:translateX(-50%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; letter-spacing:0.08em;
    color:rgba(180,165,130,0.5); z-index:100; pointer-events:none; white-space:nowrap;
    text-transform:uppercase;
  }
  #node-info {
    max-width:560px; width:560px; padding:28px 32px 32px;
    opacity:0; transition:opacity 0.35s ease;
    background:rgba(4,6,15,0.92); border:1px solid rgba(200,180,120,0.22);
    border-radius:10px; backdrop-filter:blur(10px);
    position:fixed; z-index:120; pointer-events:auto;
  }
  #node-info.visible { opacity:1; }
  #node-info-drag {
    display:flex; flex-direction:column; align-items:center; gap:2.5px;
    padding:5px 0 6px; cursor:grab; user-select:none;
    width:33%; margin:0 auto;
    position:relative; top:-20px; margin-bottom:-14px;
  }
  #node-info-drag:active { cursor:grabbing; }
  #node-info-drag span {
    display:block; width:100%; height:1.5px; border-radius:1px;
    background:rgba(200,180,120,0.2);
    transition:background 0.15s;
  }
  #node-info-drag:hover span { background:rgba(200,180,120,0.45); }
  #node-info-img-wrap {
    width:100%; height:110px; overflow:hidden; border-radius:8px;
    margin-bottom:16px; display:none; background:rgba(255,255,255,0.03);
  }
  #node-info-img-wrap.visible { display:block; }
  #node-info-img {
    width:100%; height:110px; object-fit:cover; display:block;
    opacity:0; transition:opacity 0.4s ease;
  }
  #node-info-img.loaded { opacity:1; }
  #node-info-name { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:30px; font-weight:700; letter-spacing:0.02em; color:#e8d89a; margin-bottom:8px; }
  #node-info-domain { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:20px; }
  #node-info-desc { font-size:15px; line-height:1.75; color:rgba(215,205,185,0.88); letter-spacing:0.02em; margin-bottom:22px; }
  #node-info-related-label { font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:rgba(160,150,130,0.6); margin-bottom:12px; }
  #node-info-related { display:flex; flex-wrap:wrap; gap:8px; }
  .related-chip {
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; padding:5px 13px;
    border-radius:4px; border:1px solid rgba(200,180,120,0.25);
    background:rgba(255,255,255,0.04); color:rgba(220,210,185,0.8);
    cursor:pointer; transition: background 0.15s, color 0.15s; letter-spacing:0.05em;
    pointer-events:auto;
  }
  .related-chip:hover { background:rgba(232,216,154,0.15); color:#e8d89a; }
  #node-info-factoid {
    max-height:0; overflow:hidden; opacity:0;
    transition:max-height 0.5s ease, opacity 0.4s ease, margin 0.4s ease;
    margin-top:0; border-top:none;
  }
  #node-info-factoid.visible {
    max-height:200px; opacity:1;
    margin-top:18px; padding-top:16px;
    border-top:1px solid rgba(200,180,120,0.12);
  }
  #factoid-label {
    font-size:19px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    color:rgba(232,216,154,0.9); margin-bottom:12px;
    text-shadow:0 0 8px rgba(232,216,154,0.3);
    opacity:0; transform:translateY(6px);
    transition:opacity 0.4s ease, transform 0.4s ease;
  }
  #node-info-factoid.visible #factoid-label {
    opacity:1; transform:translateY(0);
    animation:factoid-glow 3s ease-in-out infinite;
  }
  @keyframes factoid-glow {
    0%   { color:rgba(232,216,154,0.6); text-shadow:0 0 4px rgba(232,216,154,0.15); }
    25%  { color:rgba(255,240,180,1);   text-shadow:0 0 18px rgba(232,216,154,0.7), 0 0 36px rgba(232,216,154,0.3); }
    50%  { color:rgba(232,216,154,0.6); text-shadow:0 0 4px rgba(232,216,154,0.15); }
    75%  { color:rgba(255,240,180,0.9); text-shadow:0 0 14px rgba(232,216,154,0.5), 0 0 28px rgba(232,216,154,0.2); }
    100% { color:rgba(232,216,154,0.6); text-shadow:0 0 4px rgba(232,216,154,0.15); }
  }
  #factoid-text {
    font-size:14px; line-height:1.7; color:rgba(215,205,185,0.75);
  }
  #factoid-text .cursor {
    display:inline-block; width:1px; height:1em; vertical-align:text-bottom;
    background:rgba(232,216,154,0.7); margin-left:2px;
    animation:blink-cursor 0.6s steps(1) infinite;
  }
  @keyframes blink-cursor { 0%,50%{opacity:1} 51%,100%{opacity:0} }
  .moon-label {
    position:fixed; pointer-events:auto; cursor:pointer; z-index:130;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; letter-spacing:0.03em;
    text-transform:uppercase; white-space:nowrap;
    transform:translateX(-50%);
    text-shadow: 0 0 12px currentColor;
    transition: opacity 0.2s;
    opacity:0;
  }
  .moon-label:hover { opacity:1 !important; text-shadow:0 0 20px currentColor; }
  #node-info-wiki {
    display:inline-block; margin-bottom:20px;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:0.08em;
    color:rgba(140,180,220,0.75); text-decoration:none;
    border-bottom:1px solid rgba(140,180,220,0.3);
    transition: color 0.15s, border-color 0.15s;
  }
  #node-info-wiki:hover { color:rgba(180,215,255,0.95); border-color:rgba(180,215,255,0.6); }
  #leader-svg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:115;
  }
  #leader-line { stroke:rgba(200,180,120,0.45); stroke-width:1.2; fill:none; stroke-dasharray:4 3; }
  #leader-dot  { fill:rgba(232,216,154,0.9); }
  #hover-label {
    position:fixed; pointer-events:none; z-index:150;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:14px; letter-spacing:0.03em;
    color:#e8d89a; background:rgba(4,6,15,0.85);
    padding:5px 12px; border-radius:4px; border:1px solid rgba(200,180,120,0.25);
    opacity:0; transition:opacity 0.1s; transform:translateX(-50%);
    white-space:nowrap;
  }
  #legend {
    position:fixed; bottom:24px; left:24px; z-index:100;
    display:flex; flex-direction:column; gap:7px; max-height:80vh; overflow:hidden;
    background:rgba(0,0,0,0.80); backdrop-filter:blur(2px);
    padding:16px 18px; border-radius:10px;
  }
  .legend-item {
    display:flex; align-items:center; gap:9px; font-size:13px;
    letter-spacing:0.08em; color:rgba(180,170,150,0.7); cursor:pointer;
    transition:color 0.2s;
  }
  .legend-item:hover { color:rgba(220,210,190,0.95); }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  #instructions {
    position:fixed; bottom:24px; right:24px; font-size:8px;
    color:rgba(130,120,100,0.4); letter-spacing:0.1em; line-height:1.9; text-align:right; z-index:100;
  }
  #settling { position:fixed; bottom:60px; right:24px; font-size:8px; color:rgba(140,180,140,0.5); letter-spacing:0.1em; z-index:100; transition:opacity 1s; }

  #audio-controls {
    position:fixed; top:18px; left:260px; z-index:200;
    display:flex; align-items:center; gap:10px;
    pointer-events:auto;
  }
  #mute-btn {
    background:none; border:none; cursor:pointer; padding:4px;
    color:rgba(200,185,140,0.7); font-size:28px; line-height:1;
    transition:color 0.2s, transform 0.15s;
  }
  #mute-btn:hover { color:rgba(232,216,154,0.95); transform:scale(1.1); }
  #mute-btn svg { display:block; }
  #mute-btn .speaker-wave1, #mute-btn .speaker-wave2 { transition:opacity 0.2s; }
  #mute-btn.muted { color:rgba(200,185,140,0.3); }
  #mute-btn.muted .speaker-wave1, #mute-btn.muted .speaker-wave2 { opacity:0; }
  #vol-slider {
    -webkit-appearance:none; appearance:none;
    width:70px; height:2px; border-radius:2px; outline:none; cursor:pointer;
    background: linear-gradient(to right,
      rgba(232,216,154,0.7) 0%, rgba(232,216,154,0.7) var(--pct,60%),
      rgba(120,110,80,0.3) var(--pct,60%), rgba(120,110,80,0.3) 100%);
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
    background:rgba(232,216,154,0.85); cursor:pointer; border:none;
    box-shadow:0 0 6px rgba(232,216,154,0.4);
  }
  #vol-slider::-moz-range-thumb {
    width:11px; height:11px; border-radius:50%;
    background:rgba(232,216,154,0.85); cursor:pointer; border:none;
  }

  /* ── Search Bar ── */
  #search-wrap {
    position:fixed; top:16px; right:18px; z-index:200;
    display:flex; align-items:center;
  }
  #search-input {
    width:200px; opacity:1; padding:9px 14px 9px 32px;
    background:rgba(4,6,15,0.75); border:1px solid rgba(200,180,120,0.18);
    border-radius:20px; color:#e8e0d0;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px;
    outline:none; backdrop-filter:blur(8px);
    transition:border-color 0.2s, background 0.2s;
  }
  #search-input:focus {
    border-color:rgba(200,180,120,0.4);
    background:rgba(4,6,15,0.9);
  }
  #search-input::placeholder { color:rgba(200,180,120,0.35); }
  #search-btn {
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    color:rgba(200,180,120,0.4); font-size:14px;
    padding:0; line-height:1; pointer-events:none;
  }
  #search-results {
    position:fixed; top:48px; right:18px; z-index:200;
    background:rgba(4,6,15,0.9); border:1px solid rgba(200,180,120,0.15);
    border-radius:10px; backdrop-filter:blur(8px);
    max-height:300px; overflow-y:auto; display:none;
    min-width:220px;
  }
  #search-results.visible { display:block; }
  .search-result {
    padding:10px 14px; cursor:pointer; font-size:13px;
    color:rgba(220,210,185,0.8); transition:background 0.15s;
    border-bottom:1px solid rgba(200,180,120,0.06);
  }
  .search-result:last-child { border-bottom:none; }
  .search-result:hover { background:rgba(200,180,120,0.08); }
  .search-result .sr-domain {
    font-size:10px; color:rgba(200,180,120,0.4); margin-top:2px;
  }

  /* ── Topic Gallery ── */
  #topic-gallery {
    position:fixed; z-index:119; pointer-events:none;
    display:flex; justify-content:center; gap:0;
    opacity:0; transition:opacity 0.4s ease;
  }
  #topic-gallery.visible { opacity:1; }
  .gallery-img-wrap {
    flex:1; height:90px; overflow:hidden;
    border:1px solid rgba(200,180,120,0.12);
    border-right:3px solid #04060f;
    background:rgba(4,6,15,0.85);
    opacity:0; transform:translateY(8px);
    transition:opacity 0.5s ease, transform 0.5s ease;
    pointer-events:auto; position:relative;
  }
  .gallery-img-wrap:first-child { border-radius:8px 0 0 8px; }
  .gallery-img-wrap:last-child { border-right:none; border-radius:0 8px 8px 0; }
  .gallery-img-wrap.visible { opacity:1; transform:translateY(0); }
  .gallery-img-wrap img {
    width:100%; height:100%; object-fit:cover; display:block;
    filter:saturate(0.7) contrast(1.1);
    transition:filter 0.3s;
  }
  .gallery-img-wrap:hover img { filter:saturate(1) contrast(1); }

  /* ── Journey Button ── */
  #journey-btn {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200;
    background:rgba(4,6,15,0.8); border:1px solid rgba(200,180,120,0.25);
    border-radius:20px; padding:10px 24px; cursor:pointer;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:12px; letter-spacing:0.1em; text-transform:uppercase;
    color:rgba(232,216,154,0.7); backdrop-filter:blur(8px);
    transition:all 0.3s; pointer-events:auto;
  }
  #journey-btn:hover { color:rgba(232,216,154,1); border-color:rgba(200,180,120,0.5); background:rgba(4,6,15,0.95); }
  #journey-btn.active { border-color:rgba(200,100,100,0.4); color:rgba(200,130,130,0.8); }

  /* ── Path Visualization ── */
  #path-btn {
    position:fixed; bottom:24px; right:120px; z-index:200;
    background:rgba(4,6,15,0.8); border:1px solid rgba(200,180,120,0.2);
    border-radius:20px; padding:8px 16px; cursor:pointer;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    color:rgba(200,180,120,0.5); backdrop-filter:blur(8px);
    transition:all 0.3s; pointer-events:auto; display:none;
  }
  #path-btn.visible { display:block; }
  #path-btn:hover { color:rgba(232,216,154,0.9); border-color:rgba(200,180,120,0.4); }

  /* ── Domain Constellation ── */
  #constellation-toast {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:9000; pointer-events:none;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:clamp(16px, 2.5vw, 36px); font-weight:300;
    letter-spacing:0.08em; text-transform:uppercase;
    color:rgba(232,216,154,0.9);
    text-shadow:0 0 20px rgba(232,216,154,0.4);
    opacity:0; transition:opacity 0.8s ease;
    text-align:center;
  }
  #constellation-toast.visible { opacity:1; }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    #title-bar { height:90px; }
    #title { font-size:22px; top:16px; }
    #subtitle { font-size:10px; top:52px; letter-spacing:0.06em; }

    #zsr-brand { top:10px; left:10px; gap:6px; }
    #zsr-logo { width:32px; }
    #zsr-brand-text { font-size:8px; }

    #audio-controls { top:12px; left:auto; right:52px; }
    #mute-btn { font-size:22px; }
    #vol-slider { width:50px; }

    #search-wrap { top:12px; right:10px; }
    #search-input { width:140px; font-size:11px; padding:7px 10px 7px 28px; }
    #search-results { right:10px; top:42px; min-width:140px; }

    #node-info {
      max-width:calc(100vw - 20px); width:calc(100vw - 20px);
      padding:16px 18px 20px;
      left:10px !important; right:10px;
      bottom:10px !important; top:auto !important;
      max-height:55vh; overflow-y:auto;
    }
    #node-info-name { font-size:20px; }
    #node-info-domain { font-size:10px; margin-bottom:12px; }
    #node-info-desc { font-size:13px; line-height:1.6; margin-bottom:14px; }
    #node-info-img-wrap { height:80px; }
    #node-info-img { height:80px; }
    #node-info-wiki { font-size:10px; }
    #node-info-related-label { font-size:9px; }
    .related-chip { font-size:10px; padding:4px 10px; }
    #factoid-label { font-size:12px; }
    #factoid-text { font-size:12px; line-height:1.6; }

    #legend {
      bottom:auto; top:90px; left:10px;
      padding:10px 12px; border-radius:8px;
      max-height:40vh; overflow-y:auto;
    }
    .legend-item { font-size:11px; gap:6px; }
    .legend-dot { width:8px; height:8px; }

    #instructions { display:none; }
    #journey-btn { font-size:10px; padding:8px 16px; bottom:12px; }
    #path-btn { bottom:12px; right:10px; font-size:9px; padding:6px 12px; }
    #settling { bottom:40px; right:10px; }

    #hover-label { display:none; }

    .moon-label { font-size:10px !important; }

    #leader-svg { display:none; }
    #topic-gallery { display:none; }
  }

  @media (max-width: 400px) {
    #title { font-size:18px; }
    #subtitle { font-size:9px; }
    #zsr-brand-text { display:none; }
    #audio-controls { right:44px; }
    #vol-slider { display:none; }
    #node-info { max-height:50vh; }
    #node-info-name { font-size:18px; }
    #legend { max-height:35vh; }
    .legend-item { font-size:10px; }
  }
</style>
</head>
<body>
<div id="loading-screen">
  <div class="atom">
    <div class="atom-nucleus"></div>
    <div class="atom-orbit"><div class="atom-electron"></div></div>
    <div class="atom-orbit"><div class="atom-electron"></div></div>
    <div class="atom-orbit"><div class="atom-electron"></div></div>
  </div>

function handleVRMenuSelect(controller) {
  if (!_vrMenuVisible) return false;
  _xrTempMatrix.identity().extractRotation(controller.matrixWorld);
  _xrMenuRaycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  _xrMenuRaycaster.ray.direction.set(0, 0, -1).applyMatrix4(_xrTempMatrix);
  const hits = _xrMenuRaycaster.intersectObjects([_exitBtn, _restartBtn], false);
  if (hits.length > 0) {

    if (name === 'xr-exit-btn') {
      _vrMenuVisible = false;
      _vrMenu.visible = false;
      if (_xrSession) _xrSession.end();
    } else if (name === 'xr-restart-btn') {

        _xrSession.end();
        setTimeout(() => window.location.reload(), 500);
      } else {
        window.location.reload();

    return true;

}

let _menuBtnWasPressed = false;
function pollMenuButton() {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    // Button 4 = A/X, Button 5 = B/Y on Quest controllers
    const b4 = src.gamepad.buttons[4];
    const b5 = src.gamepad.buttons[5];
    const pressed = (b4 && b4.pressed) || (b5 && b5.pressed);
    if (pressed && !_menuBtnWasPressed) {
      _menuBtnWasPressed = true;
      toggleVRMenu();
      return;
    }
    if (!pressed) _menuBtnWasPressed = false;
  }
}

renderer.xr.addEventListener('sessionstart', () => {

  if (window._welcomeSprite) window._welcomeSprite.material.opacity = 0;

  // Ambient space stars — world scale, surround the user, each drifts slowly
  (function() {
    var N = 6000;
    var pos = new Float32Array(N * 3);
    var col = new Float32Array(N * 3);
    var vel = new Float32Array(N * 3); // per-star drift velocity
    for (var i = 0; i < N; i++) {
      var r = 8 + Math.random() * 22;
      var t = Math.random() * Math.PI * 2;
      var p = Math.acos(2 * Math.random() - 1);
      pos[i*3] = r * Math.sin(p) * Math.cos(t);
      pos[i*3+1] = r * Math.sin(p) * Math.sin(t);
      pos[i*3+2] = r * Math.cos(p);
      // Random slow drift direction and speed (0.0002–0.001 m/frame)
      var speed = 0.0002 + Math.random() * 0.0008;
      var vt = Math.random() * Math.PI * 2;
      var vp = Math.acos(2 * Math.random() - 1);
      vel[i*3]   = Math.sin(vp) * Math.cos(vt) * speed;
      vel[i*3+1] = Math.sin(vp) * Math.sin(vt) * speed;
      vel[i*3+2] = Math.cos(vp) * speed;
      // Star color temperature
      var temp = Math.random();
      if (temp < 0.6) { col[i*3]=0.9; col[i*3+1]=0.85; col[i*3+2]=0.8; }
      else if (temp < 0.8) { col[i*3]=0.7; col[i*3+1]=0.8; col[i*3+2]=1.0; }
      else if (temp < 0.9) { col[i*3]=1.0; col[i*3+1]=0.7; col[i*3+2]=0.4; }
      else { col[i*3]=1.0; col[i*3+1]=0.95; col[i*3+2]=0.9; }
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    var mat = new THREE.PointsMaterial({
      size: 0.06, vertexColors: true, transparent: true, opacity: 0.9,
      sizeAttenuation: true, depthWrite: false,
    });
    var starPoints = new THREE.Points(geo, mat);
    scene.add(starPoints);
    // Drift update — called each frame from animate loop
    window._vrStarDrift = function() {
      var posArr = geo.attributes.position.array;
      for (var i = 0; i < N; i++) {
        posArr[i*3]   += vel[i*3];
        posArr[i*3+1] += vel[i*3+1];
        posArr[i*3+2] += vel[i*3+2];
        // If star drifts too far (>35m) or too close (<6m), reverse direction
        var d = Math.sqrt(posArr[i*3]*posArr[i*3] + posArr[i*3+1]*posArr[i*3+1] + posArr[i*3+2]*posArr[i*3+2]);
        if (d > 35 || d < 6) { vel[i*3] *= -1; vel[i*3+1] *= -1; vel[i*3+2] *= -1; }
      }
      geo.attributes.position.needsUpdate = true;
    };
  })();

  // ─── HYPERSPACE STREAKS (radial — emanate from center ahead of user) ───────
  (function() {
    var N = 800;
    var dirs = new Float32Array(N * 6);
    var offsets = new Float32Array(N * 2);
    var speeds = new Float32Array(N * 2);
    for (var i = 0; i < N; i++) {
      // Random direction in a forward cone (streaks radiate outward from center)
      var theta = Math.random() * Math.PI * 2;
      var phi = Math.pow(Math.random(), 0.6) * 1.2; // weighted toward edges for coverage
      var dx = Math.sin(phi) * Math.cos(theta);
      var dy = Math.sin(phi) * Math.sin(theta);
      var dz = Math.cos(phi); // +Z = toward user
      dirs[i*6] = dx; dirs[i*6+1] = dy; dirs[i*6+2] = dz;
      dirs[i*6+3] = dx; dirs[i*6+4] = dy; dirs[i*6+5] = dz;
      var off = Math.random();
      offsets[i*2] = off; offsets[i*2+1] = off;
      var spd = 0.3 + Math.random() * 1.0;
      speeds[i*2] = spd; speeds[i*2+1] = spd;
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(N * 6), 3));
    geo.setAttribute('aDir', new THREE.BufferAttribute(dirs, 3));
    geo.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 1));
    geo.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
    var mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: { uWarp: { value: 0 }, uTime: { value: 0 } },
      vertexShader: [
        'attribute vec3 aDir;',
        'attribute float aOffset, aSpeed;',
        'uniform float uWarp, uTime;',
        'varying float vAlpha;',
        'void main() {',
        '  vec3 origin = vec3(0.0, 1.4, -4.0);',
        '  float maxDist = 18.0;',
        '  float t = mod(aOffset + uTime * aSpeed * 0.6 * uWarp, 1.0);',
        '  float dist = t * maxDist;',
        '  float isTail = mod(float(gl_VertexID), 2.0);',
        '  float tailLen = uWarp * aSpeed * 3.0;',
        '  dist -= isTail * tailLen;',
        '  vec3 pos = origin + aDir * max(dist, 0.0);',
        '  float fadeFront = smoothstep(0.0, 4.0, dist);',
        '  float fadeBack = smoothstep(maxDist, maxDist - 5.0, dist);',
        '  vAlpha = uWarp * 0.75 * fadeFront * fadeBack;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'varying float vAlpha;',
        'void main() {',
        '  gl_FragColor = vec4(0.75, 0.85, 1.0, vAlpha);',
        '}'
      ].join('\n'),
    });

// Helper: word wrap
function wrapText(ctx, text, x, y, maxW, lineH, maxY) {
  if (!text) return y;
  var words = text.split(' '), line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      ctx.fillText(line.trim(), x, y);
      line = words[i] + ' '; y += lineH;
      if (maxY && y > maxY) return y;
    } else { line = test; }
  }
  if (line.trim()) ctx.fillText(line.trim(), x, y);
  return y;
}

// Helper: drawChips — grid layout for canvas card chips
function drawChips(ctx, chips, startX, startY, colW, chipH, gap, cols, strokeColor, textColor) {
  ctx.font = '16px Helvetica,Arial,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (var i = 0; i < chips.length; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var cx = startX + col * (colW + gap);
    var cy = startY + row * (chipH + gap);
    ctx.beginPath();
    ctx.strokeStyle = strokeColor; ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
    if (ctx.roundRect) ctx.roundRect(cx, cy, colW, chipH, 6);
    else ctx.rect(cx, cy, colW, chipH);
    ctx.stroke(); ctx.globalAlpha = 1;
    ctx.fillStyle = textColor;
    var name = chips[i].id || chips[i];
    ctx.fillText(name, cx + colW/2, cy + chipH/2);
  }
}

// Helper: roundRect path
function rrPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); }
  else {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
}

    ctx.fillStyle = 'rgba(8,12,28,0.92)';
    ctx.fill();
    // Background image at low opacity (Human Being only)
    if (bgImg) {
      ctx.save();
      ctx.globalAlpha = 0.1;
      ctx.drawImage(bgImg, 0, 0, W, H);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // Border in domain color
    rrPath(ctx, 0, 0, W, H, 14);
    ctx.strokeStyle = hexToRgba(hex, 0.3); ctx.lineWidth = 1; ctx.stroke();
    // Title
    ctx.fillStyle = '#e8d89a';
    ctx.font = 'bold 34px Helvetica,Arial,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    var displayTitle = isHomeSubject ? HOME_SUBJECTS[n._hsIndex].label : n.id;
    ctx.fillText(displayTitle, 28, 28);
    // Domain tag
    ctx.fillStyle = hex;
    ctx.font = '14px Helvetica,Arial,sans-serif';
    ctx.fillText(isHomeSubject ? 'HUMAN BEING  ·  ' + (n._hsIndex+1) + ' of ' + HOME_SUBJECTS.length : domain.toUpperCase(), 28, 70);
    // HOME button (canvas visual) — upper right, LARGER
    if (!isHome) {
      ctx.fillStyle = 'rgba(232,216,154,0.15)';
      ctx.strokeStyle = '#e8d89a';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.7;
      if (ctx.roundRect) ctx.roundRect(565, 15, 120, 42, 8);
      else ctx.rect(565, 15, 120, 42);
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#e8d89a';
      ctx.font = 'bold 22px Helvetica,Arial,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⌂ HOME', 625, 36);
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    }
    // Description — special datasheet for Human Being
    var yEnd = 100;
    if (isHome) {
      var dataRows = [
        ['SPECIES',       'Homo sapiens'],
        ['CLASS',         'Mammalia  ·  ORDER: Primates'],
        ['ORIGIN',        'Earth, Sol System, Orion Arm'],
        ['AGE',           '~300,000 years'],
        ['POPULATION',    '~8.2 billion'],
        ['LIFESPAN',      '73 years avg'],
        ['HEIGHT / MASS', '1.7m  ·  70kg'],
        ['BRAIN',         '86B neurons, 1.4kg'],
        ['SENSES',        'Vision · Hearing · Touch · Taste · Smell'],
        ['LOCOMOTION',    'Bipedal endurance runner'],
        ['LANGUAGE',      '7,000+ spoken · written · math'],
        ['TRAITS',        'Reason · Art · Science · Empathy'],
        ['STATUS',        'Only species to map its own knowledge'],
      ];
      var labelX = 28, valX = 180, rowH = 24;
      for (var di = 0; di < dataRows.length; di++) {
        var ry = 100 + di * rowH;
        // Label — gold + arrow hint to show it's interactive
        ctx.fillStyle = '#d4c070';
        ctx.font = 'bold 12px Helvetica,Arial,sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(dataRows[di][0] + ' ›', labelX, ry);
        // Value
        ctx.fillStyle = 'rgba(220,215,200,0.95)';
        ctx.font = '15px Helvetica,Arial,sans-serif';
        ctx.fillText(dataRows[di][1], valX, ry);
        // Separator line
        if (di < dataRows.length - 1) {
          ctx.strokeStyle = 'rgba(100,100,100,0.15)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(labelX, ry + rowH - 3);
          ctx.lineTo(W - 28, ry + rowH - 3);
          ctx.stroke();
        }
      }
      yEnd = 100 + dataRows.length * rowH + 10;
      // Footer line
      ctx.fillStyle = 'rgba(232,216,154,0.6)';
      ctx.font = 'italic 14px Helvetica,Arial,sans-serif';
      ctx.fillText('You are here — the observer at the center of all knowledge.', labelX, yEnd);
      yEnd += 25;
    } else if (isHomeSubject) {
      // ── Home Subject card: 3 facts equally spaced between header and buttons ─
      var hs = HOME_SUBJECTS[n._hsIndex];
      var fpad = 28;
      var factsTop = 100;           // below domain tag
      var factsBot = H - 52 - 8;   // above FWD/BACK buttons (btnY - 8px gap)
      var slotH = Math.floor((factsBot - factsTop) / 3);
      var nums = ['①', '②', '③'];
      for (var fi = 0; fi < 3; fi++) {
        var slotY = factsTop + fi * slotH;
        // Divider line above each fact (except first)
        if (fi > 0) {
          ctx.strokeStyle = 'rgba(100,100,100,0.18)';
          ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(fpad, slotY + 2); ctx.lineTo(W - fpad, slotY + 2); ctx.stroke();
        }
        // Fact number
        ctx.fillStyle = hex;
        ctx.font = 'bold 23px Helvetica,Arial,sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(nums[fi], fpad, slotY + 8);
        // Fact text — wraps within slot
        ctx.fillStyle = 'rgba(220,215,200,0.92)';
        ctx.font = '18px Helvetica,Arial,sans-serif';
        wrapText(ctx, hs.facts[fi], fpad + 28, slotY + 8, W - fpad * 2 - 28, 24);
      }
      yEnd = factsBot;
      // FWD / BACK buttons
      var btnY = H - 52, btnH = 36, btnW = 110;
      // BACK button
      ctx.fillStyle = 'rgba(200,190,150,0.12)';
      ctx.strokeStyle = 'rgba(200,190,150,0.4)';
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = 0.85;
      if (ctx.roundRect) ctx.roundRect(fpad, btnY, btnW, btnH, 8);
      else ctx.rect(fpad, btnY, btnW, btnH);
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#e8d89a';
      ctx.font = 'bold 20px Helvetica,Arial,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('‹ BACK', fpad + btnW/2, btnY + btnH/2);
      // FWD button
      var fwdX = W - fpad - btnW;
      ctx.fillStyle = 'rgba(200,190,150,0.12)';
      ctx.strokeStyle = 'rgba(200,190,150,0.4)';
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = 0.85;
      if (ctx.roundRect) ctx.roundRect(fwdX, btnY, btnW, btnH, 8);
      else ctx.rect(fwdX, btnY, btnW, btnH);
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#e8d89a';
      ctx.textAlign = 'center';
      ctx.fillText('FWD ›', fwdX + btnW/2, btnY + btnH/2);
      // Counter
      ctx.fillStyle = 'rgba(160,155,130,0.6)';
      ctx.font = '13px Helvetica,Arial,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText((n._hsIndex + 1) + ' / ' + HOME_SUBJECTS.length, W/2, btnY + btnH/2);
    } else {
      // Split into intro lines and bullet lines
      var descLines = desc.split('\n');
      var introLines = [], bulletLines = [];
      descLines.forEach(function(l) {
        if (l.charAt(0) === '\u2022') bulletLines.push(l.slice(2).trim());
        else if (l !== '') introLines.push(l);
      });
      var maxW = W - 60;

      // Intro text — same style as before
      var descY = 100;
      ctx.fillStyle = 'rgba(200,195,180,0.9)';
      ctx.font = '17px Helvetica,Arial,sans-serif';
      descY = wrapText(ctx, introLines.join(' '), 28, descY, maxW, 22);
      descY += 14;

      // Bullets in equal slots — full sentence, no label prefix
      if (bulletLines.length > 0) {
        var factsBot2 = H - 75;
        var slotH2 = Math.floor((factsBot2 - descY) / bulletLines.length);
        var contentFontSz = 16, contentLineH = 22;
        for (var bi = 0; bi < bulletLines.length; bi++) {
          var slotY2 = descY + bi * slotH2;
          // Divider above each slot (except first)
          if (bi > 0) {
            ctx.strokeStyle = 'rgba(100,100,100,0.15)';
            ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(28, slotY2 + 2); ctx.lineTo(W - 28, slotY2 + 2); ctx.stroke();
          }
          // Strip "LABEL: " prefix — keep only the sentence after the colon
          var colonIdx = bulletLines[bi].indexOf(':');
          var sentence = colonIdx > -1 ? bulletLines[bi].slice(colonIdx + 1).trim() : bulletLines[bi];
          // Vertically center single line (or wrapped block) in slot
          var blockY = slotY2 + Math.floor((slotH2 - contentLineH) / 2);
          ctx.fillStyle = 'rgba(220,215,200,0.92)';
          ctx.font = contentFontSz + 'px Helvetica,Arial,sans-serif';
          ctx.textAlign = 'left'; ctx.textBaseline = 'top';
          wrapText(ctx, sentence, 28, blockY, maxW, contentLineH);
        }
        yEnd = factsBot2;
      } else {
        yEnd = descY;
      }
    }
    // Chips — evenly spread across bottom of card
    if (neighbors.length > 0) {
      var chipNames = [];
      for (var ci = 0; ci < Math.min(neighbors.length, 6); ci++) chipNames.push(neighbors[ci].id || neighbors[ci]);
      var chipY = Math.min(Math.max(yEnd + 20, H - 70), H - 38);
      var chipH = 28;
      var pad2 = 28;
      var totalW = W - pad2 * 2; // usable width
      var chipGap = 8;
      var numChips = chipNames.length;
      var chipW = (totalW - chipGap * (numChips - 1)) / numChips; // evenly divide
      ctx.font = '14px Helvetica,Arial,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      for (var ci = 0; ci < numChips; ci++) {
        var cx = pad2 + ci * (chipW + chipGap);
        var chipNode = nodeMap.get(chipNames[ci]);
        var chipHex = (chipNode && DOMAINS[chipNode.domain]) ? DOMAINS[chipNode.domain].color : hex;
        ctx.beginPath();
        ctx.strokeStyle = hexToRgba(chipHex, 0.5); ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
        if (ctx.roundRect) ctx.roundRect(cx, chipY, chipW, chipH, 6);
        else ctx.rect(cx, chipY, chipW, chipH);
        ctx.stroke(); ctx.globalAlpha = 1;
        ctx.fillStyle = 'rgba(200,195,180,0.8)';
        // Truncate long names
        var name = chipNames[ci];
        if (ctx.measureText(name).width > chipW - 10) {
          while (ctx.measureText(name + '...').width > chipW - 10 && name.length > 3) name = name.slice(0, -1);
          name += '...';
        }
        ctx.fillText(name, cx + chipW / 2, chipY + chipH / 2);
      }
    }
    if (window._noteCardBgTex) window._noteCardBgTex.needsUpdate = true;
  }

  // Draw initial card (no bg image)
  drawCard(null);

  // Load subject image as background for ALL cards
  var imgName = n.id.replace(/ /g, '_').replace(/\//g, '_').replace(/&/g, 'and').replace(/\(/g, '').replace(/\)/g, '').replace(/\./g, '') + '.jpg';
  var imgPath = isHome ? 'creation_adam_sm.jpg' : ('card_images/' + imgName);
  var bgImg = new Image();
  bgImg.onload = function() { drawCard(bgImg); };
  bgImg.src = imgPath;

  // Create texture + simple MeshBasicMaterial (no hologram shader)
  var bgTex = new THREE.CanvasTexture(bgCv);
  window._noteCardBgTex = bgTex;
  var bgMat = new THREE.MeshBasicMaterial({
    map: bgTex, transparent: true, side: THREE.DoubleSide,
    depthTest: false, depthWrite: false
  });
  window._noteCardMat = bgMat;
  // PlaneGeometry aspect 700:500 = 1.4:1
  var bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.0), bgMat);
  bgMesh.renderOrder = 0;
  cardGroup.add(bgMesh);

  // --- Invisible mesh overlays for click detection (raycasting) ---
  // Rounded rect helpers for clickable mesh shapes
  function makeRoundedRect(w, h, r) {
    var s = new THREE.Shape();
    s.moveTo(-w/2+r, -h/2); s.lineTo(w/2-r, -h/2);
    s.quadraticCurveTo(w/2, -h/2, w/2, -h/2+r);
    s.lineTo(w/2, h/2-r); s.quadraticCurveTo(w/2, h/2, w/2-r, h/2);
    s.lineTo(-w/2+r, h/2); s.quadraticCurveTo(-w/2, h/2, -w/2, h/2-r);
    s.lineTo(-w/2, -h/2+r); s.quadraticCurveTo(-w/2, -h/2, -w/2+r, -h/2);
    return new THREE.ShapeGeometry(s);
  }
  function makeRoundedRectRing(w, h, r, t) {
    var o = new THREE.Shape();
    o.moveTo(-w/2+r,-h/2);o.lineTo(w/2-r,-h/2);
    o.quadraticCurveTo(w/2,-h/2,w/2,-h/2+r);o.lineTo(w/2,h/2-r);
    o.quadraticCurveTo(w/2,h/2,w/2-r,h/2);o.lineTo(-w/2+r,h/2);
    o.quadraticCurveTo(-w/2,h/2,-w/2,h/2-r);o.lineTo(-w/2,-h/2+r);
    o.quadraticCurveTo(-w/2,-h/2,-w/2+r,-h/2);
    var iw=w-t*2,ih=h-t*2,ir=Math.max(0,r-t);
    var hole=new THREE.Path();
    hole.moveTo(-iw/2+ir,-ih/2);hole.lineTo(iw/2-ir,-ih/2);
    hole.quadraticCurveTo(iw/2,-ih/2,iw/2,-ih/2+ir);hole.lineTo(iw/2,ih/2-ir);
    hole.quadraticCurveTo(iw/2,ih/2,iw/2-ir,ih/2);hole.lineTo(-iw/2+ir,ih/2);
    hole.quadraticCurveTo(-iw/2,ih/2,-iw/2,ih/2-ir);hole.lineTo(-iw/2,-ih/2+ir);
    hole.quadraticCurveTo(-iw/2,-ih/2,-iw/2+ir,-ih/2);
    o.holes.push(hole);
    return new THREE.ShapeGeometry(o);
  }

  window._vrChipMeshes = [];

  // HOME button — invisible clickable mesh overlay (upper right, LARGER)
  if (!isHome) {
    // Canvas HOME is at (565,15) size 120x42 on 700x500 canvas
    // Center of button: x=625, y=36
    // Map to mesh: card is 1.4 x 1.0, origin at center
    var homeCX = (625/700)*1.4 - 0.7;  // ~0.55
    var homeCY = 0.5 - (36/500)*1.0;   // ~0.43
    var homeBtnW = 120/700*1.4, homeBtnH = 42/500*1.0;
    var homeBtnMesh = new THREE.Mesh(
      makeRoundedRect(homeBtnW, homeBtnH, 0.02),
      new THREE.MeshBasicMaterial({ color: new THREE.Color('#e8d89a'), transparent:true, opacity:0.0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
    );
    homeBtnMesh.position.set(homeCX, homeCY, 0.02);
    homeBtnMesh.renderOrder = 10;
    homeBtnMesh.userData.targetNode = 'Human Being';
    homeBtnMesh.userData.baseOpacity = 0.0;
    homeBtnMesh.userData.baseColor = '#e8d89a';
    cardGroup.add(homeBtnMesh);
    window._vrChipMeshes.push(homeBtnMesh);
    var homeEdge = new THREE.Mesh(
      makeRoundedRectRing(homeBtnW, homeBtnH, 0.02, 0.005),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent:true, opacity:0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
    );
    homeEdge.position.set(homeCX, homeCY, 0.025);
    homeEdge.renderOrder = 11;
    cardGroup.add(homeEdge);
    homeBtnMesh.userData._edgeMesh = homeEdge;
  }

  // Chip meshes — invisible overlays positioned over canvas chip locations
  if (neighbors.length > 0) {
    var maxChips = Math.min(neighbors.length, 6);
    var mPad = 28, mGap = 8, mChipH = 28;
    var mTotalW = W - mPad * 2;
    var mChipW = (mTotalW - mGap * (maxChips - 1)) / maxChips;
    var mChipY;
    if (isHome) {
      // Earth card: fixed Y matching canvas data-row layout
      mChipY = Math.min(Math.max(100 + 13 * 24 + 10 + 25 + 20, H - 70), H - 38);
    } else if (isHomeSubject) {
      // Home Subject (species) cards: bullets fill 100→(H-52-8), chips below
      var mFactsBot = H - 52 - 8;
      mChipY = Math.min(Math.max(mFactsBot + 20, H - 70), H - 38);
    } else {
      // Standard planet cards: equal-slot bullets fill descY→(H-75), chips below
      var mFactsBot2 = H - 75;
      mChipY = Math.min(Math.max(mFactsBot2 + 20, H - 70), H - 38);
    }
    for (var ci = 0; ci < maxChips; ci++) {
      var canvasX = mPad + ci * (mChipW + mGap) + mChipW / 2;
      var canvasY = mChipY + mChipH / 2;
      var meshX = (canvasX / W) * 1.4 - 0.7;
      var meshY = 0.5 - (canvasY / H) * 1.0;
      var meshW = (mChipW / W) * 1.4;
      var meshH = (mChipH / H) * 1.0;
      var chipName = neighbors[ci].id || neighbors[ci];

      var chipBg = new THREE.Mesh(
        makeRoundedRect(meshW, meshH, 0.01),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(hex), transparent:true, opacity:0.0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
      );
      chipBg.position.set(meshX, meshY, 0.02);
      chipBg.renderOrder = 10;
      chipBg.userData.targetNode = chipName;
      chipBg.userData.baseOpacity = 0.0;
      chipBg.userData.baseColor = hex;
      cardGroup.add(chipBg);
      window._vrChipMeshes.push(chipBg);

      // Edge ring (invisible until hover)
      var edgeMesh = new THREE.Mesh(
        makeRoundedRectRing(meshW, meshH, 0.01, 0.004),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent:true, opacity:0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
      );
      edgeMesh.position.set(meshX, meshY, 0.025);
      edgeMesh.renderOrder = 11;
      cardGroup.add(edgeMesh);
      chipBg.userData._edgeMesh = edgeMesh;
    }
  }

  // ── Home Subject card: FWD / BACK invisible mesh buttons ─────────────────
  if (isHomeSubject) {
    var btnW3 = (110/700)*1.4, btnH3 = (36/500)*1.0;
    var btnY3 = 0.5 - ((H - 52 + 18)/500)*1.0;
    // BACK button (left)
    var backX3 = (28 + 55)/700*1.4 - 0.7;
    var backBtn = new THREE.Mesh(
      makeRoundedRect(btnW3, btnH3, 0.01),
      new THREE.MeshBasicMaterial({ color:0xe8d89a, transparent:true, opacity:0.0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
    );
    backBtn.position.set(backX3, btnY3, 0.02);
    backBtn.renderOrder = 10;
    backBtn.userData.baseOpacity = 0.0;
    backBtn.userData.onSelect = function() {
      var prevIdx = (n._hsIndex - 1 + HOME_SUBJECTS.length) % HOME_SUBJECTS.length;
      goToHomeSubject(prevIdx);
    };
    cardGroup.add(backBtn);
    window._vrChipMeshes.push(backBtn);
    // FWD button (right)
    var fwdX3 = (700 - 28 - 55)/700*1.4 - 0.7;
    var fwdBtn = new THREE.Mesh(
      makeRoundedRect(btnW3, btnH3, 0.01),
      new THREE.MeshBasicMaterial({ color:0xe8d89a, transparent:true, opacity:0.0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
    );
    fwdBtn.position.set(fwdX3, btnY3, 0.02);
    fwdBtn.renderOrder = 10;
    fwdBtn.userData.baseOpacity = 0.0;
    fwdBtn.userData.onSelect = function() {
      var nextIdx = (n._hsIndex + 1) % HOME_SUBJECTS.length;
      goToHomeSubject(nextIdx);
    };
    cardGroup.add(fwdBtn);
    window._vrChipMeshes.push(fwdBtn);
  }

  // ── Home card: invisible label overlays — one per datasheet row ───────────
  if (isHome) {
    var rowH2 = 24, labelX2 = 28, labelW2 = 148;
    for (var li = 0; li < HOME_SUBJECTS.length; li++) {
      var lCanvasY = 100 + li * rowH2 + rowH2/2;
      var lCanvasX = labelX2 + labelW2/2;
      var lMeshX = (lCanvasX/700)*1.4 - 0.7;
      var lMeshY = 0.5 - (lCanvasY/500)*1.0;
      var lMeshW = (labelW2/700)*1.4;
      var lMeshH = (rowH2/500)*1.0;
      var labelBtn = new THREE.Mesh(
        makeRoundedRect(lMeshW, lMeshH, 0.005),
        new THREE.MeshBasicMaterial({ color:0xd4c070, transparent:true, opacity:0.0, side:THREE.DoubleSide, depthTest:false, depthWrite:false })
      );
      labelBtn.position.set(lMeshX, lMeshY, 0.02);
      labelBtn.renderOrder = 10;
      labelBtn.userData.targetNode = HOME_SUBJECTS[li].id;
      labelBtn.userData.baseOpacity = 0.0;
      labelBtn.userData.baseColor = '#d4c070';
      cardGroup.add(labelBtn);
      window._vrChipMeshes.push(labelBtn);
    }
  }

  parent.add(cardGroup);
  _vrNoteCards.push(cardGroup);
}

function hideVRNoteCard() {
  try {
    _vrNoteCards.forEach(function(card) {
      try {
        if (card.parent) card.parent.remove(card);
        if (card.isGroup) {
          // Snapshot children array (it mutates during removal)
          var kids = card.children.slice();
          for (var i = 0; i < kids.length; i++) {
            try {
              var child = kids[i];
              // Troika text has its own dispose
              if (child.dispose && typeof child.dispose === 'function') child.dispose();
              else {
                if (child.material) child.material.dispose();
                if (child.geometry) child.geometry.dispose();
              }
            } catch(e) {}
          }
        } else {
          if (card.material) {
            if (card.material.uniforms && card.material.uniforms.uMap)
              card.material.uniforms.uMap.value.dispose();
            card.material.dispose();
          }
          if (card.geometry) card.geometry.dispose();
        }
      } catch(e) {}
    });
  } catch(e) {}
  _vrNoteCards = [];
  window._noteCardMat = null;
  window._vrChipMeshes = [];
}

function xrSelectNode(controller) {
  if (window._introLocked) return;
  _tourActive = false;
  window._vrDriftLoop = null;
  window._bhOrbit = null;
  _xrTempMatrix.identity().extractRotation(controller.matrixWorld);
  _xrRayOrigin.setFromMatrixPosition(controller.matrixWorld);
  _xrRayDir.set(0, 0, -1).applyMatrix4(_xrTempMatrix);

  // Check chip clicks first
  if (window._vrChipMeshes && window._vrChipMeshes.length > 0) {
    var chipRay = new THREE.Raycaster(_xrRayOrigin, _xrRayDir);
    var chipHits = chipRay.intersectObjects(window._vrChipMeshes, false);
    if (chipHits.length > 0) {
      // onSelect callback (FWD/BACK buttons on subject cards)
      if (chipHits[0].object.userData.onSelect) {
        chipHits[0].object.userData.onSelect();
        return;
      }
      var targetName = chipHits[0].object.userData.targetNode;
      var targetNode = nodeMap.get(targetName);
      if (targetNode) {
        focusNode(targetNode);
        window._warpActive = true;
        setTimeout(function(){ window._warpActive = false; }, 2000);
        if (_galaxyGroup) {
          _galaxyGroup.rotation.set(0,0,0);
          window._vrDriftLoop = null;
          window._bhOrbit = null;
          var tx = 0 - targetNode.x * XR_SCALE;
          var ty = 1.4 - targetNode.y * XR_SCALE;
          var tz = -3.0 - targetNode.z * XR_SCALE;
          _vrZoomAnim = { startPos: _galaxyGroup.position.clone(), endPos: new THREE.Vector3(tx,ty,tz), t:0, frames:90 };
        }
        return;
      }
    }
  }

  // Find closest node to the ray within a cone
  let bestNode = null;
  let bestAngle = 0.12; // ~7 degree cone
  for (const n of nodes) {
    if (!n.mesh) continue;

      const tx = 0 - BH_POS.x * XR_SCALE;

      _vrZoomAnim = { startPos: _galaxyGroup.position.clone(), endPos: endPos, t: 0, frames: 90, easing: 'inExpo' };

      window._bhOrbit = { center: endPos, angle: 0, radius: 0.3 }; // gentle orbit, not wild

        osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 4);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 6);

        osc.start(); osc.stop(audioCtx.currentTime + 6);

  }

  // Check White Hole (same detection as BH — uses stored mesh)
  if (window._whCoreMesh && _galaxyGroup) {

    const toWH = _xrNodeWorld.clone().sub(_xrRayOrigin).normalize();

    if (whAngle < 0.18 && (!bestNode || whAngle < bestAngle + 0.05)) {
      // Same exact zoom params as BH (the "dope" ones)
      _galaxyGroup.rotation.set(0, 0, 0);
      const tx = 0 - WH_POS.x * XR_SCALE;
      const ty = 1.4 - WH_POS.y * XR_SCALE;
      const tz = -3.5 - WH_POS.z * XR_SCALE;
      const endPos = new THREE.Vector3(tx, ty, tz);
      _vrZoomAnim = { startPos: _galaxyGroup.position.clone(), endPos: endPos, t: 0, frames: 90, easing: 'inExpo' };

      if (window._hyperspace) { window._hyperspace.engage(); setTimeout(function(){ window._hyperspace.disengage(); }, 3000); }
      setTimeout(() => { window._warpActive = false; }, 4000);
      // Pitch shift UP for white hole
      if (audioCtx && audioCtx._masterGain) {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(40, audioCtx.currentTime);

      }
      return;
    }
  }

  if (bestNode) {
    focusNode(bestNode);
    // Haptic pulse on planet select
    try { const gp = controller.userData.gamepad || (renderer.xr.getSession() && Array.from(renderer.xr.getSession().inputSources).find(s => s.gamepad)?.gamepad);

      _vrZoomAnim = { startPos: _galaxyGroup.position.clone(), endPos: new THREE.Vector3(tx, ty, tz), t: 0, frames: 60 };

function pollRightTriggerExit() {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    if (!src.gamepad || src.handedness !== 'right') continue;
    // Button 0 = trigger
    const trigger = src.gamepad.buttons[0];
    if (trigger && trigger.pressed && !_rightTriggerWasPressed) {
      _rightTriggerWasPressed = true;
      // Double-tap detection: exit on second press within 500ms
      if (window._lastRightTrigger && performance.now() - window._lastRightTrigger < 500) {
        if (_xrSession) _xrSession.end();
        window._lastRightTrigger = 0;
      } else {
        window._lastRightTrigger = performance.now();
      }
    }
    if (trigger && !trigger.pressed) _rightTriggerWasPressed = false;
    // A button — return to Earth (Human Being), right in front, clear any focus
    const aBtn = src.gamepad.buttons[4];
    if (aBtn && aBtn.pressed && !window._aBtnWasPressed) {
      window._aBtnWasPressed = true;
      window._vrDriftLoop = null;
      window._bhOrbit = null;
      clearTimeout(window._aSingleTimer);
      if (_galaxyGroup) {
        // Unfocus any selected planet and clear card
        if (focusedNode) {
          delete focusedNode._restX; delete focusedNode._restY; delete focusedNode._restZ;
          delete focusedNode._floatStart;
          clearFocusEdges(); clearMoons(); clearShip(); resetDim();
          hideVRNoteCard();
          focusedNode = null; focusCamAnim = null;
        }
        // Position galaxyGroup so Earth (at scene 0,0,0) is 3m in front of user
        var xrCam24 = renderer.xr.getCamera();
        var camPos24 = new THREE.Vector3();
        xrCam24.getWorldPosition(camPos24);
        // Human Being is at galaxy (0,0,0) so target = camPos - (0,0,3)
        var earthTarget = new THREE.Vector3(camPos24.x, camPos24.y, camPos24.z - 3.0);
        _galaxyGroup.rotation.set(0, 0, 0);
        _vrZoomAnim = { startPos: _galaxyGroup.position.clone(), endPos: earthTarget, t: 0, frames: 80 };
      }
    }
    if (aBtn && !aBtn.pressed) window._aBtnWasPressed = false;
    // B button (index 5) = start/stop guided tour
    const bBtn = src.gamepad.buttons[5];
    if (bBtn && bBtn.pressed && !window._bBtnWasPressed) {
      window._bBtnWasPressed = true;
      if (_tourActive) { _tourActive = false; } else { startGuidedTour(); }
    }
    if (bBtn && !bBtn.pressed) window._bBtnWasPressed = false;
  }
}

// Joystick navigation
// Controller 0 (xrController0) = left hand = movement
// Controller 1 (xrController1) = right hand = rotate/up/down
const _xrMoveSpeed = 0.03;
const _xrRotSpeed = 0.02;
function updateXRControls() {
  if (window._introLocked) return;
  var session = renderer.xr.getSession();
  if (!session) return;
  var moveTarget = _galaxyGroup || scene;

  // Collect stick values from both controllers
  // Use inputSource index to determine left(0) vs right(1)
  var sticks = []; // [{dx, dy, hand}]
  var sources = session.inputSources;
  for (var i = 0; i < sources.length; i++) {
    var src = sources[i];
    if (!src.gamepad) continue;
    var axes = src.gamepad.axes;
    var dx = 0, dy = 0;
    // Try axes[2],[3] first, then [0],[1]
    if (axes.length >= 4) { dx = axes[2]; dy = axes[3]; }
    if (dx === 0 && dy === 0 && axes.length >= 2) { dx = axes[0]; dy = axes[1]; }
    // Dead zone
    if (Math.abs(dx) < 0.12) dx = 0;
    if (Math.abs(dy) < 0.12) dy = 0;
    // Determine hand: use handedness if available, else use index
    var hand = src.handedness || (sticks.length === 0 ? 'left' : 'right');
    sticks.push({dx: dx, dy: dy, hand: hand});
  }

  for (var si = 0; si < sticks.length; si++) {
    var s = sticks[si];
    if (s.dx === 0 && s.dy === 0) continue;

    // Kill drift/orbit loops when user is actively using joystick
    window._vrDriftLoop = null;
    window._bhOrbit = null;

    if (s.hand === 'left' || s.hand === '' || (s.hand !== 'right' && si === 0)) {
      // LEFT STICK: fly through space
      // Same pattern as working right stick but on Z and X axes
      moveTarget.position.z -= s.dy * _xrMoveSpeed * 2;
      moveTarget.position.x += s.dx * _xrMoveSpeed * 2;
    }
    if (s.hand === 'right' || (s.hand !== 'left' && si === 1)) {
      // RIGHT STICK: rotate + up/down (this already works)
      moveTarget.rotation.y += s.dx * _xrRotSpeed;
      moveTarget.position.y += s.dy * _xrMoveSpeed;
    }
  }
}

// VR button — uses exact same pattern as working xr_test.html
function setupVRButton() {
  if (!navigator.xr) return;
  navigator.xr.isSessionSupported('immersive-vr').then(function(supported) {
    if (!supported) return;
    const btn = document.createElement('button');
    btn.textContent = 'ENTER VR';
    btn.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;padding:15px 30px;font-size:18px;background:rgba(4,6,15,0.9);color:rgba(232,216,154,0.9);border:2px solid rgba(200,180,120,0.5);border-radius:8px;cursor:pointer;';
    document.body.appendChild(btn);
    btn.addEventListener('click', function() {
      if (_xrSession) { _xrSession.end(); return; }
      navigator.xr.requestSession('immersive-vr', {
        optionalFeatures: ['local-floor']
      }).then(function(session) {
        _xrSession = session;
        btn.textContent = 'EXIT VR';
        renderer.xr.setSession(session);
        session.addEventListener('end', function() {
          _xrSession = null;
          btn.textContent = 'ENTER VR';
        });
      });
    });
  });
}

  const positions = new Float32Array(STAR_COUNT * 3);
  const colors    = new Float32Array(STAR_COUNT * 3);
  const sizes     = new Float32Array(STAR_COUNT);

  // Star color temperatures: blue-white, white, warm yellow, faint orange
  const starTints = [
    [0.72, 0.82, 1.00],  // blue-white
    [0.95, 0.97, 1.00],  // white
    [1.00, 0.98, 0.88],  // warm white
    [1.00, 0.92, 0.70],  // yellow
    [1.00, 0.85, 0.60],  // orange
  ];

  for (let i = 0; i < STAR_COUNT; i++) {
    // Uniform random on sphere surface
    const u     = Math.random();
    const v     = Math.random();
    const theta = 2 * Math.PI * u;
    const phi   = Math.acos(2 * v - 1);
    positions[i*3]   = RADIUS * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = RADIUS * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = RADIUS * Math.cos(phi);

    // Random tint, slightly dimmed
    const tint  = starTints[Math.floor(Math.random() * starTints.length)];
    const bright = 0.45 + Math.random() * 0.55;
    colors[i*3]   = tint[0] * bright;
    colors[i*3+1] = tint[1] * bright;
    colors[i*3+2] = tint[2] * bright;

    // Most stars tiny, a few larger, rare bright ones
    const r = Math.random();
    sizes[i] = r < 0.92
      ? 0.6 + Math.random() * 1.2
      : r < 0.98

        : 3.0 + Math.random() * 2.5;

  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    vertexColors: true,
    sizeAttenuation: false,
    transparent: true,
    opacity: 0.92,
    depthWrite: false,

// Simple seeded pseudo-random
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

// Smooth noise via bilinear lerp on random grid
function buildNoise(rng, gw, gh) {
  const grid = new Float32Array(gw * gh);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  return (u, v) => {
    const x = ((u % 1 + 1) % 1) * (gw - 1);
    const y = ((v % 1 + 1) % 1) * (gh - 1);
    const x0 = Math.floor(x) % gw, y0 = Math.floor(y) % gh;
    const x1 = (x0 + 1) % gw,      y1 = (y0 + 1) % gh;
    const fx = x - Math.floor(x),   fy = y - Math.floor(y);
    const s = t => t * t * (3 - 2 * t);
    return grid[y0*gw+x0]*(1-s(fx))*(1-s(fy)) + grid[y0*gw+x1]*s(fx)*(1-s(fy))
         + grid[y1*gw+x0]*(1-s(fx))*s(fy)     + grid[y1*gw+x1]*s(fx)*s(fy);
  };
}

function fbm(noise, u, v, oct, lac, gain) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < oct; i++) {
    val += noise(u * freq, v * freq) * amp;
    freq *= lac; amp *= gain;
  }
  return val;
}

function makePlanetTexture(domain, nodeId) {
  // HOME planet gets Earth palette
  const type  = (nodeId === 'Human Being') ? 'earth' : (PLANET_TYPES[domain] || 'ocean');
  const basePal = PLANET_PALETTES[type];

  // Per-planet color variation — shift hue/brightness so same-domain planets look different
  let pseed = 0;
  for (let i = 0; i < nodeId.length; i++) pseed = (pseed * 37 + nodeId.charCodeAt(i)) & 0xfffffff;
  const pRng = seededRand(pseed + 5555);
  const baseHueShift = (pRng() - 0.5) * 40;
  const satMul   = 0.65 + pRng() * 0.4;         // 0.65-1.05 (10% lower range)
  const brightOff = (pRng() - 0.5) * 30;
  const palOrder = pRng() > 0.5;
  // Multi-hue: each palette color shifts differently
  const hueSpread = 25 + pRng() * 35;           // 25-60° spread across palette
  // Accent: inject a contrasting hue into 1-2 slots
  const accentHue = 90 + pRng() * 120;          // 90-210° away from base
  const accentSlot1 = Math.floor(pRng() * 6);
  const accentSlot2 = Math.floor(pRng() * 6);
  const accentStr = 0.15 + pRng() * 0.2;        // 15-35% blend

  function rgb2hsl(r,g,b) {
    r/=255; g/=255; b/=255;
    var mx=Math.max(r,g,b), mn=Math.min(r,g,b), h, s, l=(mx+mn)/2;
    if(mx===mn) { h=s=0; } else {
      var d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);
      if(mx===r) h=(g-b)/d+(g<b?6:0);
      else if(mx===g) h=(b-r)/d+2;
      else h=(r-g)/d+4;
      h/=6;
    }
    return [h*360,s*100,l*100];
  }
  function hsl2rgb(h,s,l) {
    h=((h%360)+360)%360; s/=100; l/=100;
    var c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
    var r1,g1,b1;
    if(h<60){r1=c;g1=x;b1=0;}else if(h<120){r1=x;g1=c;b1=0;}
    else if(h<180){r1=0;g1=c;b1=x;}else if(h<240){r1=0;g1=x;b1=c;}
    else if(h<300){r1=x;g1=0;b1=c;}else{r1=c;g1=0;b1=x;}
    return [Math.round((r1+m)*255),Math.round((g1+m)*255),Math.round((b1+m)*255)];
  }

  var pal = basePal.map(function(c, idx) {
    var hsl = rgb2hsl(c[0], c[1], c[2]);
    // Each color shifts differently across the hue spread
    var colorHue = baseHueShift + (idx / 5.0 - 0.5) * hueSpread;
    hsl[0] += colorHue;
    // 10% less saturation overall
    hsl[1] = Math.max(0, Math.min(100, hsl[1] * satMul * 0.9));
    hsl[2] = Math.max(0, Math.min(100, hsl[2] + brightOff));
    var rgb = hsl2rgb(hsl[0], hsl[1], hsl[2]);
    // Blend accent color into 1-2 slots for multi-hue contrast
    if (idx === accentSlot1 || idx === accentSlot2) {
      var acc = hsl2rgb(hsl[0] + accentHue, Math.min(hsl[1] * 0.8, 60), hsl[2]);
      rgb[0] = Math.round(rgb[0] * (1-accentStr) + acc[0] * accentStr);
      rgb[1] = Math.round(rgb[1] * (1-accentStr) + acc[1] * accentStr);
      rgb[2] = Math.round(rgb[2] * (1-accentStr) + acc[2] * accentStr);
    }
    return rgb;
  });
  if (palOrder) pal = pal.slice().reverse();

  const S     = Q.texSize;
  const cv    = document.createElement('canvas');
  cv.width = S * 2; cv.height = S;
  const ctx   = cv.getContext('2d');
  const id    = ctx.createImageData(S * 2, S);
  const data  = id.data;

  // Seed from node name
  let seed = 0;
  for (let i = 0; i < nodeId.length; i++) seed = (seed * 31 + nodeId.charCodeAt(i)) & 0xfffffff;
  const rng  = seededRand(seed + 1);
  const rng2 = seededRand(seed + 99);
  const rng3 = seededRand(seed + 777);

  const gw = Q.noiseGrid[0], gh = Q.noiseGrid[1];
  const n1 = buildNoise(rng,  gw, gh);
  const n2 = buildNoise(rng2, gh, gw);
  const n3 = buildNoise(rng3, gw * 2, gh * 2);
  const rng4 = seededRand(seed + 2345);
  const n4 = buildNoise(rng4, Math.round(gw * 1.5), Math.round(gh * 1.5));

  // Type-specific rendering
  const isBanded = ['gas_blue','amber_gas','plasma','violet_cloud','dark_nebula'].includes(type);
  const isIcy    = type === 'ice';
  const isRocky  = ['rocky_orange','terracotta','ancient','desert','verdant'].includes(type);
  const numBands = 4 + Math.floor(rng() * 5);
  const stormU   = rng(); const stormV = 0.3 + rng() * 0.4;
  const stormR   = 0.04 + rng() * 0.06;
  const hasStorm = rng() > 0.35;

  for (let py = 0; py < S; py++) {
    for (let px = 0; px < S * 2; px++) {
      const u = px / (S * 2);
      const v = py / S;

      let t;
      const oct = Q.texOctaves;
      const oct2 = Math.max(2, oct - 1);
      if (isBanded) {
        const warp = fbm(n1, u, v, oct, 2.1, 0.5) * 0.4;
        const band = (Math.sin((v + warp) * Math.PI * numBands) + 1) * 0.5;
        const detail = fbm(n2, u * 2, v * 2, oct2, 2.0, 0.45) * 0.25;
        const micro = fbm(n4, u * 6, v * 6, oct2, 2.3, 0.4) * 0.08;
        t = Math.max(0, Math.min(1, band + detail + micro));
      } else if (isRocky) {
        const crater = fbm(n3, u * 3, v * 3, oct, 2.2, 0.5);
        const base   = fbm(n1, u, v, oct, 2.0, 0.5);
        const fine   = fbm(n4, u * 8, v * 8, oct2, 2.4, 0.45) * 0.12;
        t = Math.pow(Math.max(0, base * 0.55 + crater * 0.35 + fine), 0.8);
      } else if (isIcy) {
        const crack = Math.abs(fbm(n1, u * 2, v * 2, oct, 2.3, 0.5) - 0.5) * 2;
        const base  = fbm(n2, u, v, oct2, 2.0, 0.4);
        const vein  = Math.abs(fbm(n4, u * 5, v * 5, oct2, 2.5, 0.45) - 0.5) * 0.3;
        t = Math.max(0, Math.min(1, base * 0.45 + (1 - crack * 0.55) + vein));
      } else {
        t = fbm(n1, u * 1.5, v * 1.5, oct, 2.1, 0.5);
        const detail = fbm(n4, u * 4, v * 4, oct2, 2.2, 0.45) * 0.15;
        t = Math.max(0, Math.min(1, t * 0.75 + fbm(n2, u, v, 5, 2.0, 0.5) * 0.2 + detail));
      }

      // Storm spot
      if (hasStorm) {
        const du = Math.min(Math.abs(u - stormU), 1 - Math.abs(u - stormU));
        const dv = v - stormV;
        const sd = Math.sqrt(du*du + dv*dv) / stormR;
        if (sd < 1) t = Math.max(0, Math.min(1, t * 0.3 + (1 - sd) * 0.7));
      }

      // Pick color from palette
      const ci = t * (pal.length - 1);
      const ci0 = Math.floor(ci), ci1 = Math.min(ci0 + 1, pal.length - 1);
      const cf = ci - ci0;
      const c0 = pal[ci0], c1 = pal[ci1];
      const r = Math.round(c0[0] + (c1[0]-c0[0]) * cf);
      const g = Math.round(c0[1] + (c1[1]-c0[1]) * cf);
      const b = Math.round(c0[2] + (c1[2]-c0[2]) * cf);

      // Limb darkening: darken edges of sphere (approximated via equirectangular v→lat)
      const lat  = (v - 0.5) * Math.PI;
      const limb = Math.pow(Math.cos(lat), 0.5);
      // Also apply longitudinal limb darkening for equirectangular
      const lon = (u - 0.5) * Math.PI * 2;
      const lonLimb = 0.7 + 0.3 * Math.pow(Math.max(0, Math.cos(lon * 0.5)), 0.4);
      const totalLimb = limb * lonLimb;

      const i4 = (py * S * 2 + px) * 4;
      data[i4]   = Math.round(r * totalLimb);
      data[i4+1] = Math.round(g * totalLimb);
      data[i4+2] = Math.round(b * totalLimb);
      data[i4+3] = 255;
    }
  }
  ctx.putImageData(id, 0, 0);
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

// ─── MOON TEXTURE (smaller, faster variant) ─────────────────────────────────
function makeMoonTexture(domain, nodeId) {
  const type = PLANET_TYPES[domain] || 'ocean';
  const pal  = PLANET_PALETTES[type];
  const S    = 128; // 256x128 canvas — much cheaper than planet textures
  const cv   = document.createElement('canvas');
  cv.width = S * 2; cv.height = S;
  const ctx  = cv.getContext('2d');
  const id   = ctx.createImageData(S * 2, S);
  const data = id.data;

  let seed = 0;
  for (let i = 0; i < nodeId.length; i++) seed = (seed * 31 + nodeId.charCodeAt(i)) & 0xfffffff;
  seed += 9999; // offset from planet seed so moons look different
  const rng  = seededRand(seed);
  const rng2 = seededRand(seed + 42);

  const n1 = buildNoise(rng,  16, 8);
  const n2 = buildNoise(rng2, 12, 12);

  const isBanded = ['gas_blue','amber_gas','plasma','violet_cloud','dark_nebula'].includes(type);
  const numBands = 3 + Math.floor(rng() * 3);

  for (let py = 0; py < S; py++) {
    for (let px = 0; px < S * 2; px++) {
      const u = px / (S * 2);
      const v = py / S;

      let t;
      if (isBanded) {
        const warp = fbm(n1, u, v, 3, 2.0, 0.5) * 0.3;
        t = (Math.sin((v + warp) * Math.PI * numBands) + 1) * 0.5;
        t += fbm(n2, u * 2, v * 2, 3, 2.0, 0.4) * 0.15;
        t = Math.max(0, Math.min(1, t));
      } else {
        t = fbm(n1, u * 2, v * 2, 4, 2.1, 0.5);
        t += fbm(n2, u * 3, v * 3, 3, 2.2, 0.45) * 0.2;
        t = Math.max(0, Math.min(1, t));
      }

      // Darken moons slightly compared to planets — they're smaller, cooler bodies
      const ci = t * (pal.length - 1);
      const ci0 = Math.floor(ci), ci1 = Math.min(ci0 + 1, pal.length - 1);
      const cf = ci - ci0;
      const c0 = pal[ci0], c1 = pal[ci1];
      const r = Math.round((c0[0] + (c1[0]-c0[0]) * cf) * 0.7);
      const g = Math.round((c0[1] + (c1[1]-c0[1]) * cf) * 0.7);
      const b = Math.round((c0[2] + (c1[2]-c0[2]) * cf) * 0.7);

      // Limb darkening
      const lat = (v - 0.5) * Math.PI;
      const limb = Math.pow(Math.cos(lat), 0.6);

      const i4 = (py * S * 2 + px) * 4;
      data[i4]   = Math.round(r * limb);
      data[i4+1] = Math.round(g * limb);
      data[i4+2] = Math.round(b * limb);
      data[i4+3] = 255;
    }
  }
  ctx.putImageData(id, 0, 0);
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

// ─── FRESNEL ATMOSPHERE SHADER (proven pattern from solar system demos) ─────
const _atmosVert = `
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vNormal = normalize(normalMatrix * normal);
    vViewPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const _atmosFrag = `
  varying vec3 vNormal;
  varying vec3 vViewPos;
  uniform vec3 glowColor;
  uniform float coeff;
  uniform float power;
  void main() {
    // Use actual view direction — not fixed Z — so glow doesn't track head
    vec3 viewDir = normalize(-vViewPos);
    float intensity = pow(coeff - dot(vNormal, viewDir), power);
    gl_FragColor = vec4(glowColor, 1.0) * intensity;
  }
`;
const _atmosGeo = new THREE.SphereGeometry(1, 24, 16);

function createFresnelAtmosphere(radius, color, scale) {
  const mat = new THREE.ShaderMaterial({
    vertexShader: _atmosVert,
    fragmentShader: _atmosFrag,
    uniforms: {
      glowColor: { value: new THREE.Color(color) },
      coeff: { value: 0.4 },
      power: { value: 6.0 },
    },
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
    depthTest: true, // was false — caused glow to render on top of everything
  });
  const mesh = new THREE.Mesh(_atmosGeo, mat);
  mesh.scale.setScalar(radius * scale);
  return mesh;
}

(function buildPulsars() {
  var top10 = nodes.slice().sort(function(a,b){return b.size-a.size;}).slice(0,10);
  var pulsarData = [];
  top10.forEach(function(n) {
    // Speed inversely proportional to size
    var speed8 = 0.004 + (22 - Math.min(n.size,22)) * 0.0006;
    pulsarData.push({ speed: speed8, phase: Math.random()*Math.PI*2, node: n });
  });
  // K26: THIN RING — 50% thinner (0.86→1.0), Gaussian alphaMap — no hard edges
  // Gaussian bell curve: both inner and outer edges fade smoothly to zero
  var _rgCv = document.createElement('canvas');
  _rgCv.width = 256; _rgCv.height = 1;
  var _rgCtx = _rgCv.getContext('2d');
  var _rgImgData = _rgCtx.createImageData(256, 1);
  var _rgPx = _rgImgData.data;
  var _sigma = 0.21; // controls how soft the edges are — smaller = harder edges
  for (var _px = 0; _px < 256; _px++) {
    var _x = _px / 255; // 0→1 across ring width (inner→outer)
    // Gaussian centered at 0.5 — both edges fade to near-zero
    var _g = Math.exp(-0.5 * Math.pow((_x - 0.5) / _sigma, 2));
    var _v = Math.round(_g * 255);
    _rgPx[_px * 4 + 0] = _v;  // R
    _rgPx[_px * 4 + 1] = _v;  // G
    _rgPx[_px * 4 + 2] = _v;  // B
    _rgPx[_px * 4 + 3] = 255; // A (texture alpha full; Three.js reads luminance)
  }
  _rgCtx.putImageData(_rgImgData, 0, 0);
  var _ringAlphaMap = new THREE.CanvasTexture(_rgCv);

  var haloRings8 = [];
  pulsarData.forEach(function(p) {
    var baseCol = new THREE.Color(DOMAINS[p.node.domain]?.color||'#fff');
    var hsl = {}; baseCol.getHSL(hsl);
    // 50% thinner: inner 0.86, outer 1.0 (was 0.72→1.0, thickness was 0.28, now 0.14)
    var hGeo = new THREE.RingGeometry(0.86, 1.0, 80, 1);
    var hMat = new THREE.MeshBasicMaterial({
      color: baseCol.clone(),
      alphaMap: _ringAlphaMap,
      transparent: true, opacity: 0,
      side: THREE.DoubleSide,
      depthWrite: false, blending: THREE.AdditiveBlending,
    });
    var hMesh = new THREE.Mesh(hGeo, hMat);
    hMesh.position.set(p.node.x, p.node.y, p.node.z);
    hMesh.rotation.x = Math.PI / 2;
    scene.add(hMesh);
    haloRings8.push({ mesh: hMesh, node: p.node, speed: p.speed, phase: p.phase, t: Math.random(), baseHue: hsl.h });
  });
  window._pulsarUpdate = function() {
    var t8 = performance.now() * 0.001;
    haloRings8.forEach(function(h) {
      h.t = (h.t + h.speed * 0.5) % 1;
      var maxR = h.node.size * 2.2 * 5 * 8;
      h.mesh.scale.setScalar(maxR * h.t);
      // Overall opacity: bright early, fades as ring reaches max extent
      // Boosted slightly to compensate for Gaussian dimming at center
      h.mesh.material.opacity = (1 - h.t) * 0.75;
      // Rainbow hue shift as ring expands
      var hue = (h.baseHue + h.t) % 1;
      h.mesh.material.color.setHSL(hue, 1.0, 0.65);
      h.mesh.position.set(h.node.x, h.node.y, h.node.z);
    });
  };
})();

// ─── TRAVELING PULSE SYSTEM ──────────────────────────────────────────────────
// A bright line segment slides along each connector edge — no floating orbs.

const PULSE_POOL      = Q.pulsePool;
const PULSE_SPEED_MIN = 0.003;
const PULSE_SPEED_MAX = 0.009;
const PULSE_TAIL      = 0.09;

const PULSE_COLORS = [
  new THREE.Color(0xffe8a0),
  new THREE.Color(0xaad4ff),
  new THREE.Color(0xffc0e0),
  new THREE.Color(0xc0ffd8),
  new THREE.Color(0xffd0a0),
  new THREE.Color(0xe0c0ff),
  new THREE.Color(0xa0eeff),
];

// Neighbor lookup for chain-traveling
const neighborMap = new Map();
nodes.forEach(n => neighborMap.set(n.id, []));
links.forEach(l => {
  neighborMap.get(l.source.id).push(l.target);
  neighborMap.get(l.target.id).push(l.source);
});

const activePulses = [];

// Each pulse gets its own 2-point LineSegments (head + tail point)
function spawnPulse(srcNode, tgtNode, col) {
  if (activePulses.length >= PULSE_POOL) return;

  const color = col
    ? col.clone()
    : PULSE_COLORS[Math.floor(Math.random() * PULSE_COLORS.length)].clone();
  const speed = PULSE_SPEED_MIN + Math.random() * (PULSE_SPEED_MAX - PULSE_SPEED_MIN);

  // Core bright segment
  const posArr = new Float32Array(6); // 2 points × 3
  const geo    = new THREE.BufferGeometry();
  const attr   = new THREE.BufferAttribute(posArr, 3);
  attr.usage   = THREE.DynamicDrawUsage;
  geo.setAttribute('position', attr);

  const mat = new THREE.LineBasicMaterial({
    color,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const line = new THREE.LineSegments(geo, mat);
  scene.add(line);

  // Softer wider halo segment (same geometry, different material)
  const haloMat = new THREE.LineBasicMaterial({
    color,
    transparent: true,
    opacity: 0.3,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const haloLine = new THREE.LineSegments(geo, haloMat); // shares geo
  scene.add(haloLine);

  activePulses.push({
    src: srcNode, tgt: tgtNode,
    t: 0, speed, color,
    geo, posArr, mat, haloMat, line, haloLine,
  });
}

function lerpEdge(src, tgt, t) {
  return {
    x: src.x + (tgt.x - src.x) * t,
    y: src.y + (tgt.y - src.y) * t,
    z: src.z + (tgt.z - src.z) * t,
  };
}

function updatePulses() {
  // Randomly spawn new pulses
  if (Math.random() < 0.006 && activePulses.length < PULSE_POOL) {
    const candidates = nodes.filter(n => neighborMap.get(n.id).length > 0);
    if (candidates.length) {
      const src  = candidates[Math.floor(Math.random() * candidates.length)];
      const nbrs = neighborMap.get(src.id);
      const tgt  = nbrs[Math.floor(Math.random() * nbrs.length)];
      spawnPulse(src, tgt, null);
    }
  }

  for (let i = activePulses.length - 1; i >= 0; i--) {
    const p = activePulses[i];
    p.t += p.speed;

    const head = Math.min(p.t, 1);
    const tail = Math.max(p.t - PULSE_TAIL, 0);

    // Fade in as tail leaves 0, fade out as head approaches 1
    const fadeIn  = Math.min(p.t / (PULSE_TAIL * 0.5), 1);
    const fadeOut = Math.min((1 - head) / 0.08 + 0.001, 1);
    const env     = Math.min(fadeIn, fadeOut);

    p.mat.opacity     = env * 0.92;
    p.haloMat.opacity = env * 0.32;

    // Write head and tail positions into the line segment
    const hp = lerpEdge(p.src, p.tgt, head);
    const tp = lerpEdge(p.src, p.tgt, tail);
    p.posArr[0] = tp.x; p.posArr[1] = tp.y; p.posArr[2] = tp.z;
    p.posArr[3] = hp.x; p.posArr[4] = hp.y; p.posArr[5] = hp.z;
    p.geo.attributes.position.needsUpdate = true;

    // Pulse finished
    if (p.t >= 1 + PULSE_TAIL) {
      scene.remove(p.line);
      scene.remove(p.haloLine);
      p.mat.dispose();
      p.haloMat.dispose();
      p.geo.dispose();
      activePulses.splice(i, 1);

      // 55% chance to chain-travel
      if (Math.random() < 0.55) {
        const nbrs = neighborMap.get(p.tgt.id).filter(n => n.id !== p.src.id);
        if (nbrs.length) {
          const next = nbrs[Math.floor(Math.random() * nbrs.length)];
          // Fresh random speed each hop — subtle variation per segment
          spawnPulse(p.tgt, next, p.color);
        }
      }
    }
  }
}
